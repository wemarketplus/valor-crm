function wtFilterDir(){
  const q=(document.getElementById('wt-dir-search')?.value||'').toLowerCase()
  const region=document.getElementById('wt-region-filter')?.value||''
  const data=window._WIB_STATE_DATA.filter(d=>{
    const mq=!q||(d.state+' '+d.board+' '+(d.director||'')).toLowerCase().includes(q)
    const mr=!region||d.region===region
    return mq&&mr
  })
  window._wtDirData=data
  wtRenderDir(data)
  // Grey out map states not in filter
  if(typeof d3!=='undefined'){
    const inSet=new Set(data.map(d=>d.state))
    d3.selectAll('.wt-state-path').attr('opacity',d=>{
      const name=d?.properties?.name
      return(!q&&!region)||inSet.has(name)?1:0.2
    })
  }
}

function wtRenderDir(data){
  const body=document.getElementById('wt-dir-body')
  const cnt=document.getElementById('wt-dir-count')
  if(!body)return
  if(cnt)cnt.textContent=data.length+' states'
  body.innerHTML=data.map(d=>`
    <div class="wt-dir-row${window._wtSelected===d.state?' selected':''}" onclick="wtSelectState('${d.state.replace(/'/g,"\\'")}')">
      <div>
        <div class="wt-dir-name">${escHtml(d.state)}</div>
        <div class="wt-dir-board">${escHtml(d.board)}</div>
      </div>
      <span class="wt-local-badge">${d.localBoards}</span>
    </div>`).join('')
}

function wtSelectState(stateName){
  window._wtSelected=window._wtSelected===stateName?null:stateName
  const d=window._WIB_STATE_DATA.find(x=>x.state===stateName)
  wtRenderDir(window._wtDirData||window._WIB_STATE_DATA)
  wtShowDetail(d)
  // Highlight map
  if(typeof d3!=='undefined'){
    d3.selectAll('.wt-state-path')
      .attr('fill',p=>{
        if(!p?.properties)return'#ccc'
        const fips=String(p.id).padStart(2,'0')
        const w=window._wtFipsMap?.[fips]
        if(!w)return'#ccc'
        if(w.state===window._wtSelected)return'#C9A84C'
        return wtStateColor(w)
      })
  }
}

/* ── Map ── */
function wtLoadMap(){
  // Poll until #wt-svg is in the DOM and the container has positive dimensions,
  // then load D3 + TopoJSON (or reuse if already loaded) and draw.
  var attempts = 0
  function tryDraw(){
    attempts++
    var svgEl = document.getElementById('wt-svg')
    var wrap  = document.getElementById('wt-map-wrap')
    if(!svgEl || !wrap){
      if(attempts < 40){ setTimeout(tryDraw, 50) }
      return
    }
    var rect = wrap.getBoundingClientRect()
    if(rect.width < 10 || rect.height < 10){
      if(attempts < 40){ setTimeout(tryDraw, 50) }
      return
    }
    // Container is ready — load libraries if needed, then draw
    if(typeof d3 !== 'undefined' && typeof topojson !== 'undefined'){
      wtDrawMap(); return
    }
    var s1 = document.createElement('script')
    s1.src = 'https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js'
    s1.onerror = function(){
      // CDN fallback
      var sf = document.createElement('script')
      sf.src = 'https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js'
      sf.onload = loadTopo
      document.head.appendChild(sf)
    }
    s1.onload = loadTopo
    document.head.appendChild(s1)
    function loadTopo(){
      var s2 = document.createElement('script')
      s2.src = 'https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js'
      s2.onerror = function(){
        var sf2 = document.createElement('script')
        sf2.src = 'https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js'
        sf2.onload = wtDrawMap
        document.head.appendChild(sf2)
      }
      s2.onload = wtDrawMap
      document.head.appendChild(s2)
    }
  }
  // First attempt after two animation frames to ensure layout is painted
  requestAnimationFrame(function(){ requestAnimationFrame(tryDraw) })
}

function wtDrawMap(){
  const fipsToWib={}
  window._wtFipsMap=fipsToWib
  window._WIB_STATE_DATA.forEach(d=>{
    const fips=window._FIPS_MAP[d.state]
    if(fips)fipsToWib[fips]=d
  })
  const mapWrap=document.getElementById('wt-map-wrap')
  if(!mapWrap)return
  // Use fixed viewBox dimensions so projection is stable regardless of render timing
  const w=900, h=432
  const svg=d3.select('#wt-svg').attr('viewBox',`0 0 ${w} ${h}`)
  const projection=d3.geoAlbersUsa().scale(w*1.25).translate([w/2,h/2])
  const path=d3.geoPath(projection)
  const tt=document.getElementById('wt-tt')
  d3.json('https://unpkg.com/us-atlas@3/states-10m.json').then(us=>{
    const features=topojson.feature(us,us.objects.states).features
    svg.selectAll('.wt-state-path').data(features).join('path')
      .attr('class','wt-state-path')
      .attr('d',path)
      .attr('fill',d=>{
        const fips=String(d.id).padStart(2,'0')
        const wib=fipsToWib[fips]
        return wib?wtStateColor(wib):'#ccc'
      })
      .attr('stroke','#fff')
      .attr('stroke-width',0.6)
      .on('mousemove',function(event,d){
        const fips=String(d.id).padStart(2,'0')
        const wib=fipsToWib[fips]
        if(!wib||!tt)return
        const rect=mapWrap.getBoundingClientRect()
        tt.style.display='block'
        tt.style.left=(event.clientX-rect.left+12)+'px'
        tt.style.top=(event.clientY-rect.top+12)+'px'
        tt.innerHTML=`<strong style="font-size:12px">${escHtml(wib.state)}</strong><br><span style="color:var(--text2)">${escHtml(wib.board)}</span><br><span style="font-size:10px">${wib.localBoards} local boards · ${escHtml(wib.region)}</span>`
      })
      .on('mouseleave',()=>{if(tt)tt.style.display='none'})
      .on('click',(event,d)=>{
        const fips=String(d.id).padStart(2,'0')
        const wib=fipsToWib[fips]
        if(wib)wtSelectState(wib.state)
      })
    svg.append('path')
      .datum(topojson.mesh(us,us.objects.states,(a,b)=>a!==b))
      .attr('fill','none').attr('stroke','#fff').attr('stroke-width',0.6).attr('d',path)
  }).catch(()=>{
    const wrap=document.getElementById('wt-map-wrap')
    if(wrap)wrap.innerHTML='<div style="text-align:center;padding:30px;font-size:12px;color:var(--text3)">Map unavailable — use directory</div>'
  })
}

async function wtAiSend(){
  const inp=document.getElementById('wt-ai-input')
  if(!inp)return
  const q=inp.value.trim()
  if(!q)return
  inp.value=''
  // Hide chips after first use
  const chips=document.getElementById('wt-chips')
  if(chips)chips.style.display='none'

  wtAiAppend('user',q)
  const thinking=wtAiAppend('thinking','🤖 Thinking...')

  // Build system prompt with full WIB data baked in
  const systemPrompt=`You are an expert WIB (Workforce Innovation Board / Workforce Development Board) territory assistant embedded in the Valor Workforce Funding CRM. Users are workforce grant professionals seeking to obtain WIOA-funded Incumbent Worker Training (IWT) grants for employers.

You have access to the following nationwide WIB state-level data (all 50 states):
${JSON.stringify(window._WIB_STATE_DATA,null,1)}

Your job:
1. Answer questions about WIB territories, contacts, phone numbers, emails, and websites using the data above.
2. When asked about WIOA, IWT, or incumbent worker training grants: explain that the State WIB Director (listed in the data) is the primary point of contact. IWT grants are authorized under WIOA Title I and allow local boards to fund upskilling for currently employed workers. Employers typically need to demonstrate a skill gap and a commitment to retain workers.
3. If asked about LOCAL boards within a state, note that the CareerOneStop WDB finder (https://www.careeronestop.org/LocalHelp/WorkforceDevelopment/find-workforce-development-boards.aspx) lists all local boards. Use web_search to find specifics on local board directors.
4. For questions about recent news, director changes, or updated contact info — use web_search to find the latest.
5. When providing contact info, format it clearly: name, title, phone, email, and website each on their own line.
6. If a user is preparing to reach out to a WIB about IWT funding, add a practical tip: mention employer size, number of incumbent workers to be trained, and the training topic when making first contact.

Keep responses under 250 words unless a list is explicitly requested. Use plain text only, no markdown headers or bullets with dashes.`

  window._wtAiHistory.push({role:'user',content:q})

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:systemPrompt,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        messages:window._wtAiHistory
      })
    })
    const data=await res.json()
    if(!res.ok)throw new Error(data.error?.message||'API error')

    // Extract text — content may mix text + tool_use blocks (web_search)
    // When stop_reason is 'tool_use', the model made a search call but the
    // final answer text block is still present in the same response after
    // the tool_use block. Collect ALL text blocks to get the full answer.
    let reply=''
    if(data.content&&Array.isArray(data.content)){
      reply=data.content.filter(b=>b.type==='text').map(b=>b.text).join('\n').trim()
    }
    if(!reply&&data.stop_reason==='tool_use')reply='🔍 Searching for that information...'
    if(!reply&&data.error)reply='Error: '+data.error.message

    // Add assistant turn to history (simplified)
    window._wtAiHistory.push({role:'assistant',content:reply||'No response.'})
    // Keep history manageable (last 10 turns)
    if(window._wtAiHistory.length>20)window._wtAiHistory=window._wtAiHistory.slice(-20)

    if(thinking&&thinking.parentNode){thinking.parentNode.removeChild(thinking)}
    wtAiAppend('ai',reply||'No response received.')
  }catch(e){
    if(thinking&&thinking.parentNode){thinking.parentNode.removeChild(thinking)}
    wtAiAppend('ai','⚠️ Error: '+e.message)
  }
}

async function openEditTerritoryModal(tEncoded){
  let t
  try{t=JSON.parse(typeof tEncoded==='string'?tEncoded:JSON.stringify(tEncoded))}catch(e){showToast('Parse error','error');return}
  // Fetch all users and currently assigned users for this territory
  let allUsers=[],assignedIds=new Set()
  try{
    const [usersRes,assignedRes]=await Promise.all([
      api('/api/users').catch(()=>({data:[]})),
      api('/api/territories').catch(()=>({data:[]}))
    ])
    allUsers=(usersRes.data||[]).filter(u=>u.is_active!==false)
    // Determine which users are already assigned to this territory
    allUsers.forEach(u=>{
      if((u.territories||[]).some(ut=>ut.id===t.id))assignedIds.add(u.id)
    })
  }catch(_){}
  const userOptions=allUsers.length
    ?allUsers.map(u=>`<option value="${u.id}"${assignedIds.has(u.id)?' selected':''}>${escHtml(u.full_name||u.email)}</option>`).join('')
    :'<option disabled>No users found</option>'
  showModal(`Edit: ${escHtml(t.name)}`,`
    <div class="form-group">
      <div class="form-label">Territory Name <span class="form-req">*</span></div>
      <input id="et-name" value="${escHtml(t.name)}">
    </div>
    <div class="form-group">
      <div class="form-label">States (comma-separated)</div>
      <input id="et-states" value="${(t.states||[]).join(', ')}">
    </div>
    <div class="form-group">
      <div class="form-label">Description</div>
      <input id="et-desc" value="${escHtml(t.description||'')}">
    </div>
    <div class="form-group">
      <div class="form-label">Assigned Users <span style="font-weight:400;color:var(--text3)">(optional)</span></div>
      <select id="et-users" multiple style="width:100%;min-height:110px;border:1px solid var(--border2);border-radius:8px;padding:6px;font-size:12px;color:var(--text);background:var(--white);outline:none;resize:vertical">
        ${userOptions}
      </select>
      <div style="font-size:11px;color:var(--text3);margin-top:4px">Hold <kbd style="font-size:10px;padding:1px 4px;border:1px solid var(--border2);border-radius:3px;background:var(--gray2)">Ctrl</kbd> / <kbd style="font-size:10px;padding:1px 4px;border:1px solid var(--border2);border-radius:3px;background:var(--gray2)">⌘</kbd> to select multiple users</div>
    </div>`,
  async()=>{
    const name=document.getElementById('et-name').value.trim()
    if(!name){showToast('Name required','error');return false}
    const states=document.getElementById('et-states').value.split(',').map(s=>s.trim()).filter(Boolean)
    const selectedUserIds=[...document.getElementById('et-users').selectedOptions].map(o=>o.value)
    try{
      await api('/api/territories/'+t.id,'PUT',{name,states,description:document.getElementById('et-desc').value||''})
      // Sync user assignments: add territory to selected users, remove from deselected
      const allUserIds=allUsers.map(u=>u.id)
      await Promise.all(allUserIds.map(async uid=>{
        try{
          const existing=await api('/api/users/'+uid+'/territories').catch(()=>({data:[]}))
          const existingIds=(existing.data||[]).map(a=>a.id).filter(Boolean)
          let merged
          if(selectedUserIds.includes(uid)){
            // Add this territory
            merged=[...new Set([...existingIds,t.id])]
          }else{
            // Remove this territory
            merged=existingIds.filter(id=>id!==t.id)
          }
          // Only call API if assignment changed
          const hadIt=assignedIds.has(uid),hasIt=selectedUserIds.includes(uid)
          if(hadIt!==hasIt)await api('/api/users/'+uid+'/territories','PUT',{territory_ids:merged})
        }catch(_){}
      }))
      showToast('Territory updated','success');pageTerritories()
    }catch(e){showToast(e.message,'error');return false}
  })
}

/* ─── LIVE CHAT ──────────────────────────────────────────────────────────────
   Messages persist to chat_messages table and broadcast via Supabase Realtime.
   All users on the same channel receive new messages without page refresh.
─────────────────────────────────────────────────────────────────────────── */
let _chatRealtimeChannel = null  // holds the active Supabase Realtime subscription

function renderChatMessage(msg, isMine){
  const initials = (msg.sender_name || '?').slice(0,2).toUpperCase()
  const time = fmtNoteDateTime(msg.created_at)
  if(isMine){
    return `<div class="msg-wrap mine">
      <div class="msg-av" style="background:var(--blue-bg);color:var(--blue-t)">${escHtml(initials)}</div>
      <div>
        <div class="msg-bubble msg-mine">${escHtml(msg.content)}</div>
        <div class="msg-meta">${escHtml(time)}</div>
      </div>
    </div>`
  }
  return `<div class="msg-wrap">
    <div class="msg-av" style="background:var(--orange-bg);color:var(--orange-t)">${escHtml(initials)}</div>
    <div>
      <div style="font-size:10px;font-weight:600;color:var(--text2);margin-bottom:2px">${escHtml(msg.sender_name||'Team Member')}</div>
      <div class="msg-bubble">${escHtml(msg.content)}</div>
      <div class="msg-meta">${escHtml(time)}</div>
    </div>
  </div>`
}

function appendChatMessage(msg){
  const msgs = document.getElementById('chat-messages')
  if(!msgs) return
  const isMine = msg.sender_id === currentUser?.id
  msgs.insertAdjacentHTML('beforeend', renderChatMessage(msg, isMine))
  msgs.scrollTop = msgs.scrollHeight
}

async function pageChat(){
  setTopbar('Internal Chat','Team Communication','')
  clearViewbar()

  // Unsubscribe from previous channel if switching
  if(_chatRealtimeChannel){
    try { _chatRealtimeChannel.unsubscribe() } catch(_){}
    _chatRealtimeChannel = null
  }

  const CHANNELS = ['general','wib-outreach','applications','compliance','announcements']
  const dmUsers  = (window._users||[]).filter(u=>u.id!==currentUser?.id).slice(0,8)

  document.getElementById('page-area').innerHTML = `
  <div style="display:flex;gap:0;height:calc(100vh - 44px);margin:-14px -16px">
    <!-- Sidebar -->
    <div style="width:200px;border-right:.5px solid var(--border);background:var(--bg1);padding:8px 0;flex-shrink:0">
      <div style="padding:6px 12px;font-size:9px;color:var(--text3);letter-spacing:.9px;text-transform:uppercase;font-weight:600">Channels</div>
      ${CHANNELS.map(ch=>`
        <div class="sb-item${ch===chatChannel?' active':''}" onclick="switchChatChannel('${ch}')" id="ch-${ch}">
          <span style="color:var(--text3);margin-right:4px">#</span>${ch}
        </div>`).join('')}
      <div style="padding:6px 12px;margin-top:8px;font-size:9px;color:var(--text3);letter-spacing:.9px;text-transform:uppercase;font-weight:600">Direct Messages</div>
      ${dmUsers.map(u=>`
        <div class="sb-item" onclick="switchChatChannel('dm-${u.id}')">
          <span style="width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;margin-right:6px"></span>
          ${escHtml((u.full_name||u.email).split(' ')[0])}
        </div>`).join('')}
    </div>
    <!-- Main chat area -->
    <div style="flex:1;display:flex;flex-direction:column;min-width:0">
      <div style="padding:10px 14px;border-bottom:.5px solid var(--border);font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px">
        <span style="color:var(--text3)">#</span>${chatChannel}
        <span style="font-size:10px;color:var(--text3);font-weight:400;margin-left:4px">Team channel</span>
      </div>
      <div id="chat-messages" style="flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:6px">
        <div style="text-align:center;font-size:10.5px;color:var(--text3);padding:12px 0">Loading messages...</div>
      </div>
      <div style="padding:10px 14px;border-top:.5px solid var(--border);display:flex;gap:8px;align-items:flex-end">
        <textarea id="chat-input" placeholder="Message #${chatChannel}... (Enter to send, Shift+Enter for newline)"
          style="flex:1;resize:none;border:.5px solid var(--border1);border-radius:8px;padding:8px 10px;font-size:12px;font-family:inherit;outline:none;min-height:36px;max-height:120px"
          rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChatMsg()}"
          oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
        <button class="btn btn-primary" onclick="sendChatMsg()" style="flex-shrink:0">Send</button>
      </div>
    </div>
  </div>`

  // Load recent message history from DB
  try {
    const data = await api('/api/chat/' + encodeURIComponent(chatChannel) + '?limit=50')
    const msgs = document.getElementById('chat-messages')
    if(!msgs) return
    const history = (data.data || []).reverse()  // oldest first
    if(!history.length){
      msgs.innerHTML = `<div style="text-align:center;font-size:10.5px;color:var(--text3);padding:20px 0">
        No messages yet in #${chatChannel}. Be the first to say something!
      </div>`
    } else {
      msgs.innerHTML = history.map(m => renderChatMessage(m, m.sender_id===currentUser?.id)).join('')
      msgs.scrollTop = msgs.scrollHeight
    }
  } catch(e) {
    const msgs = document.getElementById('chat-messages')
    if(msgs) msgs.innerHTML = `<div style="text-align:center;color:var(--text3);padding:20px">
      <div style="font-size:12px;margin-bottom:6px">Chat history unavailable</div>
      <div style="font-size:10.5px">${escHtml(e.message)}</div>
      <div style="font-size:10px;margin-top:8px;color:var(--text4)">Run the chat SQL migration to enable persistent messages</div>
    </div>`
  }

  // Subscribe to real-time messages on this channel via Supabase Realtime
  if(window._supabaseClient){
    _chatRealtimeChannel = window._supabaseClient
      .channel('chat-' + chatChannel)
      .on('postgres_changes', {
        event:  'INSERT',
        schema: 'public',
        table:  'chat_messages',
        filter: 'channel=eq.' + chatChannel
      }, payload => {
        // Skip if it's our own message (already shown optimistically)
        if(payload.new?.sender_id !== currentUser?.id){
          appendChatMessage(payload.new)
        }
      })
      .subscribe()
  }
}

function switchChatChannel(ch){
  chatChannel = ch
  pageChat()
}

async function sendChatMsg(){
  const input = document.getElementById('chat-input')
  if(!input) return
  const text = input.value.trim()
  if(!text) return
  input.value = ''
  input.style.height = '36px'

  // Optimistic UI — show message immediately before server confirms
  const optimisticMsg = {
    id:          'optimistic-' + Date.now(),
    channel:     chatChannel,
    sender_id:   currentUser?.id,
    sender_name: currentUser?.full_name || currentUser?.email || 'You',
    content:     text,
    created_at:  new Date().toISOString()
  }
  appendChatMessage(optimisticMsg)

  // Persist to DB — other users receive it via Supabase Realtime subscription
  try {
    await api('/api/chat/' + encodeURIComponent(chatChannel), 'POST', { content: text })
  } catch(e) {
    showToast('Message failed to send: ' + e.message, 'error')
    // Remove the optimistic message on failure
    const el = document.getElementById('optimistic-' + optimisticMsg.id.replace('optimistic-',''))
    if(el) el.remove()
  }
}

/* ═══════════════════════════════════════════════════
   GOOGLE DRIVE MODULE
   OAuth 2.0 flow: user authorizes → tokens stored in DB
   Server proxies all Drive API calls — tokens never hit frontend
═══════════════════════════════════════════════════ */
async function pageDrive(){
  setTopbar('Files & Documents','Google Drive Integration',`
    <button class="btn btn-primary" onclick="openDriveUpload()">⬆ Upload File</button>`)
  clearViewbar()
  const area = document.getElementById('page-area')
  area.innerHTML = '<div class="loading">⏳ Checking Drive connection...</div>'

  // Check if user has authorized Google Drive
  let driveStatus
  try {
    driveStatus = await api('/api/drive/status')
  } catch(e) {
    area.innerHTML = `<div class="alert alert-error">Drive status check failed: ${escHtml(e.message)}</div>`
    return
  }

  if(!driveStatus.connected){
    // Show OAuth connect prompt
    area.innerHTML = `
    <div style="max-width:520px;margin:40px auto;text-align:center">
      <div style="font-size:48px;margin-bottom:16px">📁</div>
      <div style="font-size:18px;font-weight:700;margin-bottom:8px">Connect Google Drive</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:24px;line-height:1.7">
        Connect your Google account to store and manage grant documents, 
        application files, contracts, and compliance records directly inside the CRM.
        We request access only to files created by or opened with this app.
      </div>
      <div style="background:var(--bg2);border:.5px solid var(--border);border-radius:10px;padding:16px;margin-bottom:24px;text-align:left">
        <div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">What we can access:</div>
        ${['View and manage files you open with this app','Create and organize folders for grant documents','Upload application files and compliance records','Share specific files with team members'].map(s=>`
          <div style="display:flex;align-items:center;gap:8px;padding:5px 0;font-size:11.5px;color:var(--text)">
            <span style="color:var(--green-t)">✓</span>${escHtml(s)}
          </div>`).join('')}
        <div style="margin-top:8px;padding-top:8px;border-top:.5px solid var(--border);font-size:10.5px;color:var(--text3)">
          We do NOT access your personal Drive files, Gmail, or other Google services.
        </div>
      </div>
      <button class="btn btn-primary" style="font-size:13px;padding:10px 24px" onclick="connectGoogleDrive()">
        🔗 Connect Google Drive
      </button>
      <div style="margin-top:12px;font-size:10.5px;color:var(--text3)">
        Requires a Google account. You can disconnect at any time in Settings.
      </div>
    </div>`
    return
  }

  // Drive is connected — show file browser
  window._driveFolder = window._driveFolder || 'root'
  await renderDriveFiles(window._driveFolder)
}

async function renderDriveFiles(folderId){
  const area = document.getElementById('page-area')
  area.innerHTML = '<div class="loading">⏳ Loading files...</div>'

  let files, breadcrumb
  try {
    const data = await api('/api/drive/files?folder_id=' + encodeURIComponent(folderId))
    files = data.files || []
    breadcrumb = data.breadcrumb || []
  } catch(e){
    area.innerHTML = `<div class="alert alert-error">Could not load Drive files: ${escHtml(e.message)}</div>`
    return
  }

  const iconFor = (mimeType) => {
    if(!mimeType) return '📄'
    if(mimeType.includes('folder'))         return '📁'
    if(mimeType.includes('spreadsheet') || mimeType.includes('excel')) return '📊'
    if(mimeType.includes('document') || mimeType.includes('word'))     return '📝'
    if(mimeType.includes('pdf'))            return '📕'
    if(mimeType.includes('presentation') || mimeType.includes('powerpoint')) return '📊'
    if(mimeType.includes('image'))          return '🖼'
    return '📄'
  }

  const fmtSize = (bytes) => {
    if(!bytes) return ''
    if(bytes < 1024) return bytes + ' B'
    if(bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB'
    return (bytes/1048576).toFixed(1) + ' MB'
  }

  // Build breadcrumb trail
  const breadcrumbHtml = [
    {id:'root',name:'My Drive'},...breadcrumb
  ].map((b,i,arr)=>
    i < arr.length-1
      ? `<span class="topbar-crumb" onclick="window._driveFolder='${b.id}';renderDriveFiles('${b.id}')">${escHtml(b.name)}</span><span class="topbar-crumb-sep">/</span>`
      : `<span style="font-weight:600">${escHtml(b.name)}</span>`
  ).join('')

  area.innerHTML = `
  <div class="att-wrap">
    <div class="att-toolbar">
      <div class="att-toolbar-l" style="flex-wrap:wrap;gap:8px">
        <div style="font-size:12px;color:var(--text2)">${breadcrumbHtml}</div>
      </div>
      <div class="att-toolbar-r" style="gap:6px">
        <button class="btn btn-sm" onclick="openDriveUpload('${folderId}')">⬆ Upload</button>
        <button class="btn btn-sm" onclick="createDriveFolder('${folderId}')">📁 New Folder</button>
        <button class="btn btn-sm btn-ghost" onclick="importFromDrive('${folderId}')">📥 Import to CRM</button>
        <button class="btn btn-sm btn-ghost" onclick="exportToDrive('${folderId}')">📤 Export to Drive</button>
      </div>
    </div>
    <table class="att-tbl">
      <thead><tr>
        <th style="width:36px"><input type="checkbox" class="att-chk" onchange="document.querySelectorAll('.drive-chk').forEach(c=>c.checked=this.checked)"></th>
        <th><div class="th-i">Name</div></th>
        <th><div class="th-i">Modified</div></th>
        <th><div class="th-i">Size</div></th>
        <th><div class="th-i">Actions</div></th>
      </tr></thead>
      <tbody>
      ${!files.length ? `<tr><td colspan="5">
        <div class="empty-state">
          <div class="empty-icon">📁</div>
          <div class="empty-text">This folder is empty</div>
          <button class="btn btn-primary" onclick="openDriveUpload('${folderId}')">⬆ Upload First File</button>
        </div>
      </td></tr>` : files.map(f=>`
        <tr onclick="${f.mimeType?.includes('folder') ? `window._driveFolder='${f.id}';renderDriveFiles('${f.id}')` : `window.open('${escAttr(f.webViewLink||'')}','_blank')`}" style="cursor:pointer">
          <td onclick="event.stopPropagation()"><input type="checkbox" class="att-chk drive-chk" value="${f.id}"></td>
          <td>
            <div style="display:flex;align-items:center;gap:8px">
              <span style="font-size:18px">${iconFor(f.mimeType)}</span>
              <div>
                <div style="font-size:12px;font-weight:500">${escHtml(f.name)}</div>
                ${f.owners?.[0]?.displayName ? `<div style="font-size:10px;color:var(--text3)">${escHtml(f.owners[0].displayName)}</div>` : ''}
              </div>
            </div>
          </td>
          <td class="cell-dim">${f.modifiedTime ? fmtNoteDateTime(f.modifiedTime) : '—'}</td>
          <td class="cell-dim">${fmtSize(f.size)}</td>
          <td onclick="event.stopPropagation()">
            <div style="display:flex;gap:4px">
              ${f.webViewLink ? `<a href="${escAttr(f.webViewLink)}" target="_blank" class="btn btn-xs btn-ghost">Open</a>` : ''}
              ${!f.mimeType?.includes('folder') ? `<button class="btn btn-xs" onclick="downloadDriveFile('${f.id}','${escAttr(f.name)}')">Download</button>` : ''}
              <button class="btn btn-xs" onclick="deleteDriveFile('${f.id}','${escAttr(f.name)}','${folderId}')">✕</button>
            </div>
          </td>
        </tr>`).join('')}

function openDriveUpload(folderId='root'){
  showModal('⬆ Upload to Google Drive', `
    <div class="alert alert-info" style="margin-bottom:12px">
      Files will be uploaded to ${folderId === 'root' ? 'My Drive' : 'the current folder'}.
    </div>
    <div class="form-row form-full"><div class="form-group">
      <div class="form-label">Select File</div>
      <input type="file" id="drive-upload-file" style="border:.5px solid var(--border2);border-radius:7px;padding:8px;width:100%;box-sizing:border-box">
    </div></div>
    <div id="drive-upload-progress"></div>`,
  async()=>{
    const fileEl = document.getElementById('drive-upload-file')
    if(!fileEl?.files?.[0]){ showToast('Select a file first','error'); return false }
    const file = fileEl.files[0]
    const prog = document.getElementById('drive-upload-progress')
    if(prog) prog.innerHTML = '<div class="loading">⏳ Uploading...</div>'

    const formData = new FormData()
    formData.append('file', file)
    formData.append('folder_id', folderId)

    try {
      const r = await fetch('/api/drive/upload', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token },
        body: formData
      })
      const d = await r.json()
      if(!r.ok) throw new Error(d.error || 'Upload failed')
      showToast('✅ ' + file.name + ' uploaded to Drive','success')
      window._driveFolder = folderId
      await renderDriveFiles(folderId)
    } catch(e){
      showToast('Upload failed: ' + e.message,'error')
      return false
    }
  })
}

async function downloadDriveFile(fileId, fileName){
  showToast('Preparing download...','info')
  try {
    const r = await fetch('/api/drive/download/' + fileId, {
      headers: { 'Authorization': 'Bearer ' + token }
    })
    if(!r.ok) throw new Error('Download failed')
    const blob = await r.blob()
    const url  = URL.createObjectURL(blob)
    const a = document.createElement('a')
    a.href = url; a.download = fileName; a.click()
    URL.revokeObjectURL(url)
  } catch(e){ showToast('Download failed: ' + e.message,'error') }
}

async function createDriveFolder(parentId='root'){
  showModal('📁 Create New Folder', `

}

async function deleteDriveFile(fileId, fileName, folderId){
  if(!confirm('Move "' + fileName + '" to trash in Google Drive?')) return
  try {
    await api('/api/drive/files/' + fileId, 'DELETE')
    showToast(fileName + ' moved to trash','success')
    await renderDriveFiles(folderId)
  } catch(e){ showToast(e.message,'error') }
}

// Import: pick a Drive CSV and run it through the existing import wizard
async function importFromDrive(folderId='root'){
  showModal('📥 Import from Google Drive', `
    <div style="font-size:12px;color:var(--text2);margin-bottom:12px">
      Select a CSV file from Drive to import into the CRM.
    </div>
    <div id="drive-picker-list"><div class="loading">⏳ Loading CSV files...</div></div>`,
  async()=>{
    const selected = document.querySelector('.drive-picker-item.selected')
    if(!selected){ showToast('Select a file first','error'); return false }
    const fileId   = selected.dataset.id
    const fileName = selected.dataset.name
    // Download from Drive then pipe through the existing import wizard
    try {
      const r = await fetch('/api/drive/download/' + fileId, {
        headers: { 'Authorization': 'Bearer ' + token }
      })
      if(!r.ok) throw new Error('Could not read file from Drive')
      const blob = await r.blob()
      const file = new File([blob], fileName, { type: 'text/csv' })
      closeModal()
      // Launch the import wizard with the Drive file pre-loaded
      showToast('Opening import wizard for ' + fileName,'info')
      // Determine type from filename heuristic
      const type = fileName.toLowerCase().includes('location') ? 'locations'
                 : fileName.toLowerCase().includes('wib') ? 'wibs'
                 : fileName.toLowerCase().includes('compan') ? 'companies'
                 : fileName.toLowerCase().includes('funding') ? 'funding'
                 : fileName.toLowerCase().includes('applic') ? 'applications'
                 : 'companies'
      openImportModal(type, file)  // passes pre-loaded file to existing wizard
    } catch(e){ showToast(e.message,'error'); return false }
  })

  // Load CSV files from Drive for the picker
  try {
    const data = await api('/api/drive/files?folder_id=' + folderId + '&mime=text/csv')
    const files = data.files || []
    const listEl = document.getElementById('drive-picker-list')
    if(!listEl) return
    if(!files.length){
      listEl.innerHTML = '<div style="text-align:center;color:var(--text3);padding:20px">No CSV files found in this folder.<br>Upload a CSV to Drive first, then import.</div>'
    } else {
      listEl.innerHTML = files.map(f=>`
        <div class="drive-picker-item" data-id="${escAttr(f.id)}" data-name="${escAttr(f.name)}"
             onclick="document.querySelectorAll('.drive-picker-item').forEach(e=>e.classList.remove('selected'));this.classList.add('selected')"
             style="padding:10px 12px;border:.5px solid var(--border1);border-radius:8px;margin-bottom:6px;cursor:pointer;display:flex;align-items:center;gap:10px">
          <span>📊</span>
          <div>
            <div style="font-size:12px;font-weight:500">${escHtml(f.name)}</div>
            <div style="font-size:10.5px;color:var(--text3)">${f.modifiedTime ? fmtNoteDateTime(f.modifiedTime) : ''}</div>
          </div>
        </div>`).join('')
    }
  } catch(_){}
}

async function saveProfile(){

  try{

  async()=>{

    const conf=document.getElementById('cpw-conf')?.value
    const err=document.getElementById('cpw-err')

  })
}

let _fundingSort = {col:'', dir:1}
function sortFundingBy(col){
  if(!window._funding) return
  if(_fundingSort.col===col) _fundingSort.dir *= -1
  else { _fundingSort.col=col; _fundingSort.dir=1 }
  const d=[...window._funding].sort((a,b)=>{
    const av=a[col]||'', bv=b[col]||''
    return String(av).localeCompare(String(bv), undefined, {numeric:true}) * _fundingSort.dir
  })
  document.getElementById('page-area').innerHTML = renderFundingTableInner(d)
}

function renderTasksPage(tasks){
  const now=new Date()
  const isOver=t=>{try{const m=getTaskMeta(t);if(m.done)return false;const d=m.due_date?new Date(m.due_date):null;return d&&d<now}catch{return false}}
  const isDone=t=>{try{return getTaskMeta(t).done}catch{return false}}

  // Group tasks: Overdue → Today → Future → Done
  const overdue=tasks.filter(t=>!isDone(t)&&isOver(t))
  const todayTasks=tasks.filter(t=>!isDone(t)&&!isOver(t)&&(()=>{try{const m=getTaskMeta(t);const d=m.due_date?new Date(m.due_date):null;if(!d)return false;const nd=new Date();return d.toDateString()===nd.toDateString()}catch{return false}})()
  )
  const futureTasks=tasks.filter(t=>!isDone(t)&&!isOver(t)&&!todayTasks.includes(t))
  const doneTasks=tasks.filter(t=>isDone(t))

  const rowHtml=t=>{
    const m=getTaskMeta(t),title=m.title||t.details||t.action||'Task'
    const due=m.due_date?new Date(m.due_date):null
    const over=due&&!m.done&&due<now
    const assignee=m.assigned_to||(t.user?.full_name)||''
    const record=t.record_id?`<span style="display:inline-flex;align-items:center;gap:3px;font-size:10.5px;color:var(--blue-t)">⚙️ ${t.record_id.slice(0,20)}...</span>`:'<span class="cell-dim">—</span>'
    return`<tr onclick="openTaskEdit('${t.id}')" style="cursor:pointer">
      <td onclick="event.stopPropagation()" style="width:32px">
        <input type="checkbox" class="att-chk" ${m.done?'checked':''} onchange="toggleTaskDone('${t.id}',this.checked)">
      </td>
      <td style="min-width:260px">
        <div style="font-size:12px;${m.done?'text-decoration:line-through;color:var(--text3)':''};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:360px">${title}</div>
      </td>
      <td style="width:150px">
        ${due?`<span style="font-size:11px;font-weight:600;color:${over?'var(--red-t)':'var(--text2)'}">${over?'⚠️ ':''}${fmtDateFull(due)}</span>`:'<span class="cell-dim">—</span>'}
      </td>
      <td style="width:180px" class="cell-dim" style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${record}</td>
      <td style="width:140px">
        ${assignee?`<div style="display:flex;align-items:center;gap:5px"><span style="width:18px;height:18px;border-radius:50%;background:var(--orange-bg);color:var(--orange-t);font-size:8px;font-weight:700;display:inline-flex;align-items:center;justify-content:center">${assignee.charAt(0).toUpperCase()}</span><span class="cell-dim">${assignee}</span></div>`:'<span class="cell-dim">—</span>'}
      </td>
    </tr>`
  }

function fmtDateFull(d){
  if(!d) return '—'
  const dt = d instanceof Date ? d : new Date(d)
  return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})
}

/**
 * fmtNoteDateTime — formats a note timestamp as "May 15, 2026 at 3:47 PM"
 * Used on all note cards for explicit date+time display per spec.
 * @param {string|Date} d — ISO timestamp from DB
 * @returns {string} — human-readable date and time
 */
function fmtNoteDateTime(d){
  if(!d) return '—'
  try {
    const dt = new Date(d)
    const date = dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})
    const time = dt.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true})
    return date + ' at ' + time
  } catch { return String(d) }
}

        <option value="">All tasks</option>
        <option value="pending">Pending only</option>
        <option value="done">Completed only</option>
      </select>
    </div></div>`,
  ()=>{
    const assignee=document.getElementById('tf-assignee')?.value?.toLowerCase()||''

    let d=[...(window._tasks||[])]
    if(assignee) d=d.filter(t=>(getTaskMeta(t).assigned_to||t.user?.full_name||'').toLowerCase().includes(assignee))

    renderTasksPage(d)
  })
}

function parseCSVLine(line){
  const vals=[];let cur='',inQ=false,i=0
  while(i<line.length){const c=line[i];if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i+=2}else{inQ=!inQ;i++}}else if(c===','&&!inQ){vals.push(cur.trim());cur='';i++}else{cur+=c;i++}}
  vals.push(cur.trim());return vals
}

async function processImportFile(input,type){
  const file=input.files[0];if(!file)return
  const preview=document.getElementById('import-preview')
  preview.innerHTML='<div style="padding:10px;color:var(--text3);font-size:12px">📂 Reading file...</div>'
  const isExcel=file.name.match(/\.xlsx?$/i)
  if(isExcel){
    preview.innerHTML='<div style="padding:10px;color:var(--text3);font-size:12px">📊 Loading Excel reader...</div>'
    try{
      if(!window.XLSX){await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s)})}
      const buf=await file.arrayBuffer()
      const wb=XLSX.read(buf,{type:'array'})
      const ws=wb.Sheets[wb.SheetNames[0]]
      const dataRows=XLSX.utils.sheet_to_json(ws,{defval:''})
      if(!dataRows.length){preview.innerHTML='<div class="alert alert-error">No data found in Excel file</div>';return}
      renderImportPreviewAndMap(dataRows,type,preview,file.name)
    }catch(err){preview.innerHTML=`<div class="alert alert-error">Failed to read Excel: ${err.message}</div>`}
    return
  }
  const reader=new FileReader()
  reader.onload=async e=>{
    try{
      const text=e.target.result
      const lines=text.split(/\r?\n/).filter(l=>l.trim())
      if(lines.length<2){preview.innerHTML='<div class="alert alert-error">File is empty or has no data rows</div>';return}
      const headers=parseCSVLine(lines[0])
      const dataRows=lines.slice(1).map(l=>{const vals=parseCSVLine(l);return Object.fromEntries(headers.map((h,i)=>[h,vals[i]||'']))}).filter(r=>Object.values(r).some(v=>String(v).trim()))
      renderImportPreviewAndMap(dataRows,type,preview,file.name)
    }catch(err){preview.innerHTML=`<div class="alert alert-error">Failed to parse: ${err.message}</div>`}
  }
  reader.readAsText(file)
}

function renderImportPreviewAndMap(dataRows,type,preview,filename){
  if(!dataRows.length){preview.innerHTML='<div class="alert alert-error">No data rows found</div>';return}
  const sourceHeaders=Object.keys(dataRows[0])
  const fieldDefs=IMPORT_FIELD_DEFS[type]||[]
  const previewRows=dataRows.slice(0,3)
  const batchSize=50,totalBatches=Math.ceil(dataRows.length/batchSize)

  // Auto-map source columns to target fields
  const autoMap={}
  sourceHeaders.forEach(h=>{
    const hn=h.toLowerCase().replace(/[^a-z0-9]/g,'_').replace(/_+/g,'_').replace(/^_|_$/g,'')
    const exact=fieldDefs.find(f=>f.key===hn);if(exact){autoMap[h]=exact.key;return}
    const fuzzy=fieldDefs.find(f=>{
      const fk=f.key.replace(/_/g,'');const fl=f.label.toLowerCase().replace(/[^a-z0-9]/g,'');const src=hn.replace(/_/g,'')
      return src===fk||src.includes(fk)||fk.includes(src)||src.includes(fl.slice(0,8))||fl.includes(src.slice(0,8))
    })
    if(fuzzy)autoMap[h]=fuzzy.key
  })
  window._importFieldMap=autoMap
  window._importRows=dataRows
  window._importType=type

  document.getElementById('ws1')?.classList.add('done')
  document.getElementById('ws2')?.classList.add('active')

  const safeId=h=>h.replace(/[^a-z0-9]/gi,'_')

  preview.innerHTML=`
  <div class="alert alert-success">✅ <strong>${dataRows.length.toLocaleString()} rows</strong> ready from <em>${filename}</em>${totalBatches>1?` · Will import in ${totalBatches} batches of ${batchSize}`:''}</div>
  <div style="margin:10px 0 6px;font-size:11px;font-weight:600;color:var(--text2)">📐 Field Mapping — ${sourceHeaders.length} source columns → ${fieldDefs.length} available target fields</div>
  <div style="font-size:10.5px;color:var(--text3);margin-bottom:8px">Auto-mapped where possible. Adjust as needed. Unmapped columns can be added to Notes.</div>
  <div style="max-height:280px;overflow-y:auto;border:.5px solid var(--border);border-radius:8px;padding:6px">
    ${sourceHeaders.map(h=>`<div class="field-map-row">
      <div class="fmr-source" title="${h}">${h}</div>
      <div class="fmr-arrow">→</div>
      <div class="fmr-target">
        <select id="fmap-${safeId(h)}" onchange="window._importFieldMap['${h}']=this.value" style="font-size:11px;padding:4px 7px;border:.5px solid var(--border2);border-radius:5px;background:#fff;width:100%;font-family:inherit;outline:none">
          <option value="">— Skip this column —</option>
          <option value="__notes__">→ Append to Notes</option>
          <option value="__tags__">→ Add to Tags</option>
          ${fieldDefs.map(f=>`<option value="${f.key}"${(autoMap[h]||'')==f.key?' selected':''}>${f.label}${f.required?' ★':''}</option>`).join('')}
        </select>
      </div>
    </div>`).join('')}
  </div>
  <div style="margin:10px 0 6px;font-size:11px;font-weight:600;color:var(--text2)">👁 Preview — first ${previewRows.length} rows</div>
  <div style="overflow-x:auto;max-height:140px;overflow-y:auto;border:.5px solid var(--border);border-radius:8px">
    <table style="font-size:10px;width:100%;border-collapse:collapse">
      <thead style="position:sticky;top:0"><tr>${sourceHeaders.map(h=>`<th style="padding:4px 8px;border:.5px solid var(--border);background:var(--gray);text-align:left;white-space:nowrap;font-weight:600">${h}</th>`).join('')}</tr></thead>
      <tbody>${previewRows.map(r=>`<tr>${sourceHeaders.map(h=>`<td style="padding:3px 8px;border:.5px solid var(--border);white-space:nowrap;max-width:160px;overflow:hidden;text-overflow:ellipsis">${r[h]||''}</td>`).join('')}</tr>`).join('')}</tbody>
    </table>
  </div>
  <div style="font-size:11px;color:var(--text2);margin-top:8px">Click <strong>Save</strong> to import all <strong>${dataRows.length.toLocaleString()}</strong> rows using the mapping above.${dataRows.length>batchSize?` Automatic progress tracking for ${totalBatches} batches.`:''}</div>`
}

async function runFullImport(){
  const allRows=window._importRows,type=window._importType,fieldMap=window._importFieldMap
  if(!allRows?.length){showToast('No rows to import','warn');return false}
  const btn=document.getElementById('modal-ok-btn')
  const preview=document.getElementById('import-preview')
  if(btn){btn.textContent='Importing...';btn.disabled=true}

  // Apply field mapping
  const mappedRows=allRows.map(row=>{
    const mapped={},extraNotes=[],extraTags=[]
    Object.entries(fieldMap).forEach(([src,tgt])=>{
      if(!tgt)return
      const val=String(row[src]||'').trim();if(!val)return
      if(tgt==='__notes__'){extraNotes.push(src+': '+val);return}
      if(tgt==='__tags__'){extraTags.push(val);return}
      mapped[tgt]=val
    })
    if(extraNotes.length)mapped.notes=(mapped.notes?mapped.notes+'\n':'')+extraNotes.join('\n')
    if(extraTags.length)mapped.tags=(mapped.tags?mapped.tags+',':'')+extraTags.join(',')
    return mapped
  }).filter(r=>Object.keys(r).length>0)

  const CHUNK=50,totalBatches=Math.ceil(mappedRows.length/CHUNK)
  let totalCreated=0,totalErrors=[]

  if(preview)preview.innerHTML='<div style="padding:10px;color:var(--text3);font-size:12px">⏳ Connecting to server...</div>'
  try{await api('/api/health')}catch(e){
    if(preview)preview.innerHTML='<div style="padding:10px;color:var(--amber-t);font-size:12px">⏳ Server starting up (Render free tier may be asleep) — waiting 30s...</div>'
    await new Promise(res=>setTimeout(res,30000))
    try{await api('/api/health')}catch(e2){
      if(preview)preview.innerHTML=`<div class="alert alert-error">Cannot connect: ${e2.message}</div>`
      if(btn){btn.textContent='Retry';btn.disabled=false}
      return false
    }
  }

  document.getElementById('ws2')?.classList.add('done')
  document.getElementById('ws3')?.classList.add('active')

  if(preview)preview.innerHTML=`
  <div class="import-progress">
    <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px">
      <span id="imp-label">Starting import...</span><span id="imp-pct">0%</span>
    </div>
    <div class="prog-bar-outer"><div id="imp-bar" class="prog-bar-inner" style="width:0%"></div></div>
    <div id="imp-detail" style="font-size:10px;color:var(--text3);margin-top:4px"></div>
  </div>`

  try{
    for(let b=0;b<totalBatches;b++){
      const chunk=mappedRows.slice(b*CHUNK,(b+1)*CHUNK)
      const pct=Math.round((b/totalBatches)*100)
      const label=document.getElementById('imp-label'),pctEl=document.getElementById('imp-pct'),bar=document.getElementById('imp-bar'),detail=document.getElementById('imp-detail')
      if(label)label.textContent=totalBatches>1?`Importing batch ${b+1} of ${totalBatches}...`:'Importing records...'
      if(pctEl)pctEl.textContent=pct+'%'
      if(bar)bar.style.width=pct+'%'
      if(detail)detail.textContent=`${totalCreated.toLocaleString()} imported${totalErrors.length?' · '+totalErrors.length+' skipped':''}`
      if(btn)btn.textContent=totalBatches>1?`Batch ${b+1}/${totalBatches}...`:'Importing...'
      let r,lastErr
      for(let attempt=0;attempt<3;attempt++){
        try{r=await api('/api/import/'+type,'POST',{rows:chunk,batch:b+1,totalBatches});break}
        catch(err){lastErr=err;if(attempt<2){await new Promise(res=>setTimeout(res,1200*(attempt+1)))}}
      }
      if(!r)throw lastErr
      totalCreated+=r.created||0
      if(r.errors?.length)totalErrors.push(...r.errors)
    }

    const bar=document.getElementById('imp-bar'),label=document.getElementById('imp-label'),pctEl=document.getElementById('imp-pct')
    if(bar)bar.style.width='100%';if(label)label.textContent='Import complete!';if(pctEl)pctEl.textContent='100%'

    if(preview)preview.innerHTML+=`
    <div class="import-summary">
      <div class="import-summary-item"><div class="isn" style="color:var(--green-t)">${totalCreated.toLocaleString()}</div><div class="isl">Records imported</div></div>
      <div class="import-summary-item"><div class="isn" style="color:${totalErrors.length?'var(--amber-t)':'var(--text3)'}">${totalErrors.length}</div><div class="isl">Rows skipped</div></div>
      <div class="import-summary-item"><div class="isn">${(window._importRows?.length||0).toLocaleString()}</div><div class="isl">Total rows</div></div>
    </div>${totalErrors.length?`<div class="alert alert-warn" style="margin-top:10px">⚠️ ${totalErrors.length} skipped: ${totalErrors.slice(0,3).join('; ')}${totalErrors.length>3?'...':''}</div>`:''}`

    showToast(`✅ Imported ${totalCreated.toLocaleString()} records${totalErrors.length?' ('+totalErrors.length+' skipped)':''}`,totalErrors.length?'warn':'success')
    window._importRows=null

    if(totalCreated>0){
      setTimeout(()=>{closeModal();if(['companies','wibs','locations','funding','applications'].includes(currentPage)){loadPage(currentPage)}else{loadPage(type)}},totalErrors.length>0?3000:1500)
    }else{
      if(preview&&totalErrors.length)preview.innerHTML+=`<div class="alert alert-error" style="margin-top:8px">Nothing imported. First error: ${totalErrors[0]||'Unknown'}<br><br>Common fixes:<br>• Check column names match the template<br>• Required fields must not be empty<br>• Check for duplicate names already in system</div>`
      if(btn){btn.textContent='Retry';btn.disabled=false}
      return false
    }
  }catch(e){
    const bar=document.getElementById('imp-bar'),label=document.getElementById('imp-label')
    if(bar){bar.style.background='var(--red)';bar.style.width='100%'}
    if(label)label.textContent='Import failed'
    if(preview)preview.innerHTML+=`<div class="alert alert-error" style="margin-top:8px">⚠️ ${e.message}</div>`

async function exportExcel(type){
  closeAllIE();showToast('Preparing Excel export...','info')
  try{
    if(!window.XLSX){await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';s.onload=res;s.onerror=()=>rej(new Error('Failed to load Excel library'));document.head.appendChild(s)})}
    const r=await fetch(`/api/export/${type}`,{headers:{'Authorization':`Bearer ${token}`}})
    if(!r.ok){const d=await r.json().catch(()=>({}));throw new Error(d.error||'Export failed')}
    const csvText=await r.text()
    const lines=csvText.split(/\r?\n/).filter(l=>l.trim())
    const rows=lines.map(l=>{const vals=[];let cur='',inQ=false;for(let i=0;i<l.length;i++){const c=l[i];if(c==='"'){if(inQ&&l[i+1]==='"'){cur+='"';i++}else inQ=!inQ}else if(c===','&&!inQ){vals.push(cur);cur=''}else cur+=c}vals.push(cur);return vals})
    const ws=XLSX.utils.aoa_to_sheet(rows)
    const colWidths=rows[0]?.map((_,ci)=>({wch:Math.min(40,Math.max(10,...rows.map(r=>String(r[ci]||'').length)))}))
    if(colWidths)ws['!cols']=colWidths
    const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,type.charAt(0).toUpperCase()+type.slice(1))
    const filename=`valor-${type}-${new Date().toISOString().split('T')[0]}.xlsx`
    XLSX.writeFile(wb,filename);showToast(`✅ Exported as ${filename}`,'success')
  }catch(e){showToast(`Export failed: ${e.message}`,'error')}
}

  }

  var hClean = h.replace(/[^a-z0-9 ]/g, '').trim()
  if (hClean in IMPORT_SYNONYMS) {
    var v2 = IMPORT_SYNONYMS[hClean]
    if (typeof v2 === 'object' && v2[type]) return v2[type]
    if (typeof v2 === 'string') return v2

  var fields = IMPORT_FIELDS[type] || []
  var hNoSpace = h.replace(/[^a-z0-9]/g,'')
  for (var i = 0; i < fields.length; i++) {

  }
  return '__skip'

        /* Get sample values from first 3 rows */
        var samples = []
        for (var ri=0; ri<Math.min(3, rows.length); ri++) {
          var v = rows[ri][h]
          if (v && String(v).trim()) { samples.push(String(v).trim()); break }
        }
        var sampleTxt = samples.length ? samples[0].slice(0,50)+(samples[0].length>50?'...':'') : ''

        return '<div class="fmr-grid" style="align-items:start">' +
          '<div>' +
            '<div class="fmr-src" style="font-weight:600;color:var(--text)">' + h + '</div>' +
            (sampleTxt ? '<div style="font-size:9.5px;color:var(--text3);margin-top:3px;font-style:italic">e.g. ' + sampleTxt + '</div>' : '<div style="font-size:9.5px;color:var(--text4);margin-top:2px">(empty)</div>') +
          '</div>' +
          '<div class="fmr-arrow" style="padding-top:6px">→</div>' +
          '<select class="fmr-sel" id="fmr-sel-' + i + '">' +
            '<option value="__skip">— Skip this column —</option>' +
            fields.map(function(f){ return '<option value="' + f.key + '"' + (f.key===matched?' selected':'') + '>' + (f.required?'★ ':'') + f.label + '</option>' }).join('') +
          '</select>' +
        '</div>'
      }).join('')

      /* Required field check display */
      var reqFields = fields.filter(function(f){return f.required})

      document.getElementById('iwiz-step2').innerHTML =
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">' +
          '<div style="font-size:12px">' +
            '<strong style="color:var(--text)">' + headers.length + '</strong> CSV columns · ' +
            '<span style="color:var(--green-t);font-weight:600">' + rows.length.toLocaleString() + '</span> rows' +
          '</div>' +
          '<div style="font-size:11px;color:var(--text3)">' +
            '<span style="color:var(--green-t);font-weight:600">' + matchCount + '</span> / ' + headers.length + ' auto-matched' +
          '</div>' +
        '</div>' +
        '<div style="background:var(--bg2);border-radius:6px;padding:8px 10px;margin-bottom:10px;font-size:10.5px;color:var(--text2)">' +
          '★ = Required. ' + reqFields.map(function(f){return '<strong>'+f.label+'</strong>'}).join(', ') + ' must be mapped to import.' +
        '</div>' +
        '<div style="display:grid;grid-template-columns:1fr 28px 1fr;gap:4px;padding:0 2px 6px;font-size:9.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px">' +
          '<span>Your CSV Column + Sample</span><span></span><span>Maps to CRM Field</span>' +
        '</div>' +
        '<div style="max-height:360px;overflow-y:auto;border:.5px solid var(--border1);border-radius:8px;padding:6px 8px">' + rowsHtml + '</div>'

      iwizSetStep(2)
      document.getElementById('iwiz-back').style.display = 'inline-flex'
      var nb = document.getElementById('iwiz-next')
      nb.disabled = false
      nb.textContent = '▶ Start Import'

    } catch(e) {
      document.getElementById('iwiz-file-err').innerHTML = '<div class="alert alert-error">Error reading file: ' + e.message + '</div>'
      nextBtn.disabled = false
      nextBtn.textContent = 'Next: Map Fields →'
    }
    return
  }

  /* ── STEP 2 → 3: Validate mapping and run import ── */
  if (step === 2) {
    var rows2 = window._iwizRows
    if (!rows2 || !rows2.length) { showToast('No data to import','error'); return }

    var headers2 = Object.keys(rows2[0])
    var fieldMap = {}
    headers2.forEach(function(h, i){
      var sel = document.getElementById('fmr-sel-' + i)
      if (sel && sel.value && sel.value !== '__skip') fieldMap[h] = sel.value
    })

    /* Validate required fields are mapped */
    var fields2 = IMPORT_FIELDS[type] || []
    var reqFields2 = fields2.filter(function(f){return f.required})
    var missing = reqFields2.filter(function(rf){
      return !Object.values(fieldMap).includes(rf.key)
    })
    if (missing.length) {
      showToast('Please map required field: ' + missing.map(function(f){return f.label}).join(', '), 'error')
      return
    }

    /* Remap all rows */
    var mapped = rows2.map(function(row){
      var out = {}
      Object.keys(fieldMap).forEach(function(csvCol){
        var val = row[csvCol]
        if (val !== undefined && String(val).trim()) out[fieldMap[csvCol]] = String(val).trim()
      })
      return out
    })

    /* Switch to step 3 - progress view */
    iwizSetStep(3)
    document.getElementById('iwiz-next').style.display = 'none'
    document.getElementById('iwiz-back').style.display = 'none'
    document.getElementById('iwiz-cancel').textContent = 'Close'

    document.getElementById('iwiz-step3').innerHTML =
      '<div style="font-size:13px;font-weight:600;margin-bottom:10px">Importing ' + mapped.length.toLocaleString() + ' records...</div>' +
      '<div class="prog-outer" style="margin-bottom:8px"><div class="prog-inner" id="iwiz-prog" style="width:0%"></div></div>' +
      '<div id="iwiz-prog-label" style="font-size:11px;color:var(--text3);margin-bottom:16px">Starting...</div>' +
      '<div id="iwiz-result"></div>'

    /* Run batched import */
    var BATCH = 200
    var total3 = mapped.length
    var totalBatches = Math.ceil(total3 / BATCH)
    var totalCreated = 0
    var allErrors = []

    for (var b=0; b<totalBatches; b++) {
      var batch = mapped.slice(b*BATCH, (b+1)*BATCH)
      var pct = Math.round(((b+1)/totalBatches)*100)
      var progEl = document.getElementById('iwiz-prog')
      var labelEl = document.getElementById('iwiz-prog-label')
      if (progEl) progEl.style.width = pct+'%'
      if (labelEl) labelEl.textContent = 'Batch '+(b+1)+' of '+totalBatches+' ('+pct+'% complete) — '+totalCreated+' imported so far'
      try {
        var res = await api('/api/import/'+type, 'POST', {rows:batch, batch:b+1, totalBatches:totalBatches})
        totalCreated += res.created || 0
        if (res.errors && res.errors.length) allErrors = allErrors.concat(res.errors.slice(0,5))
      } catch(e2) {
        allErrors.push('Batch '+(b+1)+' failed: '+e2.message)
      }
    }

    /* Final summary */
    var skipped = total3 - totalCreated
    var progEl2 = document.getElementById('iwiz-prog')
    var labelEl2 = document.getElementById('iwiz-prog-label')
    if (progEl2) { progEl2.style.width='100%'; progEl2.style.background = totalCreated>0 ? 'var(--green)' : 'var(--red)' }
    if (labelEl2) labelEl2.textContent = 'Done — '+totalCreated.toLocaleString()+' imported · '+skipped.toLocaleString()+' skipped'

    var resultEl = document.getElementById('iwiz-result')
    if (resultEl) {
      resultEl.innerHTML =
        '<div class="import-summary" style="margin-bottom:12px">' +
          '<div class="isn-card"><div class="isn-n">'+total3.toLocaleString()+'</div><div class="isn-l">Total rows</div></div>' +
          '<div class="isn-card"><div class="isn-n" style="color:var(--green-t)">'+totalCreated.toLocaleString()+'</div><div class="isn-l">Imported</div></div>' +
          '<div class="isn-card"><div class="isn-n" style="color:'+(allErrors.length?'var(--red-t)':'var(--green-t)')+'">'+allErrors.length+'</div><div class="isn-l">Errors</div></div>' +
        '</div>' +
        (allErrors.length ? '<div class="alert alert-warn" style="font-size:10.5px;max-height:120px;overflow-y:auto;margin-bottom:10px"><strong>Errors:</strong><br>'+allErrors.slice(0,8).join('<br>')+'</div>' : '') +
        (totalCreated===0 ?
          '<div class="alert alert-error" style="margin-bottom:10px">' +
            '<strong>Nothing imported.</strong> Error: ' + (allErrors[0]||'All rows were skipped') + '<br><br>' +
            '<strong>What to do:</strong><br>' +
            '• Check that your required column is mapped correctly above<br>' +
            '• The required field for ' + type + ' is: <strong>' + (IMPORT_FIELDS[type]||[]).filter(function(f){return f.required}).map(function(f){return f.label}).join(', ') + '</strong><br>' +
            '• <a href="/api/template/'+type+'" target="_blank" class="cell-link">Download the CSV template</a> to see the exact format' +
          '</div>' : '') +
        '<div style="display:flex;gap:8px;justify-content:center;margin-top:8px">' +
          '<button class="btn btn-primary" onclick="closeImportWizard();loadPage(\''+type+'\')">✓ Done — View ' + (type==='wibs'?'Workforce Boards':type.charAt(0).toUpperCase()+type.slice(1)) + '</button>' +
          (totalCreated===0 ? '<button class="btn" onclick="iwizSetStep(2);document.getElementById(\'iwiz-next\').style.display=\'\';document.getElementById(\'iwiz-next\').textContent=\'▶ Start Import\';document.getElementById(\'iwiz-back\').style.display=\'inline-flex\'">← Fix Mapping</button>' : '') +
        '</div>'
    }
    return
  }
}

function iwizBack() {
  if (window._iwizStep === 2) {
    iwizSetStep(1)
    document.getElementById('iwiz-back').style.display = 'none'
    document.getElementById('iwiz-next').style.display = ''
    document.getElementById('iwiz-next').textContent = 'Next: Map Fields →'
    document.getElementById('iwiz-next').disabled = false
  }
}


function parseCSVText(text) {
  var lines = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n')
  if (!lines.length) return []
  function parseLine(line) {
    var fields=[],cur='',inQ=false
    for(var i=0;i<line.length;i++){
      var ch=line[i]
      if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++}else inQ=!inQ}
      else if(ch===','&&!inQ){fields.push(cur);cur=''}
      else cur+=ch
    }
    fields.push(cur); return fields
  }
  var headers=parseLine(lines[0]).map(function(h){return h.trim().replace(/^"|"$/g,'')})
  var rows=[]
  for(var i=1;i<lines.length;i++){
    if(!lines[i].trim())continue
    var vals=parseLine(lines[i]),row={}
    headers.forEach(function(h,j){row[h]=(vals[j]||'').trim().replace(/^"|"$/g,'')})
    rows.push(row)
  }
  return rows
}


render()
</script>
