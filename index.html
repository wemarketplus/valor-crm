<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valor Workforce Funding</title>
<style>

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --nv:#0B1E3C;--nv2:#152d54;--nv3:#1e3d6e;
  --gd:#C9A84C;--gd2:#E8C96A;--cream:#E8D9A8;
  --white:#fff;--gray:#f8f7f6;--gray2:#f3f2f1;
  --border:#e5e7eb;--border2:#d1d5db;
  --text:#111827;--text2:#6b7280;--text3:#9ca3af;
  --green:#16a34a;--green-bg:#dcfce7;--green-t:#166534;
  --amber:#d97706;--amber-bg:#fef3c7;--amber-t:#92400e;
  --red:#dc2626;--red-bg:#fee2e2;--red-t:#991b1b;
  --blue:#2563eb;--blue-bg:#dbeafe;--blue-t:#1e40af;
  --purple:#7c3aed;--purple-bg:#ede9fe;--purple-t:#5b21b6;
  --teal:#0d9488;--teal-bg:#ccfbf1;--teal-t:#134e4a;
  --orange:#ea580c;--orange-bg:#fff7ed;--orange-t:#9a3412;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;background:var(--gray);color:var(--text);height:100vh;overflow:hidden;font-size:13px}
.app{display:flex;height:100vh}

/* ── SIDEBAR ── */
.sidebar{width:208px;background:var(--nv);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.logo-area{padding:13px 14px 10px;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0}
.logo-top{display:flex;align-items:center;gap:8px}
.logo-icon{width:28px;height:28px;border-radius:7px;background:rgba(201,168,76,.25);border:.5px solid rgba(201,168,76,.4);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.logo-name{font-size:11.5px;font-weight:600;color:var(--cream);line-height:1.25}
.logo-sub{font-size:8.5px;color:rgba(255,255,255,.28);margin-top:1px;letter-spacing:.6px;text-transform:uppercase}
.nav-scroll{flex:1;overflow-y:auto;padding:5px 0 0}
.nav-scroll::-webkit-scrollbar{width:3px}
.nav-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.nav-sec{padding:8px 12px 3px;font-size:9px;color:rgba(255,255,255,.22);letter-spacing:1.1px;text-transform:uppercase;font-weight:600}
.nav-item{display:flex;align-items:center;gap:7px;padding:6px 12px;font-size:11.5px;color:rgba(255,255,255,.5);cursor:pointer;border-left:2px solid transparent;transition:all .1s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85)}
.nav-item.active{background:rgba(201,168,76,.14);color:var(--gd2);border-left-color:var(--gd)}
.nav-item .ni{font-size:13px;width:15px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:rgba(220,60,60,.9);color:#fff;font-size:8px;font-weight:600;padding:1px 5px;border-radius:8px;flex-shrink:0}
.nav-badge.green{background:#16a34a}
.nav-badge.amber{background:#d97706}
.nav-divider{height:.5px;background:rgba(255,255,255,.06);margin:5px 0}
.nav-group-toggle{display:flex;align-items:center;gap:5px;padding:5px 12px 2px;font-size:9px;color:rgba(255,255,255,.22);cursor:pointer;letter-spacing:.5px;text-transform:uppercase}
.nav-sub{padding-left:8px}
.user-foot{padding:9px 12px;border-top:1px solid rgba(255,255,255,.07);flex-shrink:0}
.user-row{display:flex;align-items:center;gap:8px}
.user-av{width:26px;height:26px;border-radius:50%;background:rgba(201,168,76,.22);display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:600;color:var(--gd);flex-shrink:0}
.user-nm{font-size:10.5px;font-weight:500;color:rgba(255,255,255,.75);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-rl{font-size:8.5px;color:rgba(255,255,255,.3);text-transform:capitalize}
.user-actions{margin-left:auto;display:flex;gap:3px}
.user-act-btn{background:none;border:none;color:rgba(255,255,255,.25);cursor:pointer;font-size:13px;padding:2px;transition:color .1s}
.user-act-btn:hover{color:rgba(255,255,255,.6)}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:var(--white);border-bottom:.5px solid var(--border);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px}
.topbar-left{display:flex;align-items:center;gap:8px;min-width:0}
.page-title{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap}
.topbar-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap}
.topbar-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.btn{padding:5px 11px;border-radius:7px;font-size:11.5px;cursor:pointer;border:.5px solid var(--border);background:var(--white);color:var(--text);font-family:inherit;transition:all .1s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn:hover{background:var(--gray2)}
.btn-primary{background:var(--nv);color:var(--cream);border-color:var(--nv);font-weight:600}
.btn-primary:hover{background:var(--nv2)}
.btn-success{background:var(--green-bg);color:var(--green-t);border-color:transparent;font-weight:500}
.btn-danger{background:var(--red-bg);color:var(--red-t);border-color:transparent}
.btn-ghost{background:transparent;border-color:transparent;color:var(--text2)}
.btn-ghost:hover{background:var(--gray2);color:var(--text)}
.btn-sm{padding:4px 9px;font-size:11px}
.btn-xs{padding:2px 7px;font-size:10px;border-radius:5px}
.content{flex:1;overflow-y:auto;padding:14px 16px}
.content::-webkit-scrollbar{width:5px}
.content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── TABS ── */
.record-tabs{display:flex;align-items:center;gap:0;border-bottom:.5px solid var(--border);background:var(--white);padding:0 16px;flex-shrink:0;overflow-x:auto}
.record-tab{padding:9px 14px;font-size:12px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .1s;display:flex;align-items:center;gap:5px}
.record-tab:hover{color:var(--text)}
.record-tab.active{color:var(--nv);border-bottom-color:var(--nv);font-weight:500}
.record-tab .tab-count{font-size:10px;background:var(--gray2);color:var(--text2);padding:1px 5px;border-radius:10px}
.record-tab.active .tab-count{background:var(--blue-bg);color:var(--blue-t)}

/* ── CARDS ── */
.card{background:var(--white);border:.5px solid var(--border);border-radius:10px;overflow:hidden}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:.5px solid var(--border)}
.card-title{font-size:12px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px}
.card-body{padding:12px 14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}

/* ── METRIC CARDS ── */
.metric{background:var(--white);border:.5px solid var(--border);border-radius:10px;padding:12px 14px}
.metric-label{font-size:10px;color:var(--text2);margin-bottom:4px;font-weight:500}
.metric-value{font-size:22px;font-weight:600;color:var(--text);line-height:1}
.metric-sub{font-size:10px;color:var(--text3);margin-top:3px}
.metric-bar{height:3px;border-radius:2px;background:var(--gray2);margin-top:6px;overflow:hidden}
.metric-fill{height:100%;border-radius:2px;background:var(--nv)}

/* ── REVENUE BAND ── */
.rev-band{background:var(--nv);border-radius:10px;padding:12px 16px;display:flex;gap:0;flex-wrap:wrap;margin-bottom:12px}
.rev-item{flex:1;min-width:110px;padding:0 12px;border-right:.5px solid rgba(255,255,255,.1)}
.rev-item:first-child{padding-left:0}
.rev-item:last-child{border-right:none}
.rev-n{font-size:18px;font-weight:600;color:var(--cream)}
.rev-l{font-size:9px;color:rgba(255,255,255,.4);margin-top:2px}

/* ── TABLE ── */
.tbl-wrap{background:var(--white);border:.5px solid var(--border);border-radius:10px;overflow:hidden}
.tbl-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:.5px solid var(--border);gap:8px;flex-wrap:wrap}
.tbl-head-left{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tbl-title{font-size:12px;font-weight:600;color:var(--text)}
.search-inp{display:flex;align-items:center;gap:5px;background:var(--gray2);border:.5px solid var(--border);border-radius:6px;padding:5px 9px}
.search-inp input{background:none;border:none;outline:none;font-size:11px;color:var(--text);width:150px;font-family:inherit}
.search-inp input::placeholder{color:var(--text3)}
.filter-btn{display:flex;align-items:center;gap:4px;padding:5px 9px;border-radius:6px;border:.5px solid var(--border);background:var(--white);font-size:11px;color:var(--text2);cursor:pointer}
.filter-btn:hover{background:var(--gray2)}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:7px 12px;color:var(--text2);font-weight:500;border-bottom:.5px solid var(--border);font-size:10px;white-space:nowrap;background:var(--gray);user-select:none;cursor:pointer}
th:hover{background:var(--gray2)}
td{padding:8px 12px;border-bottom:.5px solid #f9fafb;color:var(--text);font-size:11.5px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa;cursor:pointer}
.tbl-footer{padding:7px 14px;font-size:10px;color:var(--text3);border-top:.5px solid var(--border);background:var(--gray);display:flex;align-items:center;justify-content:space-between}

/* ── PILLS ── */
.pill{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:9.5px;font-weight:600;white-space:nowrap}
.dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.p-green{background:var(--green-bg);color:var(--green-t)}
.p-amber{background:var(--amber-bg);color:var(--amber-t)}
.p-red{background:var(--red-bg);color:var(--red-t)}
.p-blue{background:var(--blue-bg);color:var(--blue-t)}
.p-purple{background:var(--purple-bg);color:var(--purple-t)}
.p-teal{background:var(--teal-bg);color:var(--teal-t)}
.p-orange{background:var(--orange-bg);color:var(--orange-t)}
.p-gray{background:var(--gray2);color:var(--text2)}
.d-green{background:#22c55e}.d-amber{background:#f59e0b}.d-red{background:#ef4444}.d-blue{background:#3b82f6}.d-purple{background:#8b5cf6}.d-teal{background:#14b8a6}.d-gray{background:#9ca3af}

/* ── MODALS ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal{background:var(--white);border-radius:14px;width:100%;max-width:540px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.18)}
.modal-lg{max-width:720px}
.modal-xl{max-width:900px}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:15px 20px;border-bottom:.5px solid var(--border);position:sticky;top:0;background:var(--white);z-index:1}
.modal-title{font-size:13px;font-weight:600;color:var(--text)}
.modal-close{background:none;border:none;cursor:pointer;color:var(--text2);font-size:18px;padding:2px;line-height:1;border-radius:4px}
.modal-close:hover{background:var(--gray2);color:var(--text)}
.modal-body{padding:18px 20px}
.modal-foot{padding:13px 20px;border-top:.5px solid var(--border);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:var(--white)}

/* ── FORMS ── */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-full{grid-template-columns:1fr}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-label{font-size:11px;font-weight:500;color:var(--text2)}
.form-req{color:var(--red)}
input,select,textarea{border:.5px solid var(--border2);border-radius:7px;padding:7px 10px;font-size:11.5px;color:var(--text);font-family:inherit;outline:none;transition:border .1s;width:100%;background:var(--white)}
input:focus,select:focus,textarea:focus{border-color:var(--nv)}
textarea{resize:vertical;min-height:70px}
.checkbox-row{display:flex;align-items:center;gap:8px;font-size:11.5px;cursor:pointer}
.checkbox-row input[type=checkbox]{width:auto;width:14px;height:14px}
.alert{padding:9px 12px;border-radius:7px;font-size:11px;margin-bottom:10px;display:flex;align-items:flex-start;gap:7px}
.alert-error{background:var(--red-bg);color:var(--red-t);border:.5px solid #fca5a5}
.alert-success{background:var(--green-bg);color:var(--green-t);border:.5px solid #86efac}
.alert-info{background:var(--blue-bg);color:var(--blue-t);border:.5px solid #93c5fd}
.alert-warn{background:var(--amber-bg);color:var(--amber-t);border:.5px solid #fcd34d}

/* ── WIB PROFILE ── */
.profile-layout{display:flex;gap:12px;height:100%}
.profile-left{width:280px;flex-shrink:0;display:flex;flex-direction:column;gap:10px}
.profile-right{flex:1;min-width:0;display:flex;flex-direction:column;gap:10px}
.profile-header{background:var(--white);border:.5px solid var(--border);border-radius:10px;padding:14px}
.profile-avatar{width:44px;height:44px;border-radius:10px;background:var(--nv);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;color:var(--cream);margin-bottom:10px}
.profile-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px}
.profile-meta{font-size:11px;color:var(--text2);margin-bottom:10px}
.field-row{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:.5px solid var(--gray2);font-size:11.5px}
.field-row:last-child{border-bottom:none}
.field-key{color:var(--text2);width:110px;flex-shrink:0;font-size:11px;padding-top:1px}
.field-val{color:var(--text);flex:1;word-break:break-word}
.field-link{color:var(--blue);cursor:pointer;text-decoration:none}
.field-link:hover{text-decoration:underline}

/* ── NOTES ── */
.note-compose{background:var(--white);border:.5px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:10px}
.note-compose textarea{border:.5px solid var(--border2);border-radius:7px;width:100%;padding:9px 11px;font-size:12px;font-family:inherit;resize:none;min-height:80px;outline:none;transition:border .1s}
.note-compose textarea:focus{border-color:var(--nv)}
.note-compose-foot{display:flex;align-items:center;justify-content:space-between;margin-top:8px;flex-wrap:wrap;gap:6px}
.note-actions{display:flex;gap:5px;flex-wrap:wrap}
.note-card{background:var(--white);border:.5px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.note-meta{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.note-av{width:24px;height:24px;border-radius:50%;background:var(--blue-bg);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:var(--blue-t);flex-shrink:0}
.note-author{font-size:11px;font-weight:500;color:var(--text)}
.note-time{font-size:10px;color:var(--text3)}
.note-type{font-size:9px;font-weight:600;padding:1px 6px;border-radius:4px}
.note-content{font-size:12px;color:var(--text);line-height:1.6;white-space:pre-wrap}
.aircall-note{background:#f0fdf4;border:.5px solid #86efac;border-radius:10px;padding:12px 14px;margin-bottom:8px}
.aircall-header{font-size:10px;font-weight:700;color:var(--green-t);letter-spacing:.3px;margin-bottom:8px;padding-bottom:7px;border-bottom:.5px solid #86efac}
.aircall-body{font-size:11.5px;color:var(--text);line-height:1.65}
.aircall-section{margin-top:8px}
.aircall-section-title{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}

/* ── TASKS ── */
.task-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:.5px solid var(--gray2)}
.task-row:last-child{border-bottom:none}
.task-check{width:16px;height:16px;border-radius:4px;border:.5px solid var(--border2);background:var(--white);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px}
.task-check.done{background:var(--green);border-color:var(--green);color:#fff}
.task-title{flex:1;font-size:12px;color:var(--text)}
.task-title.done{text-decoration:line-through;color:var(--text3)}
.task-due{font-size:10px;color:var(--text3);white-space:nowrap}
.task-due.overdue{color:var(--red);font-weight:500}
.task-assignee{width:22px;height:22px;border-radius:50%;background:var(--blue-bg);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:var(--blue-t);flex-shrink:0}

/* ── SCORE BAR ── */
.score-wrap{display:flex;align-items:center;gap:6px}
.score-bar{height:4px;border-radius:2px;background:var(--gray2);overflow:hidden;width:48px}
.score-fill{height:100%;border-radius:2px;background:var(--nv)}
.score-n{font-size:10px;color:var(--text2);width:20px}

/* ── AI PANEL ── */
.ai-panel{background:var(--white);border:.5px solid var(--border);border-radius:10px;overflow:hidden}
.ai-header{background:var(--nv);padding:10px 14px;display:flex;align-items:center;gap:7px}
.ai-title{font-size:12px;font-weight:600;color:var(--cream)}
.ai-badge{font-size:9px;background:rgba(201,168,76,.3);color:var(--gd);padding:1px 6px;border-radius:10px;font-weight:600}
.ai-body{padding:10px}
.ai-msg{padding:8px 10px;border-radius:7px;font-size:11.5px;line-height:1.6;margin-bottom:7px}
.ai-msg-user{background:var(--blue-bg);color:var(--blue-t);margin-left:20px}
.ai-msg-ai{background:var(--gray2);color:var(--text);margin-right:20px}
.ai-input-row{display:flex;gap:6px;margin-top:8px}
.ai-input{flex:1;border:.5px solid var(--border2);border-radius:7px;padding:7px 10px;font-size:11px;font-family:inherit;outline:none}
.ai-input:focus{border-color:var(--nv)}
.ai-quick-btns{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.ai-quick-btn{padding:4px 9px;border-radius:6px;border:.5px solid var(--border);background:var(--white);font-size:10px;color:var(--text2);cursor:pointer;transition:all .1s}
.ai-quick-btn:hover{background:var(--blue-bg);color:var(--blue-t);border-color:var(--blue)}

/* ── ACTIVITY ── */
.activity-row{display:flex;gap:9px;padding:8px 0;border-bottom:.5px solid var(--gray2)}
.activity-row:last-child{border-bottom:none}
.activity-icon{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;margin-top:1px}
.activity-body{flex:1}
.activity-text{font-size:11.5px;color:var(--text);line-height:1.4}
.activity-time{font-size:10px;color:var(--text3);margin-top:2px}

/* ── CHAT ── */
.chat-layout{display:flex;height:calc(100vh - 120px);gap:0}
.chat-sidebar{width:240px;border-right:.5px solid var(--border);background:var(--white);display:flex;flex-direction:column;flex-shrink:0}
.chat-sidebar-hd{padding:12px 14px;border-bottom:.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.chat-sidebar-title{font-size:12px;font-weight:600}
.chat-list{flex:1;overflow-y:auto}
.chat-item{display:flex;align-items:center;gap:9px;padding:9px 14px;cursor:pointer;transition:background .1s;border-bottom:.5px solid var(--gray)}
.chat-item:hover{background:var(--gray2)}
.chat-item.active{background:var(--blue-bg)}
.chat-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.chat-name{font-size:12px;font-weight:500;color:var(--text)}
.chat-preview{font-size:10.5px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px}
.chat-time{font-size:9.5px;color:var(--text3);margin-left:auto;flex-shrink:0}
.chat-unread{width:16px;height:16px;background:var(--blue);color:#fff;border-radius:50%;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chat-main{flex:1;display:flex;flex-direction:column;background:var(--white)}
.chat-topbar{padding:11px 16px;border-bottom:.5px solid var(--border);display:flex;align-items:center;gap:10px}
.chat-messages{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.msg{display:flex;gap:9px;align-items:flex-start}
.msg.mine{flex-direction:row-reverse}
.msg-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.msg-bubble{max-width:65%;padding:8px 12px;border-radius:10px;font-size:12px;line-height:1.5}
.msg-bubble.other{background:var(--gray2);color:var(--text);border-bottom-left-radius:3px}
.msg-bubble.mine-b{background:var(--nv);color:#fff;border-bottom-right-radius:3px}
.msg-meta{font-size:9.5px;color:var(--text3);margin-top:3px;text-align:right}
.chat-input-row{padding:12px 16px;border-top:.5px solid var(--border);display:flex;gap:8px;align-items:flex-end}
.chat-input{flex:1;border:.5px solid var(--border2);border-radius:8px;padding:9px 12px;font-size:12px;font-family:inherit;outline:none;resize:none;min-height:40px;max-height:120px}
.chat-input:focus{border-color:var(--nv)}

/* ── IMPORT/EXPORT DROPDOWN ── */
.ie-dropdown{position:relative;display:inline-block}
.ie-menu{position:absolute;right:0;top:calc(100% + 4px);background:var(--white);border:.5px solid var(--border);border-radius:9px;box-shadow:0 8px 24px rgba(0,0,0,.1);min-width:170px;z-index:50;overflow:hidden}
.ie-item{display:flex;align-items:center;gap:8px;padding:9px 13px;font-size:12px;color:var(--text);cursor:pointer;transition:background .1s}
.ie-item:hover{background:var(--gray2)}
.ie-item .ie-icon{font-size:13px;width:15px;text-align:center;color:var(--text2)}
.ie-sep{height:.5px;background:var(--border);margin:3px 0}

/* ── NOTIFICATIONS ── */
.notif-panel{position:fixed;right:16px;top:56px;width:360px;background:var(--white);border:.5px solid var(--border);border-radius:12px;box-shadow:0 12px 40px rgba(0,0,0,.12);z-index:100;max-height:500px;overflow:hidden;display:flex;flex-direction:column}
.notif-header{padding:12px 16px;border-bottom:.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.notif-title{font-size:13px;font-weight:600}
.notif-body{overflow-y:auto;flex:1}
.notif-item{display:flex;gap:10px;padding:11px 16px;border-bottom:.5px solid var(--gray);cursor:pointer;transition:background .1s}
.notif-item:hover{background:var(--gray2)}
.notif-item.unread{background:#fefce8}
.notif-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.notif-text{font-size:11.5px;color:var(--text);line-height:1.4;flex:1}
.notif-time{font-size:10px;color:var(--text3);margin-top:3px}

/* ── AUDIT LOGS ── */
.audit-row{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:.5px solid var(--gray2);font-size:11.5px}
.audit-row:last-child{border-bottom:none}
.audit-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.audit-body{flex:1}
.audit-action{font-weight:500;color:var(--text)}
.audit-detail{color:var(--text2);margin-top:1px;font-size:11px}
.audit-time{font-size:10px;color:var(--text3);white-space:nowrap;flex-shrink:0}

/* ── MISC ── */
.empty-state{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-icon{font-size:28px;margin-bottom:8px}
.empty-text{font-size:13px;color:var(--text2);margin-bottom:4px}
.empty-sub{font-size:11px}
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--text2);gap:8px;font-size:12px}
.tag{display:inline-block;padding:1px 7px;border-radius:4px;font-size:10px;border:.5px solid var(--border);color:var(--text2);background:var(--gray2);margin:1px}
.divider{height:.5px;background:var(--border);margin:12px 0}
.link{color:var(--blue);cursor:pointer;font-size:11.5px}
.link:hover{text-decoration:underline}
.action-btns{display:flex;gap:4px}
.action-btn{padding:3px 8px;border-radius:5px;font-size:10.5px;cursor:pointer;border:.5px solid var(--border);background:var(--white);color:var(--text2);font-family:inherit;transition:all .1s;white-space:nowrap}
.action-btn:hover{background:var(--gray2);color:var(--text)}
.action-btn.del:hover{background:var(--red-bg);color:var(--red-t);border-color:#fca5a5}
.tooltip{position:relative}
.tooltip::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);background:#1f2937;color:#fff;font-size:10px;padding:3px 8px;border-radius:5px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;z-index:300}
.tooltip:hover::after{opacity:1}
.inline-edit{background:none;border:none;border-bottom:.5px dashed var(--border2);outline:none;font-size:inherit;color:inherit;font-family:inherit;cursor:text;width:100%}
.inline-edit:focus{border-bottom-color:var(--nv)}
.progress-bar{height:6px;border-radius:3px;background:var(--gray2);overflow:hidden;margin-top:4px}
.progress-fill{height:100%;border-radius:3px;background:var(--nv)}
.stat-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:.5px solid var(--gray2);font-size:11.5px}
.stat-row:last-child{border-bottom:none}
.stat-label{color:var(--text2)}
.stat-value{font-weight:500;color:var(--text)}
.highlight-card{background:var(--white);border:.5px solid var(--border);border-radius:9px;padding:11px 13px}
.highlight-label{font-size:9.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;font-weight:500}
.highlight-content{font-size:12px;color:var(--text);line-height:1.4}
.file-row{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:.5px solid var(--gray2);font-size:11.5px}
.file-row:last-child{border-bottom:none}
.file-icon{font-size:18px;flex-shrink:0}
.file-name{flex:1;font-weight:500;color:var(--text)}
.file-meta{font-size:10px;color:var(--text3)}
.file-actions{display:flex;gap:4px}
.contact-card{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:.5px solid var(--gray2)}
.contact-card:last-child{border-bottom:none}
.contact-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.contact-info{flex:1}
.contact-name{font-size:12px;font-weight:500;color:var(--text)}
.contact-title-t{font-size:10.5px;color:var(--text2)}
.contact-actions{display:flex;gap:4px}
.timeline-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.timeline-line{width:1px;background:var(--border);flex-shrink:0;margin:2px 0 2px 3.5px;min-height:20px}
.invoice-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 80px;gap:8px;align-items:center;padding:9px 0;border-bottom:.5px solid var(--gray2);font-size:11.5px}
.invoice-row:last-child{border-bottom:none}
.invoice-hdr{font-weight:500;font-size:10px;color:var(--text2)}


/* ── ADDITIONAL UTILITY CLASSES (added for enhanced features) ── */
#page-area{flex:1;overflow-y:auto;padding:14px 16px}
#page-area::-webkit-scrollbar{width:5px}
#page-area::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* Attio-style viewbar */
.viewbar{height:38px;background:var(--white);border-bottom:.5px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:4px;flex-shrink:0;overflow-x:auto}
.viewbar::-webkit-scrollbar{display:none}
.vb-view{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;border:.5px solid transparent;color:var(--text2);transition:all .1s}
.vb-view:hover{background:var(--gray2);color:var(--text)}
.vb-view.active{background:var(--blue-bg);color:var(--blue-t);border-color:rgba(37,99,235,.15)}
.vb-view .vc{font-size:9.5px;background:rgba(0,0,0,.06);padding:1px 5px;border-radius:8px;font-weight:600}
.vb-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:5px;font-size:11px;border:.5px solid var(--border2);background:var(--white);color:var(--text);cursor:pointer;white-space:nowrap}
.vb-chip:hover{background:var(--gray2)}
.vb-chip-val{font-weight:600;color:var(--orange);background:var(--orange-bg);padding:0 5px;border-radius:4px;font-size:10px}
.vb-sep{width:.5px;height:18px;background:var(--border);flex-shrink:0;margin:0 2px}
.vb-sort{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:5px;font-size:11px;border:.5px solid var(--border);background:var(--gray2);color:var(--text2);cursor:pointer;white-space:nowrap}

/* Record tabs (enhanced) */
.record-tabs{display:flex;align-items:center;background:var(--white);border-bottom:.5px solid var(--border);padding:0 16px;flex-shrink:0;overflow-x:auto;height:38px}
.record-tabs::-webkit-scrollbar{display:none}
.rtab{padding:0 14px;height:100%;font-size:12px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .1s;display:flex;align-items:center;gap:5px}
.rtab:hover{color:var(--text)}
.rtab.active{color:var(--text);border-bottom-color:var(--text);font-weight:500}
.rtab .tc{font-size:9.5px;background:var(--gray2);color:var(--text3);padding:1px 6px;border-radius:10px;font-weight:500}
.rtab.active .tc{background:var(--blue-bg);color:var(--blue-t)}

/* Attio-style table */
.att-wrap{background:var(--white);border:.5px solid var(--border);border-radius:10px;overflow:hidden}
.att-toolbar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:.5px solid var(--border);gap:8px;flex-wrap:wrap}
.att-toolbar-l{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.att-toolbar-r{display:flex;align-items:center;gap:5px;flex-shrink:0}
.search-box{display:flex;align-items:center;gap:5px;background:var(--gray2);border:.5px solid var(--border);border-radius:7px;padding:5px 9px;transition:all .1s}
.search-box:focus-within{border-color:var(--blue);background:var(--white)}
.search-box input{background:none;border:none;outline:none;font-size:11.5px;color:var(--text);width:160px;font-family:inherit}
.search-box input::placeholder{color:var(--text3)}
.search-icon{color:var(--text3);font-size:11px}
.att-tbl{width:100%;border-collapse:collapse}
.att-tbl thead tr{background:var(--gray)}
.att-tbl th{text-align:left;padding:6px 12px;color:var(--text3);font-weight:500;border-bottom:.5px solid var(--border);font-size:10.5px;white-space:nowrap;user-select:none;cursor:pointer}
.att-tbl th:hover{color:var(--text2)}
.att-tbl th .th-i{display:inline-flex;align-items:center;gap:4px}
.att-tbl th .sort-arrow{opacity:.3;font-size:9px;margin-left:3px}
.att-tbl th:hover .sort-arrow{opacity:.6}
.att-tbl td{padding:7px 12px;border-bottom:.5px solid #f5f5f3;color:var(--text);font-size:11.5px;vertical-align:middle;max-width:240px}
.att-tbl tr:last-child td{border-bottom:none}
.att-tbl tbody tr:hover td{background:#fafaf8;cursor:pointer}
.att-chk{width:15px;height:15px;border:.5px solid var(--border2);border-radius:4px;background:var(--white);cursor:pointer;accent-color:var(--nv)}
.col-name-cell{display:flex;align-items:center;gap:7px;font-weight:500}
.col-icon{width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.cell-link{color:var(--blue);text-decoration:none;font-size:11px}
.cell-link:hover{text-decoration:underline}
.cell-dim{color:var(--text3);font-size:10.5px}
.cell-mono{font-family:monospace;font-size:10px;color:var(--text2)}
.row-actions{display:none;gap:3px;align-items:center}
.att-tbl tbody tr:hover .row-actions{display:flex}
.action-btn{padding:2px 8px;border:.5px solid var(--border);border-radius:5px;font-size:10px;cursor:pointer;background:var(--white);color:var(--text2);font-family:inherit;transition:all .1s}
.action-btn:hover{background:var(--gray2);color:var(--text)}
.action-btn.del{color:var(--red-t);border-color:transparent}
.action-btn.del:hover{background:var(--red-bg)}
.att-footer{padding:7px 14px;font-size:10.5px;color:var(--text3);border-top:.5px solid var(--border);background:var(--gray);display:flex;align-items:center;justify-content:space-between}

/* Profile split-pane (WIB/Company profile) */
.profile-wrap{display:flex;height:100%;overflow:hidden}
.profile-left{width:296px;flex-shrink:0;border-right:.5px solid var(--border);overflow-y:auto;background:var(--white)}
.profile-left::-webkit-scrollbar{width:3px}
.profile-left::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.profile-right{flex:1;min-width:0;overflow-y:auto;background:var(--gray)}
.profile-right::-webkit-scrollbar{width:5px}
.profile-right::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.profile-hd{padding:18px 16px 14px;border-bottom:.5px solid var(--border)}
.profile-av-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.profile-av{width:42px;height:42px;border-radius:9px;background:var(--nv);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--cream);flex-shrink:0}
.profile-name{font-size:14px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:2px}
.profile-sub{font-size:11.5px;color:var(--text2)}
.profile-actions{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px}
.profile-section{padding:12px 16px;border-bottom:.5px solid var(--border)}
.profile-section-title{font-size:9.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:9px}
.fv-empty{color:var(--text3);font-style:italic;font-size:10.5px}
.fv-link{color:var(--blue);text-decoration:none}
.fv-link:hover{text-decoration:underline}
.profile-right-inner{padding:14px}

/* Call priority bars */
.cp-wrap{display:inline-flex;align-items:center;gap:5px}
.cp-bars{display:flex;gap:2px;align-items:flex-end}
.cp-bar{width:5px;border-radius:1.5px;background:var(--gray2)}
.cp-bar.on.low{background:#22c55e}
.cp-bar.on.med{background:#f59e0b}
.cp-bar.on.high{background:#ef4444}
.cp-num{font-size:10.5px;font-weight:600;color:var(--text2)}

/* Import wizard */
.wizard-steps{display:flex;align-items:center;gap:0;padding:0 0 16px;border-bottom:.5px solid var(--border);margin-bottom:16px}
.wiz-step{display:flex;align-items:center;gap:8px;flex:1}
.wiz-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;background:var(--gray2);color:var(--text3)}
.wiz-step.done .wiz-num{background:var(--green);color:#fff}
.wiz-step.active .wiz-num{background:var(--nv);color:var(--cream)}
.wiz-label{font-size:11px;font-weight:500;color:var(--text3)}
.wiz-step.active .wiz-label{color:var(--text);font-weight:600}
.wiz-step.done .wiz-label{color:var(--green-t)}
.wiz-line{flex:1;height:.5px;background:var(--border);margin:0 8px}
.field-map-row{display:grid;grid-template-columns:1fr 20px 1fr;gap:6px;align-items:center;margin-bottom:6px;padding:7px 10px;background:var(--gray);border-radius:7px;border:.5px solid var(--border)}
.fmr-source{font-size:11px;font-weight:500;color:var(--text);padding:5px 8px;background:var(--white);border:.5px solid var(--border2);border-radius:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fmr-arrow{text-align:center;color:var(--text3);font-size:13px}
.fmr-target select{font-size:11px;padding:5px 8px;border:.5px solid var(--border2);border-radius:5px;background:var(--white);color:var(--text);font-family:inherit;outline:none;width:100%}
.fmr-target select:focus{border-color:var(--blue)}
.import-progress{margin-top:12px}
.prog-bar-outer{height:8px;background:var(--gray2);border-radius:4px;overflow:hidden;margin-bottom:6px}
.prog-bar-inner{height:100%;border-radius:4px;background:var(--nv);transition:width .3s}
.import-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.import-summary-item{background:var(--gray);border-radius:8px;padding:10px 12px;text-align:center}
.isn{font-size:20px;font-weight:700;color:var(--text)}
.isl{font-size:10px;color:var(--text3);margin-top:2px}

/* Permissions table */
.perm-tbl th,.perm-tbl td{padding:6px 10px;border:.5px solid var(--border);font-size:11px}
.perm-tbl th{background:var(--gray);font-weight:600;font-size:10px;text-transform:uppercase}

/* Sidebar nav classes (keep both old and new) */
.sb-item{display:flex;align-items:center;gap:7px;padding:6px 12px;font-size:11.5px;color:rgba(255,255,255,.5);cursor:pointer;border-left:2px solid transparent;transition:all .1s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85)}
.sb-item.active{background:rgba(201,168,76,.14);color:var(--gd2);border-left-color:var(--gd)}
.sb-item-icon{font-size:13px;width:15px;text-align:center;flex-shrink:0;opacity:.75}
.sb-item.active .sb-item-icon{opacity:1}
.sb-item-label{flex:1;overflow:hidden;text-overflow:ellipsis}
.sb-badge{margin-left:auto;background:rgba(220,60,60,.9);color:#fff;font-size:8px;font-weight:600;padding:1px 5px;border-radius:8px;flex-shrink:0}
.sb-divider{height:.5px;background:rgba(255,255,255,.06);margin:5px 0}
.sb-section{padding:8px 12px 2px;font-size:9px;color:rgba(255,255,255,.22);letter-spacing:1.1px;text-transform:uppercase;font-weight:600}
.sb-footer{padding:9px 12px;border-top:1px solid rgba(255,255,255,.07);flex-shrink:0}
.sb-logo{padding:13px 14px 10px;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0}
.sb-logo-row{display:flex;align-items:center;gap:8px}
.sb-logo-icon{width:28px;height:28px;border-radius:7px;background:rgba(201,168,76,.25);border:.5px solid rgba(201,168,76,.4);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.sb-logo-text{font-size:11.5px;font-weight:600;color:var(--cream);line-height:1.25}
.sb-logo-sub{font-size:8.5px;color:rgba(255,255,255,.28);margin-top:1px;letter-spacing:.6px;text-transform:uppercase}
.sb-search{padding:6px 10px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-search-inner{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.07);border:.5px solid rgba(255,255,255,.1);border-radius:6px;padding:5px 8px;cursor:pointer}
.sb-search-icon{color:rgba(255,255,255,.3);font-size:11px}
.sb-search-text{font-size:11px;color:rgba(255,255,255,.3)}
.sb-search-kbd{margin-left:auto;font-size:9px;color:rgba(255,255,255,.2);background:rgba(255,255,255,.07);padding:1px 4px;border-radius:3px;font-family:monospace}
.sb-nav{flex:1;overflow-y:auto;padding:4px 0}
.sb-nav::-webkit-scrollbar{width:2px}
.sb-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.sb-user{display:flex;align-items:center;gap:8px}
.sb-avatar{width:26px;height:26px;border-radius:50%;background:rgba(201,168,76,.22);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--gd);flex-shrink:0}
.sb-user-name{font-size:10.5px;font-weight:500;color:rgba(255,255,255,.75);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.sb-user-role{font-size:8.5px;color:rgba(255,255,255,.3)}
.sb-user-actions{display:flex;gap:2px;margin-left:4px}
.sb-user-btn{background:none;border:none;color:rgba(255,255,255,.25);cursor:pointer;font-size:13px;padding:2px 3px;border-radius:4px;transition:all .1s}
.sb-user-btn:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.6)}

/* Topbar */
.topbar{height:44px;background:var(--white);border-bottom:.5px solid var(--border);padding:0 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px}
.topbar-left{display:flex;align-items:center;gap:8px;min-width:0}
.page-title{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;display:flex;align-items:center;gap:6px}
.topbar-crumb{color:var(--text3);font-weight:400;cursor:pointer}
.topbar-crumb:hover{color:var(--text2)}
.topbar-crumb-sep{color:var(--text3);margin:0 2px;font-size:11px}
.topbar-badge{font-size:10.5px;padding:2px 8px;border-radius:20px;font-weight:500;background:var(--gray2);color:var(--text2);white-space:nowrap}

<body>
<div id="app"></div>
<script>
/* ═══════════════════════════════════════════════════
   GLOBALS
═══════════════════════════════════════════════════ */
let token = localStorage.getItem('valor_token') || null
let currentUser = null
let currentPage = 'dashboard'
let currentWib = null
let wibTab = 'overview'
let currentCompany = null
let companyTab = 'overview'
let notifOpen = false
let chatChannel = 'general'
let sessionTimer = null
window._coFilters = { search:'', status:'', rating:'', state:'' }
function clearCoFilters(){ window._coFilters={search:'',status:'',rating:'',state:''}; renderCompaniesTable(window._companies||[]) }
window._wibFilters = { search:'', status:'', state:'', type:'', owner:'' }
window._locFilters = { search:'' }
window._importRows = null
window._importType = null
window._importStep = 1
window._importFieldMap = {}

/* ═══════════════════════════════════════════════════
   API
═══════════════════════════════════════════════════ */
async function api(url, method='GET', body=null){
  const opts = { method, headers:{ 'Authorization':`Bearer ${token}`, 'Content-Type':'application/json' } }
  if(body) opts.body = JSON.stringify(body)
  const r = await fetch(url, opts)
  let d
  try { d = await r.json() } catch(e) { throw new Error(`Server error (${r.status})`) }
  if(r.status===401){ token=null; localStorage.removeItem('valor_token'); render(); throw new Error('Session expired') }
  if(r.status===403) throw new Error(d.error||'Permission denied')
  if(!r.ok) throw new Error(d.error||`Request failed (${r.status})`)
  return d
}

async function apiDownload(url){
  const r = await fetch(url,{headers:{'Authorization':`Bearer ${token}`}})
  if(!r.ok){const d=await r.json().catch(()=>({}));throw new Error(d.error||'Export failed')}
  const blob=await r.blob()
  const cd=r.headers.get('content-disposition')||''
  const name=cd.match(/filename="([^"]+)"/)?.[1]||'valor-export.csv'
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();URL.revokeObjectURL(a.href)
}

async function apiAI(prompt){
  try {
    const d=await api('/api/ai','POST',{prompt,context:''})
    if(d.error&&!d.text){
      if(d.error.includes('ANTHROPIC_API_KEY')||d.error.includes('API_KEY')){
        return '🔑 AI not configured yet.\n\nTo enable the AI Assistant:\n1. Go to your Render dashboard\n2. Open Environment Variables\n3. Add: ANTHROPIC_API_KEY = your-key-here\n4. Click Save & Redeploy'
      }
      return '⚠️ AI Error: '+(d.error||'Unknown error')
    }
    return d.text||'No response generated.'
  } catch(e) {
    if(e.message.includes('ANTHROPIC_API_KEY')||e.message.includes('API_KEY')){
      return '🔑 AI not configured yet.\n\nTo enable the AI Assistant:\n1. Go to your Render dashboard\n2. Open Environment Variables\n3. Add: ANTHROPIC_API_KEY = your-key-here\n4. Click Save & Redeploy'
    }
    return '⚠️ AI connection failed: '+e.message
  }
}

// ── SESSION TIMEOUT: 1hr auto-logout, 2-min warning modal ──
let _sessionWarnTimer=null, _sessionLogoutTimer=null, _sessionWarned=false
function startSessionTimer(){
  clearTimeout(_sessionWarnTimer);clearTimeout(_sessionLogoutTimer);_sessionWarned=false
  // 58min → show warning modal
  _sessionWarnTimer=setTimeout(()=>{
    _sessionWarned=true
    const overlay=document.createElement('div')
    overlay.id='session-warn-overlay'
    overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;display:flex;align-items:center;justify-content:center'
    overlay.innerHTML=`<div style="background:#fff;border-radius:14px;padding:28px 32px;max-width:380px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)">
      <div style="font-size:32px;margin-bottom:12px">⏱️</div>
      <div style="font-size:16px;font-weight:700;color:#111;margin-bottom:8px">Session Expiring Soon</div>
      <div style="font-size:13px;color:#6b7280;margin-bottom:20px">You will be automatically signed out in <strong id="session-countdown">2:00</strong> due to inactivity.</div>
      <button onclick="extendSession()" style="background:#0B1E3C;color:#E8D9A8;border:none;border-radius:8px;padding:10px 24px;font-size:13px;font-weight:600;cursor:pointer;margin-right:8px">Stay Signed In</button>
      <button onclick="logout()" style="background:#fee2e2;color:#991b1b;border:none;border-radius:8px;padding:10px 20px;font-size:13px;cursor:pointer">Sign Out Now</button>
    </div>`
    document.body.appendChild(overlay)
    // Countdown
    let secs=120
    const interval=setInterval(()=>{
      secs--
      const el=document.getElementById('session-countdown')
      if(el)el.textContent=Math.floor(secs/60)+':'+(secs%60<10?'0':'')+(secs%60)
      if(secs<=0)clearInterval(interval)
    },1000)
    overlay.dataset.interval=interval
  }, 58*60*1000)
  // 60min → force logout
  _sessionLogoutTimer=setTimeout(()=>{
    const ov=document.getElementById('session-warn-overlay')
    if(ov){clearInterval(ov.dataset.interval);ov.remove()}
    showToast('Session expired — you have been signed out','warn')
    setTimeout(()=>logout(),800)
  }, 60*60*1000)
  // Reset on any user activity
  const resetFn=()=>{if(!_sessionWarned)startSessionTimer()}
  document.addEventListener('click',resetFn,{once:true})
  document.addEventListener('keydown',resetFn,{once:true})
}
function extendSession(){
  const ov=document.getElementById('session-warn-overlay')
  if(ov){clearInterval(ov.dataset.interval);ov.remove()}
  _sessionWarned=false
  startSessionTimer()
  showToast('Session extended — you are still signed in','success')
}

/* ═══════════════════════════════════════════════════
   UI HELPERS
═══════════════════════════════════════════════════ */
function showToast(msg,type='info'){
  const colors={success:'#166534',error:'#991b1b',warn:'#92400e',info:'#1e40af'}
  const bgs={success:'#dcfce7',error:'#fee2e2',warn:'#fef3c7',info:'#dbeafe'}
  const t=document.createElement('div')
  t.style.cssText=`position:fixed;bottom:18px;right:18px;padding:10px 16px;border-radius:9px;font-size:12px;font-weight:500;z-index:999;max-width:340px;box-shadow:0 4px 16px rgba(0,0,0,.15);background:${bgs[type]||bgs.info};color:${colors[type]||colors.info};border:.5px solid currentColor;opacity:0;transition:opacity .2s`
  t.textContent=msg;document.body.appendChild(t)
  requestAnimationFrame(()=>{t.style.opacity='1'})
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300)},3800)
}

function showModal(title,body,onSave=null,size=''){
  document.getElementById('modal-container').innerHTML=`
  <div class="modal-overlay" onclick="handleOverlayClick(event)">
    <div class="modal ${size}" onclick="event.stopPropagation()">
      <div class="modal-hd">
        <div class="modal-title">${title}</div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body" id="modal-body">${body}</div>
      <div class="modal-foot" id="modal-foot">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        ${onSave?'<button class="btn btn-primary" id="modal-ok-btn" onclick="modalSave()">Save</button>':''}
      </div>
    </div>
  </div>`
  window._modalSave=onSave
}
function handleOverlayClick(e){if(e.target.classList.contains('modal-overlay'))closeModal()}
function closeModal(){document.getElementById('modal-container').innerHTML='';window._modalSave=null}
async function modalSave(){
  const btn=document.getElementById('modal-ok-btn')
  if(!btn||!window._modalSave)return
  btn.disabled=true;btn.textContent='Saving...'
  const result=await window._modalSave()
  if(result===false){btn.disabled=false;btn.textContent='Save'}
  else closeModal()
}

  closeAllIE()

function closeAllIE(){
  document.querySelectorAll('.ie-menu').forEach(m=>m.classList.remove('open'))

function appStatusPill(s){
  const m={draft:'p-gray',submitted:'p-blue',under_review:'p-amber',approved:'p-green',awarded:'p-teal',rejected:'p-red',withdrawn:'p-gray'}
  return`<span class="pill ${m[s]||'p-gray'}">${s?s.replace(/_/g,' '):'—'}</span>`
}
function invPill(s){
  const m={not_invoiced:'p-gray',invoiced:'p-amber',paid:'p-green',overdue:'p-red'}
  return`<span class="pill ${m[s]||'p-gray'}">${s?s.replace(/_/g,' '):'—'}</span>`
}
function fmtDate(d){if(!d)return'—';try{return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}catch{return d}}
function fmtMoney(n){return n?'$'+Number(n).toLocaleString():'—'}
function fmtAgo(d){
  const diff=Date.now()-new Date(d).getTime()
  const m=Math.floor(diff/60000),h=Math.floor(diff/3600000),dy=Math.floor(diff/86400000)
  if(m<1)return'just now';if(m<60)return m+'m ago';if(h<24)return h+'h ago'
  if(dy<7)return dy+'d ago';return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'})
}
function getTaskMeta(t){
  // API returns data in t.metadata (object) or t.details (JSON string) depending on DB schema
  if(t.metadata&&typeof t.metadata==='object')return t.metadata
  try{const p=JSON.parse(t.details||'{}');return typeof p==='object'?p:{title:t.details||''}}
  catch{return{title:t.details||''}}
}
function getNoteContent(n){
  // Note content lives in metadata.content, metadata.text, or details string
  if(n.metadata&&typeof n.metadata==='object'){
    return n.metadata.content||n.metadata.text||n.details||''
  }
  return n.details||''
}
function getNoteType(n){
  if(n.metadata&&typeof n.metadata==='object')return n.metadata.note_type||'Note'
  try{const p=JSON.parse(n.details||'{}');return p.note_type||'Note'}catch{return'Note'}
}
function isAircallNote(n){
  if(n.metadata&&typeof n.metadata==='object')return!!(n.metadata.is_aircall||n.metadata.note_type==='Aircall')
  try{const p=JSON.parse(n.details||'{}');return!!(p.is_aircall||p.note_type==='Aircall')}catch{return false}
}

function callPriority(n){
  if(!n)return'<span class="cell-dim">—</span>'
  const score=Number(n)
  const level=score>=2000?'high':score>=800?'med':'low'
  const maxBars=5
  const filledBars=score>=3000?5:score>=2000?4:score>=1200?3:score>=600?2:1
  const bars=Array.from({length:maxBars},(_,i)=>`<div class="cp-bar${i<filledBars?' on '+level:''}" style="height:${8+i*3}px"></div>`).join('')
  return`<div class="cp-wrap"><div class="cp-bars">${bars}</div><span class="cp-num">${score.toLocaleString()}</span></div>`
}

function starRating(r){
  if(!r)return'<span class="cell-dim">—</span>'
  const n=Math.min(Number(r),5)
  return'<span style="color:#f59e0b;font-size:12px;letter-spacing:1px">'+'★'.repeat(n)+'<span style="color:var(--gray3)">'+'★'.repeat(5-n)+'</span></span>'
}

function coIconBg(status){
  const m={active_client:'#dbeafe',qualified:'#fef3c7',prospect:'#f3f4f6',contacted:'#dbeafe',churned:'#fee2e2'}
  return m[status]||'#f3f4f6'
}
function coIconColor(status){
  const m={active_client:'#1d4ed8',qualified:'#b45309',prospect:'#6b7280',contacted:'#1d4ed8',churned:'#991b1b'}
  return m[status]||'#6b7280'
}

let _currentView = 'all'

function switchView(id){
  _currentView = id
  // Update active pill visually
  document.querySelectorAll('.vb-view').forEach(el=>{
    el.classList.toggle('active', el.getAttribute('onclick')?.includes(`'${id}'`))
  })
  // Dispatch to the correct page handler
  if(currentPage==='wibs') applyWibView(id)
  else if(currentPage==='companies') applyCompanyView(id)
  else if(currentPage==='locations') applyLocationView(id)
  else if(currentPage==='funding') applyFundingView(id)
  else if(currentPage==='applications') applyApplicationView(id)
  else showToast(`View: ${id}`,'info')
}

function applyWibView(id){
  if(!window._wibs) return
  let d = [...window._wibs]
  // Apply named views as server-side-like filters on cached data
  const viewFilters = {
    all: ()=>true,
    ashby: w=>(w.owner||'').toLowerCase().includes('ashby')||(w.tags||'').toLowerCase().includes('ashby'),
    sam: w=>(w.owner||'').toLowerCase().includes('sam')||(w.notes||'').toLowerCase().includes('sam orer'),
    carly: w=>(w.owner||'').toLowerCase().includes('carly'),
    sarah: w=>(w.owner||'').toLowerCase().includes('sarah'),
    contacted: w=>['contacted','funding_available','follow_up_needed','network_member'].includes(w.status),
    by_location: ()=>true, // same data, different sort
    by_state: ()=>true,
    no_reachout: w=>['no_reachout_completed','follow_up_needed'].includes(w.status),
  }
  const filter = viewFilters[id] || (()=>true)
  d = d.filter(filter)
  // Sort variants
  if(id==='by_state') d.sort((a,b)=>(a.state||'').localeCompare(b.state||''))
  else if(id==='by_location') d.sort((a,b)=>(b.call_priority||0)-(a.call_priority||0))
  window._wibFilters.search = ''
  window._wibFilters.status = ''
  renderWibTable(d)
}

function applyCompanyView(id){
  if(!window._companies) return
  let d = [...window._companies]
  const viewFilters = {
    all: ()=>true,
    funding: c=>c.status==='active_client'||c.status==='qualified',
    operators: ()=>true,
    locations: ()=>true,
    by_status: ()=>true,
    export: ()=>true,
    priority: c=>Number(c.call_priority||0)>1000,
    global: ()=>true,
  }
  d = d.filter(viewFilters[id]||(()=>true))
  if(id==='by_status') d.sort((a,b)=>(a.status||'').localeCompare(b.status||''))
  if(id==='priority') d.sort((a,b)=>Number(b.call_priority||0)-Number(a.call_priority||0))
  window._coFilters.search = ''
  window._coFilters.status = ''
  renderCompaniesTable(d)
}

function applyLocationView(id){
  if(!window._locations) return
  let d = [...window._locations]
  const viewFilters = {
    all: ()=>true,
    by_op: ()=>true,
    wib_network: l=>l.wib_id!=null,
    oh_wibs: l=>(l.state||'')==='OH',
    by_filtered: ()=>true,
  }
  d = d.filter(viewFilters[id]||(()=>true))
  window._locFilters.search = ''
  renderLocationsTable(d)
}

function applyFundingView(id){
  if(!window._funding) return
  let d = [...window._funding]
  if(id==='open') d=d.filter(f=>f.status==='open')
  if(id==='pending') d=d.filter(f=>f.status==='pending')

function applyApplicationView(id){

    }).join('')
  }).catch(()=>{
    const b=document.getElementById('dash-tasks');if(b)b.innerHTML='<div style="color:var(--text3);font-size:11px;text-align:center;padding:8px">Could not load tasks</div>'
  })
}

// ── SORT STATE ─────────────────────────────────────────────────────────
let _wibSort  = {col:'call_priority', dir:-1}
let _coSort   = {col:'', dir:1}
let _locSort  = {col:'location_name', dir:1}
let _appSort  = {col:'created_at', dir:-1}

function sortWibBy(col){
  if(_wibSort.col===col) _wibSort.dir*=-1; else{_wibSort.col=col;_wibSort.dir=1}
  const d=[...(window._wibs||[])].sort((a,b)=>{
    const av=a[col]??'', bv=b[col]??''
    return String(av).localeCompare(String(bv),undefined,{numeric:true})*_wibSort.dir
  })
  renderWibTable(d)
}

function sortCoBy(col){
  if(_coSort.col===col) _coSort.dir*=-1; else{_coSort.col=col;_coSort.dir=1}
  const d=[...(window._companies||[])].sort((a,b)=>{
    const av=a[col]??'', bv=b[col]??''
    return String(av).localeCompare(String(bv),undefined,{numeric:true})*_coSort.dir
  })
  renderCompaniesTable(d)
}

function sortLocBy(col){
  if(_locSort.col===col) _locSort.dir*=-1; else{_locSort.col=col;_locSort.dir=1}

    const av=a[col]??'', bv=b[col]??''
    return String(av).localeCompare(String(bv),undefined,{numeric:true})*_locSort.dir
  })
  renderLocationsTable(d)
}

function sortAppBy(col){
  if(_appSort.col===col) _appSort.dir*=-1; else{_appSort.col=col;_appSort.dir=1}
  const d=[...(window._applications||[])].sort((a,b)=>{

  const tbody=document.getElementById('apps-tbody');if(tbody)tbody.innerHTML=renderAppsRows(d)
}

// Sort arrow helper

  try{currentWib=await api('/api/wibs/'+id)}
  catch(e){if(window._wibs?.length)currentWib=window._wibs.find(w=>w.id===id)}
  if(!currentWib){document.getElementById('page-area').innerHTML='<div class="alert alert-error">WIB not found</div>';return}
  const w=currentWib
  setTopbar(`<span class="topbar-crumb" onclick="loadPage('wibs')">Workforce Boards</span><span class="topbar-crumb-sep">/</span>${w.wib_name}`,'',`

  setTabs([
    {id:'overview',label:'Overview'},
    {id:'notes',label:'Notes'},

    {id:'funding',label:'Funding'},
    {id:'contacts',label:'Contacts'},
    {id:'files',label:'Files'},
    {id:'activity',label:'Activity'},

  renderWibProfile()
  loadWibTabData(wibTab)
}

async function loadWibTabData(tab){
  const w=currentWib;if(!w)return
  const wid=w.id

  if(tab==='overview'){
    const notesEl=document.getElementById('wib-overview-notes')
    const actEl=document.getElementById('wib-overview-activity')
    if(notesEl){
      try{
        const nr=await api('/api/notes?record_type=wib_records&record_id='+wid+'&limit=3')
        const notes=nr.data||[]
        notesEl.innerHTML=notes.length?notes.map(n=>renderNoteCard(n)).join(''):'<div style="color:var(--text3);font-size:11px;text-align:center;padding:8px">No notes yet</div>'
      }catch(e){notesEl.innerHTML='<div style="font-size:11px;color:var(--text3);padding:6px">Notes unavailable</div>'}
    }
    if(actEl){
      try{
        const ar=await api('/api/activity?record_type=wib_records&record_id='+wid+'&limit=5')
        const acts=ar.data||[]
        actEl.innerHTML=acts.length?acts.map(a=>`<div class="act-row">
          <div class="act-icon">${{NOTE:'📝',TASK:'✅',CREATE_WIB:'🏛',UPDATE_WIB:'✏',AI_QUERY:'🤖',USER_LOGIN:'🔐'}[a.action]||'📌'}</div>
          <div class="act-body"><div class="act-text">${a.details||a.action}</div><div class="act-meta">${a.user?.full_name||''} · ${fmtAgo(a.created_at)}</div></div>
        </div>`).join(''):'<div style="color:var(--text3);font-size:11px;text-align:center;padding:8px">No activity yet</div>'
      }catch(e){actEl.innerHTML='<div style="font-size:11px;color:var(--text3);padding:6px">Activity unavailable</div>'}
    }
  }

  if(tab==='notes'){
    const el=document.getElementById('wib-notes-list');if(!el)return
    try{
      const nr=await api('/api/notes?record_type=wib_records&record_id='+wid+'&limit=100')
      const notes=nr.data||[]
      el.innerHTML=notes.length?notes.map(n=>renderNoteCard(n)).join(''):'<div class="empty-state" style="padding:30px"><div class="empty-icon">📝</div><div class="empty-text">No notes yet</div></div>'

          <div class="task-check${m.done?' done':''}" onclick="toggleTaskDB('${t.id}',${!!m.done})">✓</div>
          <div style="flex:1"><div class="task-title-text${m.done?' done':''}">${title}</div>
            ${due?`<div class="task-due${over?' over':''}">${over?'⚠️ Overdue: ':'Due: '}${due.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>`:''}

        <td style="font-weight:500">${f.opportunity_name}</td>
        <td>${f.source_url&&f.source_url.startsWith('http')?`<a href="${f.source_url}" target="_blank" class="cell-link" onclick="event.stopPropagation()">🔗 Drive</a>`:'—'}</td>

      <th><div class="th-i">Email</div></th>
      <th><div class="th-i">Phone</div></th>
    </tr></thead><tbody>
    ${contacts.length?contacts.map(c=>`<tr>
      <td style="font-weight:500">${c.name||'—'}</td>
      <td class="cell-dim">${c.title||'—'}</td>
      <td>${c.email?`<a href="mailto:${c.email}" class="cell-link">${c.email}</a>`:'—'}</td>
      <td class="cell-dim">${c.phone||'—'}</td>

    </tbody></table>`

  if(tab==='activity'){
    const el=document.getElementById('wib-activity-list');if(!el)return
    try{
      const ar=await api('/api/activity?record_type=wib_records&record_id='+wid+'&limit=100')
      const acts=ar.data||[]
      el.innerHTML=acts.length?acts.map(a=>`<div class="act-row">
        <div class="act-icon">${{NOTE:'📝',TASK:'✅',CREATE_WIB:'🏛',UPDATE_WIB:'✏',AI_QUERY:'🤖'}[a.action]||'📌'}</div>
        <div class="act-body">
          <div class="act-text">${a.details||a.action}</div>
          <div class="act-meta">${a.user?.full_name||a.user?.email||'System'} · ${fmtAgo(a.created_at)}</div>
        </div>
      </div>`).join(''):'<div class="empty-state" style="padding:24px"><div class="empty-icon">⚡</div><div class="empty-text">No activity</div></div>'

}

function setNoteType(el,type){
  document.querySelectorAll('.note-type-btn').forEach(b=>b.classList.remove('active'))
  el.classList.add('active')
}

async function saveWibNote(){
  const ta=document.getElementById('wib-note-ta');if(!ta)return
  const text=ta.value.trim()
  if(!text){showToast('Note cannot be empty','error');return}
  const w=currentWib;if(!w)return
  const activeType=document.querySelector('.note-type-btn.active')?.textContent||'Note'
  try{
    await api('/api/notes','POST',{record_type:'wib_records',record_id:w.id,details:text,metadata:{note_type:activeType}})
    showToast('Note saved','success');ta.value=''
    loadWibTabData('notes')
  }catch(e){showToast('Failed: '+e.message,'error')}
}

async function aiAssistNote(textareaId){
  const ta=document.getElementById(textareaId);if(!ta)return
  const raw=ta.value.trim()
  if(!raw){showToast('Write something first','warn');return}
  ta.value='⏳ AI is enhancing your note...'
  const result=await apiAI('Improve and format this CRM note professionally, structured for a workforce grant platform: '+raw)
  ta.value=result
}

function renderNoteCard(n){
  const aircall=isAircallNote(n)
  const content=getNoteContent(n)
  const noteType=getNoteType(n)
  const initials=(n.user?.full_name||n.user?.email||'?').slice(0,2).toUpperCase()
  const timeAgo=n.created_at?fmtAgo(n.created_at):''
  const meta=n.metadata||{}
  if(aircall){
    return`<div class="aircall-card">
      <div class="aircall-hd">📞 Aircall — ${n.user?.full_name||'System'} · ${timeAgo}${meta.duration?' ('+meta.duration+'m)':''}</div>
      <div style="font-size:11.5px;color:var(--text);line-height:1.65">${content.replace(/\n/g,'<br>')}</div>
      ${meta.recording_url?`<a href="${meta.recording_url}" target="_blank" style="font-size:10.5px;color:var(--blue-t)">🔗 Recording</a>`:''}
    </div>`
  }
  return`<div class="note-card">
    <div class="note-meta">
      <div class="note-av">${initials}</div>
      <div class="note-author">${n.user?.full_name||n.user?.email||'System'}</div>
      <div class="note-time">${timeAgo}</div>
      <span class="note-badge">${noteType}</span>
      <button class="action-btn del" style="margin-left:auto" onclick="deleteNote('${n.id}')">✕</button>
    </div>
    <div class="note-content">${content.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
  </div>`
}

async function deleteNote(id){
  if(!confirm('Delete this note?'))return
  try{
    await api('/api/notes/'+id,'DELETE')
    showToast('Note deleted','success')
    if(currentWib)loadWibTabData(wibTab)
    if(currentCompany)loadCompanyTabData(companyTab)
  }catch(e){showToast(e.message,'error')}
}

function openWibModal(wib=null){
  const statusOpts=['not_contacted','contacted','funding_available','follow_up_needed','funding_not_available','network_member'].map(s=>`<option value="${s}"${wib?.status===s?' selected':''}>${s.replace(/_/g,' ')}</option>`).join('')
  const stateList='AL,AK,AZ,AR,CA,CO,CT,DE,FL,GA,HI,ID,IL,IN,IA,KS,KY,LA,ME,MD,MA,MI,MN,MS,MO,MT,NE,NV,NH,NJ,NM,NY,NC,ND,OH,OK,OR,PA,RI,SC,SD,TN,TX,UT,VT,VA,WA,WV,WI,WY,DC'.split(',')
  const stateOpts=stateList.map(s=>`<option value="${s}"${wib?.state===s?' selected':''}>${s}</option>`).join('')
  showModal(wib?`Edit: ${wib.wib_name}`:'New Workforce Board',`
    <div class="form-row"><div class="form-group"><div class="form-label">WIB Name <span class="form-req">*</span></div><input id="wib-name" value="${wib?.wib_name||''}"></div>
    <div class="form-group"><div class="form-label">Short Name</div><input id="wib-short" value="${wib?.short_name||''}"></div></div>
    <div class="form-row"><div class="form-group"><div class="form-label">State</div><select id="wib-state">${stateOpts}</select></div>
    <div class="form-group"><div class="form-label">Status</div><select id="wib-status">${statusOpts}</select></div></div>
    <div class="form-row"><div class="form-group"><div class="form-label">Email</div><input id="wib-email" type="email" value="${wib?.wib_email||''}"></div>
    <div class="form-group"><div class="form-label">Phone</div><input id="wib-phone" type="tel" value="${wib?.wib_phone||''}"></div></div>
    <div class="form-row"><div class="form-group"><div class="form-label">Website URL</div><input id="wib-url" value="${wib?.source_url||''}" placeholder="https://"></div>
    <div class="form-group"><div class="form-label">WIB Type</div><select id="wib-type">
      <option value="Local"${wib?.wib_type==='Local'?' selected':''}>Local</option>
      <option value="Regional"${wib?.wib_type==='Regional'?' selected':''}>Regional</option>
      <option value="State"${wib?.wib_type==='State'?' selected':''}>State</option>
    </select></div></div>
    <div class="form-row"><div class="form-group"><div class="form-label">Max Award/EIN ($)</div><input id="wib-max" type="number" value="${wib?.max_award_per_ein||''}"></div>
    <div class="form-group"><div class="form-label">Employer Match (%)</div><input id="wib-match" type="number" value="${wib?.employer_match_pct||''}"></div></div>
    <div class="form-row"><div class="form-group"><div class="form-label">Call Priority Score</div><input id="wib-priority" type="number" value="${wib?.call_priority||''}"><div class="form-hint">Higher = more urgent</div></div>
    <div class="form-group"><div class="form-label">Owner</div><input id="wib-owner" value="${wib?.owner||''}"></div></div>
    <div class="form-row form-full"><div class="form-group"><div class="form-label">Application Process Notes</div><textarea id="wib-notes" rows="3">${wib?.notes||''}</textarea></div></div>
    <label class="chk-row"><input type="checkbox" id="wib-iwt"${wib?.iwt_program_active?' checked':''}> IWT Program Active</label>`,
  async()=>{
    const payload={
      wib_name:document.getElementById('wib-name').value.trim(),
      short_name:document.getElementById('wib-short')?.value||null,
      state:document.getElementById('wib-state')?.value||null,
      status:document.getElementById('wib-status')?.value||'not_contacted',
      wib_email:document.getElementById('wib-email')?.value||null,
      wib_phone:document.getElementById('wib-phone')?.value||null,
      source_url:document.getElementById('wib-url')?.value||null,
      wib_type:document.getElementById('wib-type')?.value||'Local',
      max_award_per_ein:document.getElementById('wib-max')?.value||null,
      employer_match_pct:document.getElementById('wib-match')?.value||null,
      call_priority:document.getElementById('wib-priority')?.value||null,
      owner:document.getElementById('wib-owner')?.value||null,
      notes:document.getElementById('wib-notes')?.value||null,
      iwt_program_active:document.getElementById('wib-iwt')?.checked||false
    }
    if(!payload.wib_name){showToast('WIB name is required','error');return false}
    try{
      if(wib)await api('/api/wibs/'+wib.id,'PUT',payload)
      else await api('/api/wibs','POST',payload)
      showToast(wib?'WIB updated':'WIB created','success')
      if(currentPage==='wib-profile'&&wib){currentWib={...currentWib,...payload};renderWibProfile()}
      else loadPage('wibs')
    }catch(e){showToast(e.message,'error');return false}
  },'modal-lg')
}

async function openCompanyProfile(id){
  currentPage='company-profile';companyTab='overview'
  clearViewbar();clearTabs()
  document.getElementById('page-area').innerHTML='<div class="loading">⏳ Loading profile...</div>'
  try{currentCompany=await api('/api/companies/'+id)}
  catch(e){if(window._companies?.length)currentCompany=window._companies.find(c=>c.id===id)}
  if(!currentCompany){document.getElementById('page-area').innerHTML='<div class="alert alert-error">Company not found</div>';return}
  const c=currentCompany
  setTopbar(`<span class="topbar-crumb" onclick="loadPage('companies')">Companies</span><span class="topbar-crumb-sep">/</span>${c.company_name}`,'',`
    <button class="btn" onclick="openCompanyModal(currentCompany)">✎ Edit</button>`)
  setTabs([
    {id:'overview',label:'Overview'},
    {id:'notes',label:'Notes'},
    {id:'tasks',label:'Tasks'},
    {id:'locations',label:'Locations'},
    {id:'applications',label:'Applications'},
    {id:'files',label:'Files'},
    {id:'activity',label:'Activity'},
  ],companyTab,'switchCompanyTab')
  renderCompanyProfile()
  loadCompanyTabData(companyTab)
}

function switchCompanyTab(tab){
  companyTab=tab
  setTabs([
    {id:'overview',label:'Overview'},
    {id:'notes',label:'Notes'},
    {id:'tasks',label:'Tasks'},
    {id:'locations',label:'Locations'},
    {id:'applications',label:'Applications'},
    {id:'files',label:'Files'},
    {id:'activity',label:'Activity'},
  ],tab,'switchCompanyTab')
  renderCompanyProfile()
  loadCompanyTabData(tab)
}

async function loadCompanyTabData(tab){
  const c=currentCompany;if(!c)return
  const cid=c.id

  if(tab==='overview'){
    const notesEl=document.getElementById('co-overview-notes')
    const appsEl=document.getElementById('co-overview-apps')
    if(notesEl){
      try{
        const nr=await api('/api/notes?record_type=companies&record_id='+cid+'&limit=3')
        const notes=nr.data||[]
        notesEl.innerHTML=notes.length?notes.map(n=>renderNoteCard(n)).join(''):'<div style="color:var(--text3);font-size:11px;text-align:center;padding:8px">No notes yet</div>'
      }catch(e){notesEl.innerHTML='<div style="font-size:11px;color:var(--text3)">Notes unavailable</div>'}

        </div>`
      }).join(''):'<div class="empty-state" style="padding:24px"><div class="empty-icon">✅</div><div class="empty-text">No tasks</div></div>'
    }catch(e){el.innerHTML='<div class="alert alert-error">Failed: '+e.message+'</div>'}

      </tr>`).join('')+'</tbody></table>'
      :'<div class="empty-state" style="padding:24px"><div class="empty-icon">📍</div><div class="empty-text">No locations linked</div></div>'
    }catch(e){el.innerHTML='<div class="alert alert-error">Failed: '+e.message+'</div>'}

  if(tab==='applications'){
    const el=document.getElementById('co-apps-list');if(!el)return
    try{
      const r=await api('/api/applications?company_id='+cid+'&limit=100')

  },'modal-lg')
}

window._users=[]
function filterUsers(q){
  window._userSearch=q;applyUserFilters()
}
function filterUsersByRole(r){
  window._userRoleFilter=r;applyUserFilters()
}
function applyUserFilters(){
  let d=[...(window._users||[])]
  const q=window._userSearch||'',role=window._userRoleFilter||''
  if(q)d=d.filter(u=>(u.email+' '+(u.full_name||'')).toLowerCase().includes(q.toLowerCase()))
  if(role)d=d.filter(u=>u.role===role)
  document.getElementById('users-tbody').innerHTML=d.map(u=>renderUserRow(u)).join('')
}

async function loadPermissionsMatrix(){
  const wrap=document.getElementById('permissions-matrix-wrap');if(!wrap)return
  try{
    const perms=await api('/api/permissions').catch(()=>null)
    if(!perms){wrap.innerHTML='<div class="cell-dim">Permissions API not available</div>';return}
    const roles=['super_admin','admin','grant_coordinator','compliance_mgr','team_member','external_partner']
    const roleLabels={super_admin:'Super Admin',admin:'Admin',grant_coordinator:'Grant Coordinator',compliance_mgr:'Compliance Mgr',team_member:'Sales Specialist',external_partner:'Read-Only'}
    const resourceLabels={
      view_records:'View Records',create_wibs_companies:'Create WIBs/Companies',
      edit_wibs_companies:'Edit WIBs/Companies',delete_records:'Delete Records',
      create_edit_apps:'Create/Edit Applications',view_revenue:'View Revenue',
      manage_invoices:'Manage Invoices',compliance_tracking:'Compliance Tracking',
      notes_tasks:'Notes & Tasks',ai_assistant:'AI Assistant',
      import_export:'Import/Export',audit_logs:'Audit Logs',
      manage_users:'Manage Users',assign_roles:'Assign Roles',
      assign_super_admin:'Assign Super Admin',system_settings:'System Settings'
    }
    const resources=Object.keys(perms.permissions||{})
    const lockedPerms=perms.locked||{}
    wrap.innerHTML=`<div style="overflow-x:auto"><table class="perm-tbl" style="width:100%;border-collapse:collapse;font-size:11px">
      <thead><tr><th style="text-align:left;min-width:160px">Permission</th>${roles.map(r=>`<th style="text-align:center;min-width:80px">${roleLabels[r]||r}</th>`).join('')}</tr></thead>
      <tbody>${resources.map(res=>`<tr>
        <td style="font-weight:500;padding:6px 8px">${resourceLabels[res]||res.replace(/_/g,' ')}</td>
        ${roles.map(role=>{
          // API returns boolean values, not arrays
          const rawVal=perms.permissions?.[res]?.[role]
          const isLocked=lockedPerms[res]?.[role]!==undefined
          const hasAccess=rawVal===true
          const bg=isLocked?'rgba(59,130,246,.06)':''
          return`<td style="text-align:center;padding:6px;background:${bg}">
            ${isLocked
              ? (hasAccess?'<span style="color:var(--green-t);font-weight:700">✓</span>':'<span style="color:var(--text3)">—</span>')+'<span style="font-size:9px;color:var(--text3)">🔒</span>'
              : (['super_admin','admin'].includes(currentUser?.role)
                  ? `<input type="checkbox" ${hasAccess?'checked':''} style="cursor:pointer;width:15px;height:15px;accent-color:var(--nv)" onchange="togglePermission('${res}','${role}',this.checked)" title="Toggle ${res} for ${role}">`
                  : (hasAccess?'<span style="color:var(--green-t);font-weight:700">✓</span>':'<span style="color:var(--text3)">—</span>'))
            }
          </td>`
        }).join('')}
      </tr>`).join('')}
      </tbody>
    </table></div>
    <div style="margin-top:8px;font-size:10.5px;color:var(--text3)">🔒 Locked permissions cannot be changed. ✓ = Role has this permission.</div>`
  }catch(e){wrap.innerHTML=`<div class="cell-dim">Could not load: ${e.message}</div>`}
}


async function togglePermission(perm,role,value){
  try{
    await api('/api/permissions','PUT',{permission:perm,role,value})
    showToast(`Permission updated: ${perm}/${role} = ${value?'granted':'revoked'}`,'success')
  }catch(e){
    showToast(e.message,'error')
    // Revert the checkbox
    loadPermissionsMatrix()
  }
}

async function refreshSchemaAndReload(){

    showToast('Refreshing schema cache...','info')
    const r=await api('/api/refresh-schema','POST')
    showToast(r.message||'Schema refreshed - reloading in 2 seconds...','success')
    setTimeout(()=>window.location.reload(),2000)
  }catch(e){
    // Even if the API call fails, try to reload - the schema might have been refreshed
    showToast('Attempting reload...','warn')
    setTimeout(()=>window.location.reload(),1500)
  }
}

    </div>

      <div style="padding:10px 14px;border-bottom:.5px solid var(--border);font-size:13px;font-weight:600"># ${chatChannel}</div>

        <div class="ai-msg bot" style="max-width:80%">Welcome to #${chatChannel}! This channel is for team coordination on workforce grant initiatives.</div>
      </div>
      <div style="padding:10px 14px;border-top:.5px solid var(--border);display:flex;gap:8px">
        <input id="chat-input" placeholder="Message #${chatChannel}..." style="flex:1" onkeydown="if(event.key==='Enter')sendChatMsg()">
        <button class="btn btn-primary" onclick="sendChatMsg()">Send</button>
      </div>
    </div>
  </div>`
}

function switchChatChannel(ch){chatChannel=ch;pageChat()}
function sendChatMsg(){
  const input=document.getElementById('chat-input');if(!input)return
  const text=input.value.trim();if(!text)return
  const msgs=document.getElementById('chat-messages');if(!msgs)return
  const initials=(currentUser?.full_name||'?').slice(0,2).toUpperCase()
  msgs.innerHTML+=`<div class="msg-wrap mine">
    <div class="msg-av" style="background:var(--blue-bg);color:var(--blue-t)">${initials}</div>
    <div><div class="msg-bubble msg-mine">${text}</div><div class="msg-meta">Just now</div></div>
  </div>`
  input.value='';msgs.scrollTop=msgs.scrollHeight
}

async function saveProfile(){

  if(!name){showToast('Name cannot be empty','error');return}
  try{

let _fundingSort = {col:'', dir:1}
function sortFundingBy(col){
  if(!window._funding) return
  if(_fundingSort.col===col) _fundingSort.dir *= -1
  else { _fundingSort.col=col; _fundingSort.dir=1 }
  const d=[...window._funding].sort((a,b)=>{
    const av=a[col]||'', bv=b[col]||''
    return String(av).localeCompare(String(bv), undefined, {numeric:true}) * _fundingSort.dir
  })
  document.getElementById('page-area').innerHTML = renderFundingTableInner(d)
}

function filterFundingTable(q){
  if(!window._funding) return
  const d = q ? window._funding.filter(f=>
    (f.opportunity_name||'').toLowerCase().includes(q.toLowerCase()) ||
    (f.wib?.wib_name||'').toLowerCase().includes(q.toLowerCase()) ||
    (f.status||'').toLowerCase().includes(q.toLowerCase())
  ) : window._funding
  const tbody = document.getElementById('funding-tbody')
  if(tbody) tbody.innerHTML = d.map(f=>`<tr onclick="openFundingModal(${JSON.stringify(f).replace(/"/g,"'")})">
    <td onclick="event.stopPropagation()"><input type="checkbox" class="att-chk"></td>
