<script>

/* ════════════════════════════════════════════════
   GLOBAL STATE
════════════════════════════════════════════════ */

let currentWibView = 'all'
let territoryViews = []

/* ════════════════════════════════════════════════
   LOAD TERRITORIES
════════════════════════════════════════════════ */

async function loadWibViews() {

  try {

    const r = await fetch('/api/territories')

    if (!r.ok) {
      throw new Error('Failed loading territories')
    }

    territoryViews = await r.json()

    populateWibViewDropdown()

  } catch (err) {

    console.error(err)

  }

}

/* ════════════════════════════════════════════════
   POPULATE DROPDOWN
════════════════════════════════════════════════ */

function populateWibViewDropdown() {

  const select =
    document.getElementById('wib-view-select')

  if (!select) return

  select.innerHTML = `
    <option value="all">
      All WIBs
    </option>

    <option value="contacted">
      Contacted WIBs
    </option>

    <option value="by_state">
      WIBs by State
    </option>

    <option value="by_locations">
      WIBs by Count of Locations
    </option>
  `

  territoryViews.forEach(t => {

    select.innerHTML += `
      <option value="${t.id}">
        ${escHtml(t.name)}
      </option>
    `

  })

}

/* ════════════════════════════════════════════════
   CHANGE VIEW
════════════════════════════════════════════════ */

function changeWibView(viewId) {

  currentWibView = viewId

  renderWibTable()

}

/* ════════════════════════════════════════════════
   FIX BLANK TABLE
════════════════════════════════════════════════ */

function renderWibTable() {

  let rows = [...window.wibRecords]

  switch(currentWibView) {

    case 'all':
      break

    case 'contacted':

      rows = rows.filter(r =>
        r.last_contacted_at
      )

      break

    case 'by_state':

      rows.sort((a,b) =>
        (a.state || '')
          .localeCompare(b.state || '')
      )

      break

    case 'by_locations':

      rows.sort((a,b) =>
        (b.location_count || 0) -
        (a.location_count || 0)
      )

      break

    default:

      rows = rows.filter(r =>
        r.territory_id === currentWibView
      )

      break

  }

  renderWibRows(rows)

}

/* ════════════════════════════════════════════════
   FIX AI ASSISTANT CRASH
════════════════════════════════════════════════ */

async function apiAI(payload) {

  try {

    const r = await fetch('/api/ai', {
      method:'POST',
      headers:{
        'Content-Type':'application/json'
      },
      body:JSON.stringify(payload)
    })

    const d = await r.json()

    if (
      typeof d.error === 'string' &&
      d.error.includes('ANTHROPIC_API_KEY')
    ) {

      throw new Error(
        'Missing Anthropic API key'
      )

    }

    if (
      typeof d.error === 'string' &&
      d.error.includes('quota')
    ) {

      throw new Error(
        'Quota exceeded'
      )

    }

    if (
      typeof d.error === 'string' &&
      d.error.includes('rate limit')
    ) {

      throw new Error(
        'Rate limited'
      )

    }

    return d

  } catch (err) {

    console.error(err)

    return {
      error: err.message || 'AI request failed'
    }

  }

}

/* ════════════════════════════════════════════════
   TASK MODAL
════════════════════════════════════════════════ */

function openTaskModal(
  record_type,
  record_id
) {

  const html = `
    <div class="modal-overlay"
         id="task-modal">

      <div class="modal">

        <div class="modal-hd">

          <div class="modal-title">
            Create Task
          </div>

          <button onclick="closeTaskModal()">
            ×
          </button>

        </div>

        <div class="modal-body">

          <div class="form-group">

            <label>
              Title
            </label>

            <input type="text"
                   id="task-title">

          </div>

          <div class="form-group">

            <label>
              Due Date
            </label>

            <input type="date"
                   id="task-due">

          </div>

          <div class="form-group">

            <label>
              Priority
            </label>

            <select id="task-priority">

              <option value="low">
                Low
              </option>

              <option value="medium" selected>
                Medium
              </option>

              <option value="high">
                High
              </option>

            </select>

          </div>

          <div class="form-group">

            <label>
              Notes
            </label>

            <textarea id="task-notes"></textarea>

          </div>

        </div>

        <div class="modal-foot">

          <button onclick="closeTaskModal()">
            Cancel
          </button>

          <button onclick="
            saveTask(
              '${record_type}',
              '${record_id}'
            )
          ">

            Save Task

          </button>

        </div>

      </div>

    </div>
  `

  document.body.insertAdjacentHTML(
    'beforeend',
    html
  )

}

function closeTaskModal() {

  document
    .getElementById('task-modal')
    ?.remove()

}

async function saveTask(
  record_type,
  record_id
) {

  const payload = {

    record_type,
    record_id,

    title:
      document
        .getElementById('task-title')
        .value
        .trim(),

    due_date:
      document
        .getElementById('task-due')
        .value,

    priority:
      document
        .getElementById('task-priority')
        .value,

    notes:
      document
        .getElementById('task-notes')
        .value
        .trim()

  }

  if (!payload.title) {

    alert('Task title required')
    return

  }

  try {

    const r = await fetch('/api/tasks', {

      method:'POST',

      headers:{
        'Content-Type':'application/json'
      },

      body:JSON.stringify(payload)

    })

    const d = await r.json()

    if (!r.ok) {

      throw new Error(
        d.error || 'Task creation failed'
      )

    }

    closeTaskModal()

    alert('Task created successfully')

  } catch (err) {

    console.error(err)
    alert(err.message)

  }

}

/* ════════════════════════════════════════════════
   IMPORT VALIDATION
════════════════════════════════════════════════ */

function validateCsvHeaders(headers) {

  const normalized = headers.map(h =>
    h.trim().toLowerCase()
  )

  const validHeaders = [

    'location name',
    'location_name',
    'company name',
    'employer name'

  ]

  const found = validHeaders.some(v =>
    normalized.includes(v)
  )

  if (!found) {

    throw new Error(
      'CSV missing required Location Name column'
    )

  }

}

function validateRequiredMappings(mapping) {

  const required = [
    'company_name'
  ]

  const missing = required.filter(r =>
    !mapping[r]
  )

  if (missing.length) {

    throw new Error(
      'Please map required field: ' +
      missing.join(', ')
    )

  }

  return true

}
