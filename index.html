<div id="territory-viewbar" class="viewbar"></div>

<script>

/* ════════════════════════════════════════════════
   GLOBAL STATE
════════════════════════════════════════════════ */

let territories = []
let currentWibView = 'all'

/* ════════════════════════════════════════════════
   LOAD TERRITORIES DYNAMICALLY
════════════════════════════════════════════════ */

async function loadTerritories() {

  try {

    const r = await fetch('/api/territories')
    territories = await r.json()

    renderTerritoryViews()

  } catch (err) {

    console.error(err)

  }

}

function renderTerritoryViews() {

  const el = document.getElementById('territory-viewbar')

  if (!el) return

  let html = `
    <div class="vb-view ${currentWibView === 'all' ? 'active' : ''}"
         onclick="setWibView('all')">
      All WIBs
    </div>
  `

  territories.forEach(t => {

    html += `
      <div class="vb-view ${currentWibView === t.id ? 'active' : ''}"
           onclick="setWibView('${t.id}')">

        ${escHtml(t.name)}

      </div>
    `

  })

  el.innerHTML = html

}

function setWibView(viewId) {

  currentWibView = viewId

  renderWibTable()

}

/* ════════════════════════════════════════════════
   FIX BLANK WIB TABLE
════════════════════════════════════════════════ */

function renderWibTable() {

  let filtered = [...window.wibRecords]

  /* DEFAULT = SHOW ALL */
  if (currentWibView !== 'all') {

    filtered = filtered.filter(r =>
      r.territory_id === currentWibView
    )

  }

  const tbody = document.getElementById('wib-table-body')

  tbody.innerHTML = filtered.map(r => `
    <tr>
      <td>${escHtml(r.name)}</td>
      <td>${escHtml(r.state)}</td>
      <td>${escHtml(r.region || '')}</td>
    </tr>
  `).join('')

}

/* ════════════════════════════════════════════════
   FIX AI ASSISTANT TYPEERROR
════════════════════════════════════════════════ */

async function apiAI(payload) {

  try {

    const r = await fetch('/api/ai', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(payload)
    })

    const d = await r.json()

    if (
      typeof d.error === 'string' &&
      d.error.includes('ANTHROPIC_API_KEY')
    ) {
      throw new Error('Missing Anthropic API key')
    }

    if (
      typeof d.error === 'string' &&
      d.error.includes('quota')
    ) {
      throw new Error('Quota exceeded')
    }

    if (
      typeof d.error === 'string' &&
      d.error.includes('rate limit')
    ) {
      throw new Error('Rate limited')
    }

    return d

  } catch (err) {

    console.error(err)

    return {
      error: err.message || 'AI request failed'
    }

  }

}

function openTaskModal(record_type, record_id) {

  const html = `

        <div class="modal-hd">

          <div class="modal-title">

        </div>

        <div class="modal-body">

          <div class="form-group">
            <label class="form-label">
              Title <span class="form-req">*</span>
            </label>

            <input type="text" id="task-title">
          </div>

          <div class="form-row">

            <div class="form-group">

              <label class="form-label">
                Due Date
              </label>

              <input type="date" id="task-due">

            </div>

            <div class="form-group">

              <label class="form-label">
                Priority
              </label>

              <select id="task-priority">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
              </select>

            </div>

          </div>

          <div class="form-group">

            <label class="form-label">
              Assignee
            </label>

            <select id="task-assignee">
              <option value="">Unassigned</option>
            </select>

          </div>

          <div class="form-group">

            <label class="form-label">
              Notes
            </label>

            <textarea id="task-notes"></textarea>

          </div>

        </div>

        <div class="modal-foot">

          </button>

          <button class="btn btn-primary"
                  onclick="saveTask('${record_type}','${record_id}')">

            Save Task

          </button>

        </div>

      </div>

    </div>
  `

  document.body.insertAdjacentHTML('beforeend', html)

}

function closeTaskModal() {

  document.getElementById('task-modal')?.remove()

}

async function saveTask(record_type, record_id) {

  const payload = {

    record_type,
    record_id,

    title:
      document.getElementById('task-title').value.trim(),

    due_date:
      document.getElementById('task-due').value,

    priority:
      document.getElementById('task-priority').value,

    assignee_id:
      document.getElementById('task-assignee').value,

    notes:
      document.getElementById('task-notes').value.trim()

  }

  if (!payload.title) {

    alert('Task title required')
    return

  }

  try {

    const r = await fetch('/api/tasks', {

      method: 'POST',

      headers: {
        'Content-Type': 'application/json'
      },

      body: JSON.stringify(payload)

    })

    const d = await r.json()

    if (!r.ok) {
      throw new Error(d.error || 'Task save failed')
    }

    closeTaskModal()

    alert('Task created successfully')

  } catch (err) {

    console.error(err)
    alert(err.message)

  }

}

function validateCsvHeaders(headers) {

  const normalized = headers.map(h =>
    h.trim().toLowerCase()
  )

  const validNames = [
    'location name',
    'location_name',
    'company name',
    'employer name'
  ]

  const found = validNames.some(v =>
    normalized.includes(v)
  )

  if (!found) {

    throw new Error(
      'CSV missing required Location Name column'
    )

  }

}

function validateRequiredMappings(mapping) {

  const required = [
    'company_name'
  ]

  const missing = required.filter(r =>
    !mapping[r]
  )

  if (missing.length) {

    throw new Error(
      'Missing required mappings: ' +
      missing.join(', ')
    )

  }

  return true

}
