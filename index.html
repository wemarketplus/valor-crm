<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Valor CRM</title>

  <!-- KEEP YOUR EXISTING STYLES HERE (UNCHANGED) -->
  <!-- DO NOT REMOVE YOUR ORIGINAL CSS -->

  <style>
    /* only safety fallback variables (prevents white screen) */
    :root {
      --border: #e5e7eb;
      --white: #ffffff;
      --text: #111827;
    }
  </style>

  <!-- ✅ GLOBAL ERROR SAFETY (PREVENTS BLANK PAGE CRASHES) -->
  <script>
    window.onerror = function (msg, src, line, col, err) {
      console.error("GLOBAL ERROR:", msg, line, col, err)
      return false
    }
  </script>

</head>

<body>

<!-- =====================================================
     YOUR EXISTING HTML LAYOUT (UNCHANGED)
===================================================== -->

<h1>CRM LOADED (TEST MODE)</h1>

<!-- =====================================================
     CRITICAL SAFETY PATCHES (CLEANED + NON-DUPLICATED)
===================================================== -->

<script>

  /* =========================
     SAFE GLOBAL GUARDS
  ========================= */

  window.wibRecords = window.wibRecords || []

  function escHtml(str = '') {
    return String(str)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;')
  }

  /* =========================
     SAFE API WRAPPER (AI)
  ========================= */

  async function apiAI(payload) {
    try {
      const r = await fetch('/api/ai', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })

      const d = await r.json()
      return d

    } catch (err) {
      console.error('AI error:', err)
      return { error: 'AI request failed' }
    }
  }

  /* =========================
     WIB VIEW SYSTEM
  ========================= */

  let currentWibView = 'all'
  let territoryViews = []

  async function loadWibViews() {
    try {
      const r = await fetch('/api/territories')
      if (!r.ok) return

      territoryViews = await r.json()
      populateWibViewDropdown()

    } catch (err) {
      console.error('territory load failed:', err)
    }
  }

  function populateWibViewDropdown() {
    const select = document.getElementById('wib-view-select')
    if (!select) return

    select.innerHTML = `
      <option value="all">All WIBs</option>
      <option value="contacted">Contacted WIBs</option>
      <option value="by_state">WIBs by State</option>
      <option value="by_locations">WIBs by Count of Locations</option>
    `

    territoryViews.forEach(t => {
      select.innerHTML += `
        <option value="${t.id}">
          ${escHtml(t.name)}
        </option>
      `
    })
  }

  function changeWibView(viewId) {
    currentWibView = viewId
    renderWibTable()
  }

  function renderWibTable() {
    let rows = window.wibRecords || []

    switch (currentWibView) {
      case 'contacted':
        rows = rows.filter(r => r.last_contacted_at)
        break

      case 'by_state':
        rows = rows.sort((a, b) =>
          (a.state || '').localeCompare(b.state || '')
        )
        break

      case 'by_locations':
        rows = rows.sort((a, b) =>
          (b.location_count || 0) - (a.location_count || 0)
        )
        break

      default:
        if (currentWibView !== 'all') {
          rows = rows.filter(r =>
            r.territory_id === currentWibView
          )
        }
        break
    }

    if (typeof renderWibRows === 'function') {
      renderWibRows(rows)
    }
  }

  /* =========================
     TASK SYSTEM
  ========================= */

  async function saveTask(record_type, record_id) {
    try {
      const payload = {
        record_type,
        record_id,
        title: document.getElementById('task-title')?.value || '',
        due_date: document.getElementById('task-due')?.value || '',
        priority: document.getElementById('task-priority')?.value || 'medium',
        notes: document.getElementById('task-notes')?.value || ''
      }

      const r = await fetch('/api/tasks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })

      const d = await r.json()

      if (!r.ok) throw new Error(d.error || 'Task failed')

      alert('Task created successfully')

    } catch (err) {
      console.error(err)
      alert(err.message)
    }
  }

  /* =========================
     SAFE INIT (ONLY ONCE)
  ========================= */

  document.addEventListener('DOMContentLoaded', () => {
    try {
      console.log("CRM INIT STARTED")

      loadWibViews()

  } catch (err) {
    console.error('Init failed:', err)
  }
})
</script>

<script>
document.addEventListener('DOMContentLoaded', () => {
  try {
    console.log('CRM SAFE START')
    loadWibViews()
  } catch (err) {
    console.error(err)
  }
})
</script>

</body>
</html>
