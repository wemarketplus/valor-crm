function renderTasksPage(tasks){
  const now=new Date()
  const overdueTasks=tasks.filter(t=>{try{const m=getTaskMeta(t);if(m.done)return false;const d=m.due_date?new Date(m.due_date):null;return d&&d<now}catch{return false}})
  const futureTasks=tasks.filter(t=>{try{const m=getTaskMeta(t);if(m.done)return false;const d=m.due_date?new Date(m.due_date):null;return !d||(d&&d>=now)}catch{return true}})
  const doneTasks=tasks.filter(t=>{try{return JSON.parse(t.details||'{}').done}catch{return false}})

  const renderTask=t=>{
    const m=getTaskMeta(t),title=m.title||t.details||'Task'
    const due=m.due_date?new Date(m.due_date):null,over=due&&!m.done&&due<now
    const assignee=m.assigned_to||(t.user?.full_name)||''
    return`<div style="display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:.5px solid var(--gray2)">
      <input type="checkbox" class="att-chk" ${m.done?'checked':''}>
      <div style="flex:1;min-width:0">
        <div class="task-title-text${m.done?' done':''}" style="font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${title}</div>
        ${due?`<div class="task-due${over?' over':''}" style="margin-top:1px">${over?'⚠️ ':''} ${due.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div>`:''}
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        ${t.record_type?`<span style="font-size:10px;color:var(--text3);padding:2px 6px;background:var(--gray2);border-radius:4px">📍 ${t.record_type?.replace('_records','')}</span>`:''}
        ${assignee?`<span style="width:22px;height:22px;border-radius:50%;background:var(--orange-bg);color:var(--orange-t);display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700">${assignee.slice(0,1).toUpperCase()}</span>`:''}
        <div class="row-actions"><button class="action-btn" onclick="toggleTaskDB('${t.id}',${!!m.done})">${m.done?'Reopen':'Done'}</button><button class="action-btn del" onclick="deleteTask('${t.id}')">Del</button></div>
      </div>
    </div>`
  }

  document.getElementById('page-area').innerHTML=`
  <div class="att-wrap">
    <div class="att-toolbar">
      <div class="att-toolbar-l">
        <div class="search-box"><span class="search-icon">🔍</span><input placeholder="Search tasks..."></div>
        <button class="btn btn-sm">⊟ Filter</button>
      </div>
    </div>
    <div style="padding:6px 14px;border-bottom:.5px solid var(--border);display:flex;gap:14px;font-size:10.5px;color:var(--text3)">
      <span>Task</span>
      <span style="margin-left:auto">📅 Due date</span>
      <span>⊡ Record</span>
      <span>👤 Assigned to</span>
    </div>
    ${overdueTasks.length?`<div style="padding:6px 14px;font-size:10px;font-weight:700;color:var(--red-t);text-transform:uppercase;letter-spacing:.6px;background:#fff9f9;border-bottom:.5px solid var(--border)">Overdue ${overdueTasks.length}</div>${overdueTasks.map(renderTask).join('')}`:''}
    ${futureTasks.length?`<div style="padding:6px 14px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;background:var(--gray);border-bottom:.5px solid var(--border)">Upcoming / No due date ${futureTasks.length}</div>${futureTasks.map(renderTask).join('')}`:''}
    ${doneTasks.length?`<div style="padding:6px 14px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;background:var(--gray);border-bottom:.5px solid var(--border)">Completed ${doneTasks.length}</div>${doneTasks.map(renderTask).join('')}`:''}
    ${!tasks.length?'<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-text">No tasks yet</div><div class="empty-sub">Create tasks to track your work</div><button class="btn btn-primary" onclick="openTaskModal()">+ New Task</button></div>':''}
    <div class="att-footer"><span>${tasks.length} tasks</span></div>
  </div>`
}

async function toggleTaskDB(id,currentDone){
  try{
    const current=window._tasks?.find(t=>t.id===id)||{details:'{}'}
    const meta=getTaskMeta(current);meta.done=!currentDone
    await api('/api/tasks/'+id,'PUT',{details:JSON.stringify(meta)})
    showToast(meta.done?'Task completed!':'Task reopened','success')
    if(currentPage==='tasks')pageTasks()
    else if(currentPage==='wib-profile')loadWibTabData(wibTab)
    else if(currentPage==='company-profile')loadCompanyTabData(companyTab)
    else if(currentPage==='dashboard')pageDashboard()
  }catch(e){showToast(e.message,'error')}
}

async function deleteTask(id){
  if(!confirm('Delete this task?'))return
  try{await api('/api/tasks/'+id,'PUT',{deleted:true});showToast('Deleted','success');if(currentPage==='tasks')pageTasks()}catch(e){showToast(e.message,'error')}
}

function renderNotesGrid(notes){

      <input id="email-cc" placeholder="cc@company.com (optional)"></div></div>
    <div class="form-row form-full"><div class="form-group"><div class="form-label">Subject <span class="form-req">*</span></div>
      <input id="email-subject" placeholder="Re: IWT Grant Opportunity" value="${prefillSubject}"></div></div>
    <div class="form-row form-full"><div class="form-group"><div class="form-label">Message <span class="form-req">*</span></div>

      <label class="chk-row"><input type="checkbox" id="email-log-note" checked> Save sent email to activity log</label>
    </div></div>`,
  async()=>{
    const to=document.getElementById('email-to').value.trim()
    const subj=document.getElementById('email-subject').value.trim()
    const body=document.getElementById('email-body').value.trim()
    const err=document.getElementById('compose-err')
    if(!to){err.innerHTML='<div class="alert alert-error">Recipient required</div>';return false}
    if(!subj){err.innerHTML='<div class="alert alert-error">Subject required</div>';return false}
    if(!body){err.innerHTML='<div class="alert alert-error">Message body required</div>';return false}
    // Log as note
    const logNote=document.getElementById('email-log-note')?.checked
    if(logNote){
      try{
        await api('/api/notes','POST',{details:`EMAIL SENT TO: ${to}\nSUBJECT: ${subj}\n\n${body}`,note_type:'Email'})
      }catch(_){}
    }
    showToast(`Email to ${to} logged to CRM activity`,'success')
    if(currentPage==='emails')pageEmails()

function addAircallNote(recordId='',recordType=''){
  showModal('📞 Log Call / Aircall Note',`
    <div class="alert alert-info">Log a manual call note or paste Aircall auto-summary. This will appear in the Notes and Calls tabs of the record.</div>
    <div class="form-row form-full"><div class="form-group"><div class="form-label">Call Notes / Summary</div>
      <textarea id="aircall-notes" rows="6" placeholder="Call with WIB Director — discussed Q3 funding cycle...&#10;Key points: Program open until June 30, max $50K per employer...&#10;Follow-up: Send application template by Friday"></textarea>
    </div></div>
    <div class="form-row"><div class="form-group"><div class="form-label">Duration</div><input id="aircall-dur" placeholder="15m"></div>
    <div class="form-group"><div class="form-label">Direction</div><select id="aircall-dir"><option>Outbound</option><option>Inbound</option></select></div></div>
    <div class="form-row form-full"><div class="form-group"><div class="form-label">Recording URL (optional)</div><input id="aircall-url" type="url" placeholder="https://assets.aircall.io/calls/..."></div></div>`,
  async()=>{
    const notes=document.getElementById('aircall-notes').value.trim()
    if(!notes){showToast('Call notes are required','error');return false}
    const dur=document.getElementById('aircall-dur').value
    const dir=document.getElementById('aircall-dir').value
    const url=document.getElementById('aircall-url').value
    const fullNote=`Call (${dur||'?'}m) — ${dir}\n${notes}${url?'\nRecording: '+url:''}`
    try{
      await api('/api/notes','POST',{record_type:recordType||null,record_id:recordId||null,details:fullNote,metadata:{is_aircall:true,note_type:'Aircall',duration:dur,direction:dir,recording_url:url||null}})
      showToast('Call logged','success')
      if(currentPage==='wib-profile')loadWibTabData(wibTab)
      if(currentPage==='company-profile')loadCompanyTabData(companyTab)
      if(currentPage==='calls')pageCalls()
    }catch(e){showToast(e.message,'error');return false}
  })
}

function parseCSVLine(line){
  const vals=[];let cur='',inQ=false,i=0
  while(i<line.length){const c=line[i];if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i+=2}else{inQ=!inQ;i++}}else if(c===','&&!inQ){vals.push(cur.trim());cur='';i++}else{cur+=c;i++}}
  vals.push(cur.trim());return vals
}

async function processImportFile(input,type){
  const file=input.files[0];if(!file)return
  const preview=document.getElementById('import-preview')
  preview.innerHTML='<div style="padding:10px;color:var(--text3);font-size:12px">📂 Reading file...</div>'
  const isExcel=file.name.match(/\.xlsx?$/i)
  if(isExcel){
    preview.innerHTML='<div style="padding:10px;color:var(--text3);font-size:12px">📊 Loading Excel reader...</div>'
    try{
      if(!window.XLSX){await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s)})}
      const buf=await file.arrayBuffer()
      const wb=XLSX.read(buf,{type:'array'})
      const ws=wb.Sheets[wb.SheetNames[0]]
      const dataRows=XLSX.utils.sheet_to_json(ws,{defval:''})
      if(!dataRows.length){preview.innerHTML='<div class="alert alert-error">No data found in Excel file</div>';return}
      renderImportPreviewAndMap(dataRows,type,preview,file.name)
    }catch(err){preview.innerHTML=`<div class="alert alert-error">Failed to read Excel: ${err.message}</div>`}
    return
  }
  const reader=new FileReader()
  reader.onload=async e=>{
    try{
      const text=e.target.result
      const lines=text.split(/\r?\n/).filter(l=>l.trim())
      if(lines.length<2){preview.innerHTML='<div class="alert alert-error">File is empty or has no data rows</div>';return}
      const headers=parseCSVLine(lines[0])
      const dataRows=lines.slice(1).map(l=>{const vals=parseCSVLine(l);return Object.fromEntries(headers.map((h,i)=>[h,vals[i]||'']))}).filter(r=>Object.values(r).some(v=>String(v).trim()))
      renderImportPreviewAndMap(dataRows,type,preview,file.name)
    }catch(err){preview.innerHTML=`<div class="alert alert-error">Failed to parse: ${err.message}</div>`}
  }
  reader.readAsText(file)
}

function renderImportPreviewAndMap(dataRows,type,preview,filename){
  if(!dataRows.length){preview.innerHTML='<div class="alert alert-error">No data rows found</div>';return}
  const sourceHeaders=Object.keys(dataRows[0])
  const fieldDefs=IMPORT_FIELD_DEFS[type]||[]
  const previewRows=dataRows.slice(0,3)
  const batchSize=50,totalBatches=Math.ceil(dataRows.length/batchSize)

  // Auto-map source columns to target fields
  const autoMap={}
  sourceHeaders.forEach(h=>{
    const hn=h.toLowerCase().replace(/[^a-z0-9]/g,'_').replace(/_+/g,'_').replace(/^_|_$/g,'')
    const exact=fieldDefs.find(f=>f.key===hn);if(exact){autoMap[h]=exact.key;return}
    const fuzzy=fieldDefs.find(f=>{
      const fk=f.key.replace(/_/g,'');const fl=f.label.toLowerCase().replace(/[^a-z0-9]/g,'');const src=hn.replace(/_/g,'')
      return src===fk||src.includes(fk)||fk.includes(src)||src.includes(fl.slice(0,8))||fl.includes(src.slice(0,8))
    })
    if(fuzzy)autoMap[h]=fuzzy.key
  })
  window._importFieldMap=autoMap
  window._importRows=dataRows
  window._importType=type

  document.getElementById('ws1')?.classList.add('done')
  document.getElementById('ws2')?.classList.add('active')

  const safeId=h=>h.replace(/[^a-z0-9]/gi,'_')

  preview.innerHTML=`
  <div class="alert alert-success">✅ <strong>${dataRows.length.toLocaleString()} rows</strong> ready from <em>${filename}</em>${totalBatches>1?` · Will import in ${totalBatches} batches of ${batchSize}`:''}</div>
  <div style="margin:10px 0 6px;font-size:11px;font-weight:600;color:var(--text2)">📐 Field Mapping — ${sourceHeaders.length} source columns → ${fieldDefs.length} available target fields</div>
  <div style="font-size:10.5px;color:var(--text3);margin-bottom:8px">Auto-mapped where possible. Adjust as needed. Unmapped columns can be added to Notes.</div>
  <div style="max-height:280px;overflow-y:auto;border:.5px solid var(--border);border-radius:8px;padding:6px">
    ${sourceHeaders.map(h=>`<div class="field-map-row">
      <div class="fmr-source" title="${h}">${h}</div>
      <div class="fmr-arrow">→</div>
      <div class="fmr-target">
        <select id="fmap-${safeId(h)}" onchange="window._importFieldMap['${h}']=this.value" style="font-size:11px;padding:4px 7px;border:.5px solid var(--border2);border-radius:5px;background:#fff;width:100%;font-family:inherit;outline:none">
          <option value="">— Skip this column —</option>
          <option value="__notes__">→ Append to Notes</option>
          <option value="__tags__">→ Add to Tags</option>
          ${fieldDefs.map(f=>`<option value="${f.key}"${(autoMap[h]||'')==f.key?' selected':''}>${f.label}${f.required?' ★':''}</option>`).join('')}
        </select>
      </div>
    </div>`).join('')}
  </div>
  <div style="margin:10px 0 6px;font-size:11px;font-weight:600;color:var(--text2)">👁 Preview — first ${previewRows.length} rows</div>
  <div style="overflow-x:auto;max-height:140px;overflow-y:auto;border:.5px solid var(--border);border-radius:8px">
    <table style="font-size:10px;width:100%;border-collapse:collapse">
      <thead style="position:sticky;top:0"><tr>${sourceHeaders.map(h=>`<th style="padding:4px 8px;border:.5px solid var(--border);background:var(--gray);text-align:left;white-space:nowrap;font-weight:600">${h}</th>`).join('')}</tr></thead>
      <tbody>${previewRows.map(r=>`<tr>${sourceHeaders.map(h=>`<td style="padding:3px 8px;border:.5px solid var(--border);white-space:nowrap;max-width:160px;overflow:hidden;text-overflow:ellipsis">${r[h]||''}</td>`).join('')}</tr>`).join('')}</tbody>
    </table>
  </div>
  <div style="font-size:11px;color:var(--text2);margin-top:8px">Click <strong>Save</strong> to import all <strong>${dataRows.length.toLocaleString()}</strong> rows using the mapping above.${dataRows.length>batchSize?` Automatic progress tracking for ${totalBatches} batches.`:''}</div>`
}

async function runFullImport(){
  const allRows=window._importRows,type=window._importType,fieldMap=window._importFieldMap
  if(!allRows?.length){showToast('No rows to import','warn');return false}
  const btn=document.getElementById('modal-ok-btn')
  const preview=document.getElementById('import-preview')
  if(btn){btn.textContent='Importing...';btn.disabled=true}

  // Apply field mapping
  const mappedRows=allRows.map(row=>{
    const mapped={},extraNotes=[],extraTags=[]
    Object.entries(fieldMap).forEach(([src,tgt])=>{
      if(!tgt)return
      const val=String(row[src]||'').trim();if(!val)return
      if(tgt==='__notes__'){extraNotes.push(src+': '+val);return}
      if(tgt==='__tags__'){extraTags.push(val);return}
      mapped[tgt]=val
    })
    if(extraNotes.length)mapped.notes=(mapped.notes?mapped.notes+'\n':'')+extraNotes.join('\n')
    if(extraTags.length)mapped.tags=(mapped.tags?mapped.tags+',':'')+extraTags.join(',')
    return mapped
  }).filter(r=>Object.keys(r).length>0)

  const CHUNK=50,totalBatches=Math.ceil(mappedRows.length/CHUNK)
  let totalCreated=0,totalErrors=[]

  if(preview)preview.innerHTML='<div style="padding:10px;color:var(--text3);font-size:12px">⏳ Connecting to server...</div>'
  try{await api('/api/health')}catch(e){
    if(preview)preview.innerHTML='<div style="padding:10px;color:var(--amber-t);font-size:12px">⏳ Server starting up (Render free tier may be asleep) — waiting 30s...</div>'
    await new Promise(res=>setTimeout(res,30000))
    try{await api('/api/health')}catch(e2){
      if(preview)preview.innerHTML=`<div class="alert alert-error">Cannot connect: ${e2.message}</div>`
      if(btn){btn.textContent='Retry';btn.disabled=false}
      return false
    }
  }

  document.getElementById('ws2')?.classList.add('done')
  document.getElementById('ws3')?.classList.add('active')

  if(preview)preview.innerHTML=`
  <div class="import-progress">
    <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px">
      <span id="imp-label">Starting import...</span><span id="imp-pct">0%</span>
    </div>
    <div class="prog-bar-outer"><div id="imp-bar" class="prog-bar-inner" style="width:0%"></div></div>
    <div id="imp-detail" style="font-size:10px;color:var(--text3);margin-top:4px"></div>
  </div>`

  try{
    for(let b=0;b<totalBatches;b++){
      const chunk=mappedRows.slice(b*CHUNK,(b+1)*CHUNK)
      const pct=Math.round((b/totalBatches)*100)
      const label=document.getElementById('imp-label'),pctEl=document.getElementById('imp-pct'),bar=document.getElementById('imp-bar'),detail=document.getElementById('imp-detail')
      if(label)label.textContent=totalBatches>1?`Importing batch ${b+1} of ${totalBatches}...`:'Importing records...'
      if(pctEl)pctEl.textContent=pct+'%'
      if(bar)bar.style.width=pct+'%'
      if(detail)detail.textContent=`${totalCreated.toLocaleString()} imported${totalErrors.length?' · '+totalErrors.length+' skipped':''}`
      if(btn)btn.textContent=totalBatches>1?`Batch ${b+1}/${totalBatches}...`:'Importing...'
      let r,lastErr
      for(let attempt=0;attempt<3;attempt++){
        try{r=await api('/api/import/'+type,'POST',{rows:chunk,batch:b+1,totalBatches});break}
        catch(err){lastErr=err;if(attempt<2){await new Promise(res=>setTimeout(res,1200*(attempt+1)))}}
      }
      if(!r)throw lastErr
      totalCreated+=r.created||0
      if(r.errors?.length)totalErrors.push(...r.errors)
    }

    const bar=document.getElementById('imp-bar'),label=document.getElementById('imp-label'),pctEl=document.getElementById('imp-pct')
    if(bar)bar.style.width='100%';if(label)label.textContent='Import complete!';if(pctEl)pctEl.textContent='100%'

    if(preview)preview.innerHTML+=`
    <div class="import-summary">
      <div class="import-summary-item"><div class="isn" style="color:var(--green-t)">${totalCreated.toLocaleString()}</div><div class="isl">Records imported</div></div>
      <div class="import-summary-item"><div class="isn" style="color:${totalErrors.length?'var(--amber-t)':'var(--text3)'}">${totalErrors.length}</div><div class="isl">Rows skipped</div></div>
      <div class="import-summary-item"><div class="isn">${(window._importRows?.length||0).toLocaleString()}</div><div class="isl">Total rows</div></div>
    </div>${totalErrors.length?`<div class="alert alert-warn" style="margin-top:10px">⚠️ ${totalErrors.length} skipped: ${totalErrors.slice(0,3).join('; ')}${totalErrors.length>3?'...':''}</div>`:''}`

    showToast(`✅ Imported ${totalCreated.toLocaleString()} records${totalErrors.length?' ('+totalErrors.length+' skipped)':''}`,totalErrors.length?'warn':'success')
    window._importRows=null

    if(totalCreated>0){
      setTimeout(()=>{closeModal();if(['companies','wibs','locations','funding','applications'].includes(currentPage)){loadPage(currentPage)}else{loadPage(type)}},totalErrors.length>0?3000:1500)
    }else{
      if(preview&&totalErrors.length)preview.innerHTML+=`<div class="alert alert-error" style="margin-top:8px">Nothing imported. First error: ${totalErrors[0]||'Unknown'}<br><br>Common fixes:<br>• Check column names match the template<br>• Required fields must not be empty<br>• Check for duplicate names already in system</div>`
      if(btn){btn.textContent='Retry';btn.disabled=false}
      return false
    }
  }catch(e){
    const bar=document.getElementById('imp-bar'),label=document.getElementById('imp-label')
    if(bar){bar.style.background='var(--red)';bar.style.width='100%'}
    if(label)label.textContent='Import failed'
    if(preview)preview.innerHTML+=`<div class="alert alert-error" style="margin-top:8px">⚠️ ${e.message}</div>`
    showToast('Import failed: '+e.message,'error')
    if(btn){btn.textContent='Retry';btn.disabled=false}
    return false
  }
}

async function exportExcel(type){
  closeAllIE();showToast('Preparing Excel export...','info')
  try{
    if(!window.XLSX){await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';s.onload=res;s.onerror=()=>rej(new Error('Failed to load Excel library'));document.head.appendChild(s)})}
    const r=await fetch(`/api/export/${type}`,{headers:{'Authorization':`Bearer ${token}`}})
    if(!r.ok){const d=await r.json().catch(()=>({}));throw new Error(d.error||'Export failed')}
    const csvText=await r.text()
    const lines=csvText.split(/\r?\n/).filter(l=>l.trim())
    const rows=lines.map(l=>{const vals=[];let cur='',inQ=false;for(let i=0;i<l.length;i++){const c=l[i];if(c==='"'){if(inQ&&l[i+1]==='"'){cur+='"';i++}else inQ=!inQ}else if(c===','&&!inQ){vals.push(cur);cur=''}else cur+=c}vals.push(cur);return vals})
    const ws=XLSX.utils.aoa_to_sheet(rows)
    const colWidths=rows[0]?.map((_,ci)=>({wch:Math.min(40,Math.max(10,...rows.map(r=>String(r[ci]||'').length)))}))
    if(colWidths)ws['!cols']=colWidths
    const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,type.charAt(0).toUpperCase()+type.slice(1))
    const filename=`valor-${type}-${new Date().toISOString().split('T')[0]}.xlsx`
    XLSX.writeFile(wb,filename);showToast(`✅ Exported as ${filename}`,'success')
  }catch(e){showToast(`Export failed: ${e.message}`,'error')}
}

async function downloadTemplate(type){

    showToast('Template downloaded ('+fieldDefs.length+' fields)','success')
  }
}

  'application deadline': 'application_deadline',
  'max per ein': 'max_award_per_ein',
  'max per employee': 'max_award_per_employee',
  /* application fields */
  'application': 'application_number',
  'application number': 'application_number',
  'wib': 'wib_name',
  'workforce board name': 'wib_name',
  'amount requested': 'award_amount_requested',
  'amount approved': 'award_amount_approved',
  'award amount': 'award_amount_requested',
  'award': 'award_amount_requested',
  'submission date': 'submission_date',
  'submitted': 'submission_date',
  'decision date': 'decision_date',
}

function smartAutoMatch(header, type) {
  var h = header.toLowerCase().trim()
  // Direct key match
  if (h in IMPORT_SYNONYMS) {
    var v = IMPORT_SYNONYMS[h]
    if (typeof v === 'object' && v[type]) return v[type]
    if (typeof v === 'string') return v
  }
  // Strip special chars and try again
  var hClean = h.replace(/[^a-z0-9 ]/g, '').trim()
  if (hClean in IMPORT_SYNONYMS) {
    var v2 = IMPORT_SYNONYMS[hClean]
    if (typeof v2 === 'object' && v2[type]) return v2[type]
    if (typeof v2 === 'string') return v2
  }
  // Check if any field key is a substring of the header or vice versa
  var fields = IMPORT_FIELDS[type] || []
  var hNoSpace = h.replace(/[^a-z0-9]/g,'')
  for (var i = 0; i < fields.length; i++) {
    var fk = fields[i].key.toLowerCase().replace(/[^a-z0-9]/g,'')
    if (fk === hNoSpace) return fields[i].key
    if (fk.length > 4 && hNoSpace.includes(fk)) return fields[i].key
    if (hNoSpace.length > 4 && fk.includes(hNoSpace)) return fields[i].key
  }
  return '__skip'
}

function openImportModal(type) {
  var typeLabels = {companies:'Companies',wibs:'Workforce Boards',locations:'Locations',funding:'Funding Opportunities',applications:'Applications'}
  var label = typeLabels[type] || type
  var reqNote = {
    companies: 'Required: Company Name. Supports linking by name.',
    wibs: 'Required: WIB Name + State + Source URL.',
    locations: 'Required: Location Name + State. Supports parent company linking by name.',
    funding: 'Required: Opportunity Name + Source URL.',
    applications: 'Required: Company Name.',
  }
  var fieldCount = (IMPORT_FIELDS[type]||[]).filter(function(f){ return f.key!=='__skip' }).length
  window._importStep = 1
  showModal('📥 Import '+label+' — '+fieldCount+' Supported Fields',
    '<div class="wiz-steps">' +
    '<div class="wiz-step active" id="wiz-s1"><div class="wiz-num">1</div><div class="wiz-label">Upload File</div></div>' +
    '<div class="wiz-line"></div>' +
    '<div class="wiz-step" id="wiz-s2"><div class="wiz-num">2</div><div class="wiz-label">Map Fields</div></div>' +
    '<div class="wiz-line"></div>' +
    '<div class="wiz-step" id="wiz-s3"><div class="wiz-num">3</div><div class="wiz-label">Import</div></div>' +
    '</div>' +
    '<div id="import-step-area">' +
    '<div class="alert alert-info" style="margin-bottom:10px">' +
    'ℹ️ '+reqNote[type]+' <strong>No row limits</strong> — files of any size are imported automatically in batches.' +
    '</div>' +
    '<div class="form-row form-full" style="margin-bottom:8px"><div class="form-group">' +
    '<div class="form-label">📥 Download CSV Template ('+fieldCount+' fields)</div>' +
    '<a href="/api/template/'+type+'" class="btn btn-sm" target="_blank" style="display:inline-flex;margin-top:4px">⬇ Download CSV Template</a>' +
    '</div></div>' +
    '<div class="form-row form-full"><div class="form-group">' +
    '<div class="form-label">Upload CSV or Excel File (.csv, .xlsx, .xls)</div>' +
    '<input type="file" id="import-file-input" accept=".csv,.tsv,.txt,.xlsx,.xls" style="border:.5px solid var(--border2);border-radius:7px;padding:8px 10px;font-size:11.5px;width:100%;margin-top:4px">' +
    '</div></div>' +
    '<div id="import-parse-err"></div>' +
    '</div>',
  async function() {

    /* ── STEP 1: Parse the CSV ── */
    if (window._importStep === 1) {
      var fileEl = document.getElementById('import-file-input')
      if (!fileEl||!fileEl.files||!fileEl.files[0]) {
        document.getElementById('import-parse-err').innerHTML='<div class="alert alert-error">Please select a CSV file</div>'
        return false
      }
      var text = await fileEl.files[0].text()
      var rows = parseCSVText(text)
      if (!rows||!rows.length) {
        document.getElementById('import-parse-err').innerHTML='<div class="alert alert-error">No data found in file — check that the file has a header row and data rows</div>'
        return false
      }
      window._importRows = rows
      window._importType = type
      window._importStep = 2

      /* mark step 2 active */
      var s1 = document.getElementById('wiz-s1'), s2 = document.getElementById('wiz-s2')
      if (s1) { s1.className='wiz-step done'; s1.querySelector('.wiz-num').style.background='var(--green)'; s1.querySelector('.wiz-num').style.color='#fff' }
      if (s2) { s2.className='wiz-step active'; s2.querySelector('.wiz-num').style.background='var(--nv)'; s2.querySelector('.wib-num'); s2.querySelector('.wiz-num').style.color='var(--cream)' }
      var btn = document.getElementById('modal-ok-btn')
      if (btn) { btn.textContent='Start Import →'; btn.disabled=false }

      var headers = Object.keys(rows[0])
      var fields  = IMPORT_FIELDS[type] || [{key:'__skip',label:'— Skip —'}]

      /* build field mapping UI */
      var mappedCount = 0
      var rowsHtml = headers.map(function(h, i) {
        var matched = smartAutoMatch(h, type)
        if (matched !== '__skip') mappedCount++
        var sampleVal = ''
        for (var ri = 0; ri < Math.min(3, rows.length); ri++) {
          if (rows[ri][h] && String(rows[ri][h]).trim()) { sampleVal = String(rows[ri][h]).trim(); break }
        }
        return '<div class="fmr-grid">' +
          '<div>' +
            '<div class="fmr-src" title="'+h+'">'+h+'</div>' +
            (sampleVal ? '<div style="font-size:9.5px;color:var(--text3);margin-top:2px;font-style:italic">e.g. '+sampleVal.slice(0,40)+(sampleVal.length>40?'...':'')+'</div>' : '') +
          '</div>' +
          '<div class="fmr-arrow">→</div>' +
          '<select class="fmr-sel" id="fmr-sel-'+i+'">' +
            fields.map(function(f){ return '<option value="'+f.key+'"'+(f.key===matched?' selected':'')+'>'+(f.required?'★ ':'')+f.label+'</option>' }).join('') +
          '</select>' +
        '</div>'
      }).join('')

      document.getElementById('import-step-area').innerHTML =
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">' +
          '<div style="font-size:11.5px;color:var(--text2)"><strong>'+headers.length+'</strong> CSV columns · <span style="color:var(--green-t)">'+rows.length+' rows</span></div>' +
          '<div style="font-size:10.5px;color:var(--text3)"><span style="color:var(--green-t);font-weight:600">'+mappedCount+'</span> auto-matched · review below</div>' +
        '</div>' +
        '<div style="display:grid;grid-template-columns:1fr 18px 1fr;gap:6px;margin-bottom:6px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:0 10px">' +
          '<span>CSV Column (your file)</span><span></span><span>CRM Field (destination)</span>' +
        '</div>' +
        '<div style="max-height:340px;overflow-y:auto;padding-bottom:8px">' + rowsHtml + '</div>' +
        '<div class="alert alert-info" style="margin-top:8px;font-size:10.5px">★ = Required field. Columns mapped to "— Skip —" will be ignored.</div>'

      return false /* keep modal open */
    }

    /* ── STEP 2: Run the import ── */
    if (window._importStep === 2) {
      var headers2 = Object.keys(window._importRows[0])
      var fieldMap = {}
      headers2.forEach(function(h, i) {
        var sel = document.getElementById('fmr-sel-'+i)
        if (sel && sel.value && sel.value !== '__skip') fieldMap[h] = sel.value
      })

      /* check required fields are mapped */
      var reqFields = (IMPORT_FIELDS[type]||[]).filter(function(f){ return f.required })
      var missingReq = reqFields.filter(function(rf){
        return !Object.values(fieldMap).includes(rf.key)
      })
      if (missingReq.length) {
        showToast('Please map required field: '+missingReq.map(function(f){ return f.label }).join(', '), 'error')
        return false
      }

      /* remap all rows */
      var mappedRows = window._importRows.map(function(row) {
        var out = {}
        Object.keys(fieldMap).forEach(function(csvCol) {
          var val = row[csvCol]
          if (val !== undefined && String(val).trim()) out[fieldMap[csvCol]] = String(val).trim()
        })
        /* also pass original keys for server-side fallback matching */
        return out
      })

      /* mark step 3 active */
      var btn2 = document.getElementById('modal-ok-btn')
      if (btn2) { btn2.disabled=true; btn2.textContent='Importing...' }
      var s3 = document.getElementById('wiz-s3')
      if (s3) { s3.className='wiz-step active'; s3.querySelector('.wiz-num').style.background='var(--nv)'; s3.querySelector('.wiz-num').style.color='var(--cream)' }

      document.getElementById('import-step-area').innerHTML =
        '<div style="margin-bottom:10px;font-size:12px;font-weight:500">Importing '+mappedRows.length+' records...</div>' +
        '<div class="prog-outer"><div class="prog-inner" id="import-prog" style="width:0%"></div></div>' +
        '<div id="import-prog-label" style="font-size:10.5px;color:var(--text3);margin-bottom:12px">Starting...</div>' +
        '<div id="import-errors"></div>'

      var BATCH = 200
      var totalBatches = Math.ceil(mappedRows.length / BATCH)
      var totalCreated = 0
      var allErrors = []

      for (var b = 0; b < totalBatches; b++) {
        var batch = mappedRows.slice(b * BATCH, (b+1) * BATCH)
        var pct = Math.round(((b+1) / totalBatches) * 100)
        var progEl = document.getElementById('import-prog')
        var labelEl = document.getElementById('import-prog-label')
        if (progEl) progEl.style.width = pct+'%'
        if (labelEl) labelEl.textContent = 'Batch '+(b+1)+' of '+totalBatches+' — '+pct+'% complete ('+totalCreated+' imported so far)'
        try {
          var result = await api('/api/import/'+type, 'POST', {rows:batch, batch:b+1, totalBatches:totalBatches})
          totalCreated += result.created || 0
          if (result.errors) allErrors = allErrors.concat(result.errors.slice(0,5))
        } catch(e) {
          allErrors.push('Batch '+(b+1)+' failed: '+e.message)
        }
      }

      /* show summary */
      var errEl = document.getElementById('import-errors')
      var progEl2 = document.getElementById('import-prog')
      var labelEl2 = document.getElementById('import-prog-label')
      if (progEl2) { progEl2.style.width='100%'; progEl2.style.background=totalCreated>0?'var(--green)':'var(--amber)' }
      if (labelEl2) labelEl2.textContent = 'Import complete! '+totalCreated+' imported · '+(mappedRows.length-totalCreated)+' skipped'

      if (errEl) {
        errEl.innerHTML =
          '<div class="import-summary">' +
            '<div class="isn-card"><div class="isn-n">'+mappedRows.length+'</div><div class="isn-l">Total rows</div></div>' +
            '<div class="isn-card"><div class="isn-n" style="color:var(--green-t)">'+totalCreated+'</div><div class="isn-l">Records imported</div></div>' +
            '<div class="isn-card"><div class="isn-n" style="color:'+(allErrors.length?'var(--red-t)':'var(--green-t)')+'">'+allErrors.length+'</div><div class="isn-l">Errors</div></div>' +
          '</div>' +
          (allErrors.length ? '<div class="alert alert-warn" style="margin-top:10px;font-size:10.5px;max-height:100px;overflow-y:auto"><strong>First errors:</strong><br>'+allErrors.slice(0,5).join('<br>')+'</div>' : '') +
          (totalCreated===0 ? '<div class="alert alert-error" style="margin-top:8px"><strong>Nothing imported.</strong> First error: '+(allErrors[0]||'Unknown')+'<br><br><strong>Common fixes:</strong><br>• Check column names match the template<br>• Required fields must not be empty<br>• <a href="/api/template/'+type+'" target="_blank" class="cell-link">Download CSV template</a></div>' : '') +
          '<div style="margin-top:12px;text-align:center">' +
            '<button class="btn btn-primary" onclick="closeModal();loadPage(\''+type+'\')">Done — View '+label+'</button>' +
          '</div>'
      }

      window._importStep = 1
      window._importRows = null
      return false
    }
  }, 'modal-xl')
}

function parseCSVText(text) {
  var lines = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n')
  if (!lines.length) return []
  function parseLine(line) {
    var fields=[],cur='',inQ=false
    for(var i=0;i<line.length;i++){
      var ch=line[i]
      if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++}else inQ=!inQ}
      else if(ch===','&&!inQ){fields.push(cur);cur=''}
      else cur+=ch
    }
    fields.push(cur); return fields
  }
  var headers=parseLine(lines[0]).map(function(h){return h.trim().replace(/^"|"$/g,'')})
  var rows=[]
  for(var i=1;i<lines.length;i++){
    if(!lines[i].trim())continue
    var vals=parseLine(lines[i]),row={}
    headers.forEach(function(h,j){row[h]=(vals[j]||'').trim().replace(/^"|"$/g,'')})
    rows.push(row)
  }
  return rows
}


render()
</script>
