<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valor Workforce Funding</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --nv:#0B1E3C;--nv2:#152d54;--nv3:#1e3d6e;
  --gd:#C9A84C;--gd2:#E8C96A;--cream:#E8D9A8;
  --white:#fff;--gray:#f8f7f6;--gray2:#f3f2f1;
  --border:#e5e7eb;--border2:#d1d5db;
  --text:#111827;--text2:#6b7280;--text3:#9ca3af;
  --green:#16a34a;--green-bg:#dcfce7;--green-t:#166534;
  --amber:#d97706;--amber-bg:#fef3c7;--amber-t:#92400e;
  --red:#dc2626;--red-bg:#fee2e2;--red-t:#991b1b;
  --blue:#2563eb;--blue-bg:#dbeafe;--blue-t:#1e40af;
  --purple:#7c3aed;--purple-bg:#ede9fe;--purple-t:#5b21b6;
  --teal:#0d9488;--teal-bg:#ccfbf1;--teal-t:#134e4a;
  --orange:#ea580c;--orange-bg:#fff7ed;--orange-t:#9a3412;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;background:var(--gray);color:var(--text);height:100vh;overflow:hidden;font-size:13px}
.app{display:flex;height:100vh}

/* ── SIDEBAR ── */
.sidebar{width:208px;background:var(--nv);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.logo-area{padding:13px 14px 10px;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0}
.logo-top{display:flex;align-items:center;gap:8px}
.logo-icon{width:28px;height:28px;border-radius:7px;background:rgba(201,168,76,.25);border:.5px solid rgba(201,168,76,.4);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.logo-name{font-size:11.5px;font-weight:600;color:var(--cream);line-height:1.25}
.logo-sub{font-size:8.5px;color:rgba(255,255,255,.28);margin-top:1px;letter-spacing:.6px;text-transform:uppercase}
.nav-scroll{flex:1;overflow-y:auto;padding:5px 0 0}
.nav-scroll::-webkit-scrollbar{width:3px}
.nav-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.nav-sec{padding:8px 12px 3px;font-size:9px;color:rgba(255,255,255,.22);letter-spacing:1.1px;text-transform:uppercase;font-weight:600}
.nav-item{display:flex;align-items:center;gap:7px;padding:6px 12px;font-size:11.5px;color:rgba(255,255,255,.5);cursor:pointer;border-left:2px solid transparent;transition:all .1s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85)}
.nav-item.active{background:rgba(201,168,76,.14);color:var(--gd2);border-left-color:var(--gd)}
.nav-item .ni{font-size:13px;width:15px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:rgba(220,60,60,.9);color:#fff;font-size:8px;font-weight:600;padding:1px 5px;border-radius:8px;flex-shrink:0}
.nav-badge.green{background:#16a34a}
.nav-badge.amber{background:#d97706}
.nav-divider{height:.5px;background:rgba(255,255,255,.06);margin:5px 0}
.nav-group-toggle{display:flex;align-items:center;gap:5px;padding:5px 12px 2px;font-size:9px;color:rgba(255,255,255,.22);cursor:pointer;letter-spacing:.5px;text-transform:uppercase}
.nav-sub{padding-left:8px}
.user-foot{padding:9px 12px;border-top:1px solid rgba(255,255,255,.07);flex-shrink:0}
.user-row{display:flex;align-items:center;gap:8px}
.user-av{width:26px;height:26px;border-radius:50%;background:rgba(201,168,76,.22);display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:600;color:var(--gd);flex-shrink:0}
.user-nm{font-size:10.5px;font-weight:500;color:rgba(255,255,255,.75);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-rl{font-size:8.5px;color:rgba(255,255,255,.3);text-transform:capitalize}
.user-actions{margin-left:auto;display:flex;gap:3px}
.user-act-btn{background:none;border:none;color:rgba(255,255,255,.25);cursor:pointer;font-size:13px;padding:2px;transition:color .1s}
.user-act-btn:hover{color:rgba(255,255,255,.6)}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:var(--white);border-bottom:.5px solid var(--border);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px}
.topbar-left{display:flex;align-items:center;gap:8px;min-width:0}
.page-title{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap}
.topbar-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap}
.topbar-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.btn{padding:5px 11px;border-radius:7px;font-size:11.5px;cursor:pointer;border:.5px solid var(--border);background:var(--white);color:var(--text);font-family:inherit;transition:all .1s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn:hover{background:var(--gray2)}
.btn-primary{background:var(--nv);color:var(--cream);border-color:var(--nv);font-weight:600}
.btn-primary:hover{background:var(--nv2)}
.btn-success{background:var(--green-bg);color:var(--green-t);border-color:transparent;font-weight:500}
.btn-danger{background:var(--red-bg);color:var(--red-t);border-color:transparent}
.btn-ghost{background:transparent;border-color:transparent;color:var(--text2)}
.btn-ghost:hover{background:var(--gray2);color:var(--text)}
.btn-sm{padding:4px 9px;font-size:11px}
.btn-xs{padding:2px 7px;font-size:10px;border-radius:5px}
.content{flex:1;overflow-y:auto;padding:14px 16px}
.content::-webkit-scrollbar{width:5px}
.content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── TABS ── */
.record-tabs{display:flex;align-items:center;gap:0;border-bottom:.5px solid var(--border);background:var(--white);padding:0 16px;flex-shrink:0;overflow-x:auto}
.record-tab{padding:9px 14px;font-size:12px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .1s;display:flex;align-items:center;gap:5px}
.record-tab:hover{color:var(--text)}
.record-tab.active{color:var(--nv);border-bottom-color:var(--nv);font-weight:500}
.record-tab .tab-count{font-size:10px;background:var(--gray2);color:var(--text2);padding:1px 5px;border-radius:10px}
.record-tab.active .tab-count{background:var(--blue-bg);color:var(--blue-t)}

/* ── CARDS ── */
.card{background:var(--white);border:.5px solid var(--border);border-radius:10px;overflow:hidden}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:.5px solid var(--border)}
.card-title{font-size:12px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px}
.card-body{padding:12px 14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}

/* ── METRIC CARDS ── */
.metric{background:var(--white);border:.5px solid var(--border);border-radius:10px;padding:12px 14px}
.metric-label{font-size:10px;color:var(--text2);margin-bottom:4px;font-weight:500}
.metric-value{font-size:22px;font-weight:600;color:var(--text);line-height:1}
.metric-sub{font-size:10px;color:var(--text3);margin-top:3px}
.metric-bar{height:3px;border-radius:2px;background:var(--gray2);margin-top:6px;overflow:hidden}
.metric-fill{height:100%;border-radius:2px;background:var(--nv)}

/* ── REVENUE BAND ── */
.rev-band{background:var(--nv);border-radius:10px;padding:12px 16px;display:flex;gap:0;flex-wrap:wrap;margin-bottom:12px}
.rev-item{flex:1;min-width:110px;padding:0 12px;border-right:.5px solid rgba(255,255,255,.1)}
.rev-item:first-child{padding-left:0}
.rev-item:last-child{border-right:none}
.rev-n{font-size:18px;font-weight:600;color:var(--cream)}
.rev-l{font-size:9px;color:rgba(255,255,255,.4);margin-top:2px}

/* ── TABLE ── */
.tbl-wrap{background:var(--white);border:.5px solid var(--border);border-radius:10px;overflow:hidden}
.tbl-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:.5px solid var(--border);gap:8px;flex-wrap:wrap}
.tbl-head-left{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tbl-title{font-size:12px;font-weight:600;color:var(--text)}
.search-inp{display:flex;align-items:center;gap:5px;background:var(--gray2);border:.5px solid var(--border);border-radius:6px;padding:5px 9px}
.search-inp input{background:none;border:none;outline:none;font-size:11px;color:var(--text);width:150px;font-family:inherit}
.search-inp input::placeholder{color:var(--text3)}
.filter-btn{display:flex;align-items:center;gap:4px;padding:5px 9px;border-radius:6px;border:.5px solid var(--border);background:var(--white);font-size:11px;color:var(--text2);cursor:pointer}
.filter-btn:hover{background:var(--gray2)}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:7px 12px;color:var(--text2);font-weight:500;border-bottom:.5px solid var(--border);font-size:10px;white-space:nowrap;background:var(--gray);user-select:none;cursor:pointer}
th:hover{background:var(--gray2)}
td{padding:8px 12px;border-bottom:.5px solid #f9fafb;color:var(--text);font-size:11.5px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa;cursor:pointer}
.tbl-footer{padding:7px 14px;font-size:10px;color:var(--text3);border-top:.5px solid var(--border);background:var(--gray);display:flex;align-items:center;justify-content:space-between}

/* ── PILLS ── */
.pill{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:9.5px;font-weight:600;white-space:nowrap}
.dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.p-green{background:var(--green-bg);color:var(--green-t)}
.p-amber{background:var(--amber-bg);color:var(--amber-t)}
.p-red{background:var(--red-bg);color:var(--red-t)}
.p-blue{background:var(--blue-bg);color:var(--blue-t)}
.p-purple{background:var(--purple-bg);color:var(--purple-t)}
.p-teal{background:var(--teal-bg);color:var(--teal-t)}
.p-orange{background:var(--orange-bg);color:var(--orange-t)}
.p-gray{background:var(--gray2);color:var(--text2)}
.d-green{background:#22c55e}.d-amber{background:#f59e0b}.d-red{background:#ef4444}.d-blue{background:#3b82f6}.d-purple{background:#8b5cf6}.d-teal{background:#14b8a6}.d-gray{background:#9ca3af}

/* ── MODALS ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal{background:var(--white);border-radius:14px;width:100%;max-width:540px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.18)}
.modal-lg{max-width:720px}
.modal-xl{max-width:900px}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:15px 20px;border-bottom:.5px solid var(--border);position:sticky;top:0;background:var(--white);z-index:1}
.modal-title{font-size:13px;font-weight:600;color:var(--text)}
.modal-close{background:none;border:none;cursor:pointer;color:var(--text2);font-size:18px;padding:2px;line-height:1;border-radius:4px}
.modal-close:hover{background:var(--gray2);color:var(--text)}
.modal-body{padding:18px 20px}
.modal-foot{padding:13px 20px;border-top:.5px solid var(--border);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:var(--white)}

/* ── FORMS ── */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-full{grid-template-columns:1fr}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-label{font-size:11px;font-weight:500;color:var(--text2)}
.form-req{color:var(--red)}
input,select,textarea{border:.5px solid var(--border2);border-radius:7px;padding:7px 10px;font-size:11.5px;color:var(--text);font-family:inherit;outline:none;transition:border .1s;width:100%;background:var(--white)}
input:focus,select:focus,textarea:focus{border-color:var(--nv)}
textarea{resize:vertical;min-height:70px}
.checkbox-row{display:flex;align-items:center;gap:8px;font-size:11.5px;cursor:pointer}
.checkbox-row input[type=checkbox]{width:auto;width:14px;height:14px}
.alert{padding:9px 12px;border-radius:7px;font-size:11px;margin-bottom:10px;display:flex;align-items:flex-start;gap:7px}
.alert-error{background:var(--red-bg);color:var(--red-t);border:.5px solid #fca5a5}
.alert-success{background:var(--green-bg);color:var(--green-t);border:.5px solid #86efac}
.alert-info{background:var(--blue-bg);color:var(--blue-t);border:.5px solid #93c5fd}
.alert-warn{background:var(--amber-bg);color:var(--amber-t);border:.5px solid #fcd34d}

/* ── WIB PROFILE ── */
.profile-layout{display:flex;gap:12px;height:100%}
.profile-left{width:280px;flex-shrink:0;display:flex;flex-direction:column;gap:10px}
.profile-right{flex:1;min-width:0;display:flex;flex-direction:column;gap:10px}
.profile-header{background:var(--white);border:.5px solid var(--border);border-radius:10px;padding:14px}
.profile-avatar{width:44px;height:44px;border-radius:10px;background:var(--nv);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;color:var(--cream);margin-bottom:10px}
.profile-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px}
.profile-meta{font-size:11px;color:var(--text2);margin-bottom:10px}
.field-row{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:.5px solid var(--gray2);font-size:11.5px}
.field-row:last-child{border-bottom:none}
.field-key{color:var(--text2);width:110px;flex-shrink:0;font-size:11px;padding-top:1px}
.field-val{color:var(--text);flex:1;word-break:break-word}
.field-link{color:var(--blue);cursor:pointer;text-decoration:none}
.field-link:hover{text-decoration:underline}

/* ── NOTES ── */
.note-compose{background:var(--white);border:.5px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:10px}
.note-compose textarea{border:.5px solid var(--border2);border-radius:7px;width:100%;padding:9px 11px;font-size:12px;font-family:inherit;resize:none;min-height:80px;outline:none;transition:border .1s}
.note-compose textarea:focus{border-color:var(--nv)}
.note-compose-foot{display:flex;align-items:center;justify-content:space-between;margin-top:8px;flex-wrap:wrap;gap:6px}
.note-actions{display:flex;gap:5px;flex-wrap:wrap}
.note-card{background:var(--white);border:.5px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.note-meta{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.note-av{width:24px;height:24px;border-radius:50%;background:var(--blue-bg);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:var(--blue-t);flex-shrink:0}
.note-author{font-size:11px;font-weight:500;color:var(--text)}
.note-time{font-size:10px;color:var(--text3)}
.note-type{font-size:9px;font-weight:600;padding:1px 6px;border-radius:4px}
.note-content{font-size:12px;color:var(--text);line-height:1.6;white-space:pre-wrap}
.aircall-note{background:#f0fdf4;border:.5px solid #86efac;border-radius:10px;padding:12px 14px;margin-bottom:8px}
.aircall-header{font-size:10px;font-weight:700;color:var(--green-t);letter-spacing:.3px;margin-bottom:8px;padding-bottom:7px;border-bottom:.5px solid #86efac}
.aircall-body{font-size:11.5px;color:var(--text);line-height:1.65}
.aircall-section{margin-top:8px}
.aircall-section-title{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}

/* ── TASKS ── */
.task-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:.5px solid var(--gray2)}
.task-row:last-child{border-bottom:none}
.task-check{width:16px;height:16px;border-radius:4px;border:.5px solid var(--border2);background:var(--white);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px}
.task-check.done{background:var(--green);border-color:var(--green);color:#fff}
.task-title{flex:1;font-size:12px;color:var(--text)}
.task-title.done{text-decoration:line-through;color:var(--text3)}
.task-due{font-size:10px;color:var(--text3);white-space:nowrap}
.task-due.overdue{color:var(--red);font-weight:500}
.task-assignee{width:22px;height:22px;border-radius:50%;background:var(--blue-bg);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:var(--blue-t);flex-shrink:0}

/* ── SCORE BAR ── */
.score-wrap{display:flex;align-items:center;gap:6px}
.score-bar{height:4px;border-radius:2px;background:var(--gray2);overflow:hidden;width:48px}
.score-fill{height:100%;border-radius:2px;background:var(--nv)}
.score-n{font-size:10px;color:var(--text2);width:20px}

/* ── AI PANEL ── */
.ai-panel{background:var(--white);border:.5px solid var(--border);border-radius:10px;overflow:hidden}
.ai-header{background:var(--nv);padding:10px 14px;display:flex;align-items:center;gap:7px}
.ai-title{font-size:12px;font-weight:600;color:var(--cream)}
.ai-badge{font-size:9px;background:rgba(201,168,76,.3);color:var(--gd);padding:1px 6px;border-radius:10px;font-weight:600}
.ai-body{padding:10px}
.ai-msg{padding:8px 10px;border-radius:7px;font-size:11.5px;line-height:1.6;margin-bottom:7px}
.ai-msg-user{background:var(--blue-bg);color:var(--blue-t);margin-left:20px}
.ai-msg-ai{background:var(--gray2);color:var(--text);margin-right:20px}
.ai-input-row{display:flex;gap:6px;margin-top:8px}
.ai-input{flex:1;border:.5px solid var(--border2);border-radius:7px;padding:7px 10px;font-size:11px;font-family:inherit;outline:none}
.ai-input:focus{border-color:var(--nv)}
.ai-quick-btns{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.ai-quick-btn{padding:4px 9px;border-radius:6px;border:.5px solid var(--border);background:var(--white);font-size:10px;color:var(--text2);cursor:pointer;transition:all .1s}
.ai-quick-btn:hover{background:var(--blue-bg);color:var(--blue-t);border-color:var(--blue)}

/* ── ACTIVITY ── */
.activity-row{display:flex;gap:9px;padding:8px 0;border-bottom:.5px solid var(--gray2)}
.activity-row:last-child{border-bottom:none}
.activity-icon{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;margin-top:1px}
.activity-body{flex:1}
.activity-text{font-size:11.5px;color:var(--text);line-height:1.4}
.activity-time{font-size:10px;color:var(--text3);margin-top:2px}

/* ── CHAT ── */
.chat-layout{display:flex;height:calc(100vh - 120px);gap:0}
.chat-sidebar{width:240px;border-right:.5px solid var(--border);background:var(--white);display:flex;flex-direction:column;flex-shrink:0}
.chat-sidebar-hd{padding:12px 14px;border-bottom:.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.chat-sidebar-title{font-size:12px;font-weight:600}
.chat-list{flex:1;overflow-y:auto}
.chat-item{display:flex;align-items:center;gap:9px;padding:9px 14px;cursor:pointer;transition:background .1s;border-bottom:.5px solid var(--gray)}
.chat-item:hover{background:var(--gray2)}
.chat-item.active{background:var(--blue-bg)}
.chat-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.chat-name{font-size:12px;font-weight:500;color:var(--text)}
.chat-preview{font-size:10.5px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px}
.chat-time{font-size:9.5px;color:var(--text3);margin-left:auto;flex-shrink:0}
.chat-unread{width:16px;height:16px;background:var(--blue);color:#fff;border-radius:50%;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chat-main{flex:1;display:flex;flex-direction:column;background:var(--white)}
.chat-topbar{padding:11px 16px;border-bottom:.5px solid var(--border);display:flex;align-items:center;gap:10px}
.chat-messages{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.msg{display:flex;gap:9px;align-items:flex-start}
.msg.mine{flex-direction:row-reverse}

<body>
<div id="app"></div>

<script>
// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let token = localStorage.getItem('valor_token')
let currentUser = null
let currentPage = 'dashboard'
let currentWib = null
let wibTab = 'overview'
let notifOpen = false
let chatChannel = 'general'
let ieMenuOpen = null
let sessionTimer = null
const SESSION_TIMEOUT_MS = 60 * 60 * 1000  // 1 hour of inactivity
const SESSION_WARN_MS     = 55 * 60 * 1000  // warn 5 min before logout

const COLORS = ['#3b82f6','#8b5cf6','#10b981','#f59e0b','#ef4444','#6366f1','#14b8a6','#f97316']
function colorFor(s){return COLORS[(s||'').charCodeAt(0)%COLORS.length]}

// ═══════════════════════════════════════════════════════
// SESSION MANAGEMENT — 1-hour inactivity timeout
// ═══════════════════════════════════════════════════════
let sessionWarnTimer = null
let sessionWarnBanner = null

function startSessionTimer(){
  clearTimeout(sessionTimer)
  clearTimeout(sessionWarnTimer)
  dismissSessionWarning()

  // 5-minute warning at 55 minutes
  sessionWarnTimer = setTimeout(showSessionWarning, SESSION_WARN_MS)

  // Hard logout at 60 minutes
  sessionTimer = setTimeout(()=>{
    dismissSessionWarning()
    showToast('Signed out — 1 hour of inactivity reached.','warn')
    setTimeout(()=>logout(), 2500)
  }, SESSION_TIMEOUT_MS)
}

function showSessionWarning(){
  if(sessionWarnBanner || !token) return
  const banner = document.createElement('div')
  banner.id = 'session-warn-banner'
  banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#b45309;color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:500;box-shadow:0 3px 12px rgba(0,0,0,.25);gap:12px'
  banner.innerHTML = `<span>⏱️ <strong>Session expiring</strong> — You will be signed out in <span id="session-countdown">5:00</span> due to inactivity.</span>
    <div style="display:flex;gap:8px;flex-shrink:0">
      <button onclick="extendSession()" style="background:#fff;color:#b45309;border:none;border-radius:6px;padding:5px 14px;font-size:11.5px;font-weight:700;cursor:pointer">Stay Signed In</button>
      <button onclick="logout()" style="background:rgba(0,0,0,.25);color:#fff;border:none;border-radius:6px;padding:5px 12px;font-size:11px;cursor:pointer">Sign Out</button>
    </div>`
  document.body.prepend(banner)
  sessionWarnBanner = banner

  let secsLeft = 5 * 60
  const tick = setInterval(()=>{
    secsLeft--
    const el = document.getElementById('session-countdown')
    if(!el || secsLeft <= 0){ clearInterval(tick); return }
    el.textContent = Math.floor(secsLeft/60)+':'+(secsLeft%60).toString().padStart(2,'0')
  }, 1000)
  banner._tick = tick
}

function dismissSessionWarning(){
  if(sessionWarnBanner){
    clearInterval(sessionWarnBanner._tick)
    sessionWarnBanner.remove()
    sessionWarnBanner = null
  }
}

function extendSession(){
  dismissSessionWarning()
  startSessionTimer()
  showToast('Session extended — 1 hour of inactivity before auto sign-out.','success')
}

function resetSessionTimer(){
  if(token) startSessionTimer()
}
// Reset on any real user interaction — mousemove throttled to avoid constant calls
let _lastMouseReset = 0
document.addEventListener('click', e=>{ if(!e.target.closest('#session-warn-banner')) resetSessionTimer() },{passive:true})
document.addEventListener('keydown', resetSessionTimer,{passive:true})
document.addEventListener('mousemove', ()=>{ const now=Date.now(); if(now-_lastMouseReset>30000){_lastMouseReset=now;resetSessionTimer()} },{passive:true})

function showToast(msg,type='info'){
  const colors={info:'var(--blue-bg)',warn:'var(--amber-bg)',error:'var(--red-bg)',success:'var(--green-bg)'}
  const textColors={info:'var(--blue-t)',warn:'var(--amber-t)',error:'var(--red-t)',success:'var(--green-t)'}
  const t=document.createElement('div')
  t.style.cssText=`position:fixed;bottom:20px;right:20px;z-index:1000;padding:10px 16px;border-radius:9px;background:${colors[type]||colors.info};color:${textColors[type]||textColors.info};font-size:12px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.12);max-width:320px;transition:opacity .3s`
  t.textContent=msg
  document.body.appendChild(t)
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300)},3500)
}

// ═══════════════════════════════════════════════════════
// API
// ═══════════════════════════════════════════════════════
async function api(url,method='GET',body=null){
  const opts={method,headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`}}
  if(body)opts.body=JSON.stringify(body)
  let r
  // Separate fetch from JSON parse so we get the real error in each case
  try{
    r=await fetch(url,opts)
  }catch(e){
    throw new Error('Cannot reach server — check your connection or try again in a moment')
  }
  if(r.status===401){
    token=null;currentUser=null
    localStorage.removeItem('valor_token')
    clearTimeout(sessionTimer)
    renderLogin()
    throw new Error('Session expired — please sign in again')
  }
  // Try to parse JSON — if server returned HTML (Render error page), give clear message
  let d
  try{
    d=await r.json()
  }catch(e){
    throw new Error(`Server error (${r.status}) — the server may be restarting, please try again in 30 seconds`)
  }
  if(r.status===403){throw new Error(d.error||'Permission denied')}
  if(!r.ok)throw new Error(d.error||`Request failed (${r.status})`)
  return d
}

async function apiDownload(url){
  // For CSV downloads — doesn't JSON-parse
  const r=await fetch(url,{headers:{'Authorization':`Bearer ${token}`}})
  if(!r.ok){const d=await r.json().catch(()=>({}));throw new Error(d.error||'Export failed')}
  const blob=await r.blob()
  const cd=r.headers.get('content-disposition')||''
  const name=cd.match(/filename="([^"]+)"/)?.[1]||'valor-export.csv'
  const a=document.createElement('a')
  a.href=URL.createObjectURL(blob)
  a.download=name
  a.click()
  URL.revokeObjectURL(a.href)
}

async function apiAI(prompt,context=''){
  try{
    // Route through server to keep API key secure
    const d=await api('/api/ai','POST',{prompt,context})
    if(d.error&&!d.text)return'AI Error: '+(d.error||'unknown error')
    if(d.error&&d.text)return d.text  // server returns helpful message
    return d.text||'No response generated.'
  }catch(e){
    if(e.message?.includes('Server error')||e.message?.includes('restart')){
      return'⏳ AI unavailable — server is starting up. Wait 30 seconds and try again.'
    }
    if(e.message?.includes('Session expired')){
      return'Session expired — please sign in again.'
    }
    return'❌ AI connection failed: '+e.message+'. Check that ANTHROPIC_API_KEY is set in Render environment variables.'
  }
}

// ═══════════════════════════════════════════════════════
// RENDER ENGINE
// ═══════════════════════════════════════════════════════
async function render(){
  if(!token){renderLogin();return}
  try{
    const me=await api('/api/me')
    currentUser=me
    startSessionTimer()
    renderApp()
  }catch(e){
    token=null;localStorage.removeItem('valor_token')
    renderLogin()
  }
}

        <div style="font-size:20px;font-weight:700;color:var(--cream)">Valor Workforce Funding</div>

        </div>
        <div style="margin-bottom:18px">
          <div style="font-size:11px;color:rgba(255,255,255,.45);margin-bottom:5px">Password</div>
          <input type="password" id="lp" placeholder="••••••••" autocomplete="current-password" style="background:rgba(255,255,255,.07);border:.5px solid rgba(255,255,255,.12);color:#fff;border-radius:8px;padding:9px 12px;width:100%;font-family:inherit;outline:none;font-size:12px">
        </div>
        <button onclick="doLogin()" id="lbtn" style="width:100%;background:var(--gd);color:var(--nv);border:none;border-radius:8px;padding:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">Sign in</button>

  document.getElementById('lp').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()})
}

async function doLogin(){
  const email=document.getElementById('le').value
  const password=document.getElementById('lp').value
  const btn=document.getElementById('lbtn')
  btn.disabled=true;btn.textContent='Signing in...'
  document.getElementById('login-err').innerHTML=''
  try{
    const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})})
    const d=await r.json()
    if(!r.ok)throw new Error(d.error)
    token=d.token
    localStorage.setItem('valor_token',token)
    render()
  }catch(e){
    document.getElementById('login-err').innerHTML=`<div class="alert alert-error">⚠️ ${e.message}</div>`
    btn.disabled=false;btn.textContent='Sign in'
  }
}

async function logout(){
  try{await api('/api/logout','POST')}catch{}
  token=null;currentUser=null
  localStorage.removeItem('valor_token')
  clearTimeout(sessionTimer)
  render()
}

  document.getElementById('tab-area').innerHTML=`
  <div class="record-tabs" id="record-tabs-bar">
    ${tabs.map(t=>`<div class="record-tab${t.id===active?' active':''}" onclick="${onSwitch}('${t.id}')">
      ${t.icon||''}${t.label}${t.count!==undefined?`<span class="tab-count">${t.count}</span>`:''}
    </div>`).join('')}
  </div>`
}

}

async function openWibProfile(id){
  if(!id||id==='refresh'){if(currentWib)id=currentWib.id;else{loadPage('wibs');return}}
  currentWib=null
  document.getElementById('tab-area').innerHTML=''
  document.getElementById('page-area').innerHTML='<div class="loading">⏳ Loading WIB profile...</div>'
  // Use single-record endpoint instead of loading all 500 WIBs
  try{
    currentWib=await api('/api/wibs/'+id)
  }catch(e){
    // Fallback: search in cached list
    if(window._wibs?.length){currentWib=window._wibs.find(w=>w.id===id)}
  }
  if(!currentWib){document.getElementById('page-area').innerHTML='<div class="alert alert-error">WIB not found</div>';return}
  setTopbar(`<span onclick="loadPage('wibs')" style="cursor:pointer;color:var(--text2);font-weight:400">Workforce Boards</span> <span style="color:var(--text3)"> / </span> ${currentWib.wib_name}`,'','')
  setTabs([
    {id:'overview',icon:'📊 ',label:'Overview'},
    {id:'notes',icon:'📝 ',label:'Notes'},
    {id:'tasks',icon:'✅ ',label:'Tasks'},
    {id:'funding',icon:'💰 ',label:'Funding'},
    {id:'contacts',icon:'👤 ',label:'Contacts'},
    {id:'files',icon:'📁 ',label:'Files'},
    {id:'activity',icon:'⚡ ',label:'Activity'},
  ],wibTab,'switchWibTab')
  renderWibTab()
  // Load real data for the active tab
  loadWibTabData(wibTab)
}

function switchWibTab(tab){
  wibTab=tab
  document.querySelectorAll('.record-tab').forEach(el=>el.classList.remove('active'))
  const tabs=document.querySelectorAll('.record-tab')
  tabs.forEach(t=>{if(t.getAttribute('onclick')?.includes(`'${tab}'`))t.classList.add('active')})
  renderWibTab()
  // Load async data after render
  loadWibTabData(tab)
}

window._wibFilters={search:'',state:'',status:''}
function filterWibs(q){window._wibFilters.search=q;applyWibFilters()}
function filterWibsByState(s){window._wibFilters.state=s;applyWibFilters()}
function filterWibsByStatus(s){window._wibFilters.status=s;applyWibFilters()}
function applyWibFilters(){
  let d=[...(window._wibs||[])]
  const {search,state,status}=window._wibFilters
  if(search)d=d.filter(w=>w.wib_name.toLowerCase().includes(search.toLowerCase())||(w.short_name||'').toLowerCase().includes(search.toLowerCase()))
  if(state)d=d.filter(w=>w.state===state)
  if(status)d=d.filter(w=>w.status===status)
  document.getElementById('wibs-table-container').innerHTML=renderWibTable(d)
}

async function deleteWib(id){

  try{await api('/api/wibs/'+id,'DELETE');showToast('WIB record deleted','success');loadPage('wibs')}catch(e){showToast(e.message,'error')}
}

async function loadTasksFromDB(){
  try{
    const r=await api('/api/tasks?limit=200')
    window._tasks=r.data||[]
    renderTasksTable(window._tasks)
  }catch(e){
    document.getElementById('tasks-tbody').innerHTML=`<tr><td colspan="6" style="padding:20px;text-align:center"><div class="alert alert-error">Failed to load tasks: ${e.message}</div></td></tr>`
  }
}

function getTaskMeta(t){
  if(t.metadata&&typeof t.metadata==='object'&&Object.keys(t.metadata).length)return t.metadata
  try{const p=JSON.parse(t.details||'{}');if(typeof p==='object'&&p!==null&&(p.title||p.done!==undefined))return p}catch(e){}
  return{title:t.details||'Task',done:false}
}

function renderTasksTable(tasks){
  const tbody=document.getElementById('tasks-tbody')
  const footer=document.getElementById('tasks-footer')
  if(!tbody)return
  if(!tasks.length){
    tbody.innerHTML='<tr><td colspan="6" style="padding:30px;text-align:center;color:var(--text3)"><div style="font-size:24px;margin-bottom:8px">✅</div>No tasks yet — create one above.</td></tr>'
    if(footer)footer.textContent='0 tasks'
    return
  }
  const now=new Date()
  const prioColor={urgent:'p-red',high:'p-amber',normal:'p-blue',low:'p-gray'}
  tbody.innerHTML=tasks.map(t=>{
    const m=getTaskMeta(t)
    const title=m.title||t.details||'Untitled task'
    const due=m.due_date?new Date(m.due_date):null
    const overdue=due&&!m.done&&due<now
    const dueStr=due?due.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'No due date'
    const assignee=m.assigned_to||t.user?.full_name||'Unassigned'
    return`<tr style="${m.done?'opacity:.5':''}">
      <td><div class="task-check${m.done?' done':''}" onclick="toggleTaskDB('${t.id}',${!!m.done})" style="cursor:pointer">✓</div></td>
      <td><span class="${m.done?'task-title done':'task-title'}">${title}</span></td>
      <td><span class="pill ${prioColor[m.priority]||'p-gray'}">${m.priority||'normal'}</span></td>
      <td><span class="task-due${overdue?' overdue':''}">${overdue?'⚠️ ':''} ${dueStr}</span></td>
      <td><div style="display:flex;align-items:center;gap:5px"><div class="task-assignee">${assignee.slice(0,2).toUpperCase()}</div><span style="font-size:11px;color:var(--text2)">${assignee}</span></div></td>
      <td><div class="action-btns">
        <button class="action-btn" onclick="toggleTaskDB('${t.id}',${!!m.done})">${m.done?'Reopen':'Done'}</button>
        <button class="action-btn del" onclick="deleteTask('${t.id}')">Delete</button>
      </div></td>
    </tr>`
  }).join('')
  const done=tasks.filter(t=>getTaskMeta(t).done).length
  const overdue=tasks.filter(t=>{const m=getTaskMeta(t);const d=m.due_date?new Date(m.due_date):null;return d&&!m.done&&d<now}).length
  if(footer)footer.textContent=`${tasks.length} tasks · ${done} completed · ${overdue} overdue`
  setTopbar('Tasks',`${tasks.length} total`,document.querySelector('.topbar-right')?.innerHTML||'')
}

function filterTasksBy(filter){
  if(!window._tasks)return
  let d=window._tasks
  const now=new Date()
  if(filter==='mine')d=d.filter(t=>(t.metadata?.assigned_to||'').toLowerCase().includes((currentUser?.full_name||'').toLowerCase()))
  else if(filter==='overdue')d=d.filter(t=>{const due=t.metadata?.due_date?new Date(t.metadata.due_date):null;return due&&!t.metadata?.done&&due<now})
  else if(filter==='done')d=d.filter(t=>t.metadata?.done)
  renderTasksTable(d)
}

function filterTaskSearch(q){
  if(!window._tasks)return
  const d=q?window._tasks.filter(t=>(t.details||'').toLowerCase().includes(q.toLowerCase())):window._tasks
  renderTasksTable(d)
}

async function toggleTaskDB(id,isDone){
  try{
    // Send full state update 
    await api('/api/tasks/'+id,'PUT',{done:!isDone,_toggle:true})
    await loadTasksFromDB()
    showToast(isDone?'Task reopened':'Task completed','success')
  }catch(e){showToast('Failed to update task: '+e.message,'error')}
}

async function deleteTask(id){
  if(!confirm('Delete this task?'))return
  try{
    await api('/api/tasks/'+id,'PUT',{deleted:true})
    showToast('Task deleted','success')
    await loadTasksFromDB()
  }catch(e){showToast('Delete failed: '+e.message,'error')}
}

    if(!title){err.innerHTML='<div class="alert alert-error">Task title is required</div>';return false}
    try{
      await api('/api/tasks','POST',{
        title,
        due_date:document.getElementById('task-due').value||null,
        priority:document.getElementById('task-priority').value,
        assigned_to:document.getElementById('task-assign').value||null,
        notes:document.getElementById('task-notes').value||null,
        record_type:recordType||null,
        record_id:recordId||null
      })
      showToast('Task created','success')
      if(currentPage==='tasks')loadPage('tasks')
    }catch(e){
      if(e.message&&e.message.includes('details')){
        err.innerHTML='<div class="alert alert-warn">⚠️ Database schema needs refresh. Refreshing...</div>'
        try{
          await api('/api/refresh-schema','POST',{})
          // Retry once
          await api('/api/tasks','POST',{title,due_date:document.getElementById('task-due').value||null,priority:document.getElementById('task-priority').value,assigned_to:document.getElementById('task-assign').value||null,notes:document.getElementById('task-notes').value||null})
          showToast('Task created after schema refresh','success')
          if(currentPage==='tasks')loadPage('tasks')
          return true
        }catch(e2){
          err.innerHTML=`<div class="alert alert-error">⚠️ Schema refresh failed: ${e2.message}</div>`
        }
      } else {
        err.innerHTML=`<div class="alert alert-error">⚠️ ${e.message}</div>`
      }
      return false
    }
  })
}

  if(!list) return
  if(!notes.length){

    return

  list.innerHTML = notes.map(n => renderDbNoteCard(n)).join('')

function filterGlobalNotes(q){
  if(!window._globalNotes) return
  const filtered = q ? window._globalNotes.filter(n=>(n.details||'').toLowerCase().includes(q.toLowerCase())||(n.user?.full_name||'').toLowerCase().includes(q.toLowerCase())) : window._globalNotes
  renderGlobalNotes(filtered)
}

async function loadPermissionsMatrix() {
  const wrap = document.getElementById('permissions-matrix-wrap')
  if (!wrap) return
  try {
    const { permissions, locked } = await api('/api/permissions')
    window._permissions = permissions
    window._permissionsLocked = locked || {}
    renderPermissionsMatrix(permissions, locked || {})
  } catch(e) {
    if (wrap) wrap.innerHTML = `<div class="alert alert-error">Failed to load permissions: ${e.message}</div>`
  }
}

function renderPermissionsMatrix(permissions, locked) {
  const wrap = document.getElementById('permissions-matrix-wrap')
  if (!wrap) return
  const isSuper = currentUser?.role === 'super_admin'

  const headerRow = `<tr style="background:var(--gray)">
    <th style="text-align:left;padding:9px 12px;font-size:11px;font-weight:600;color:var(--text2);min-width:200px;border-bottom:.5px solid var(--border)">Permission</th>
    ${ROLE_COLS.map(r=>`<th style="text-align:center;padding:9px 14px;font-size:11px;font-weight:600;color:${r.color};border-bottom:.5px solid var(--border);white-space:nowrap">${r.label}</th>`).join('')}
  </tr>`

  const rows = Object.entries(PERM_LABELS).map(([key, label]) => {
    const cells = ROLE_COLS.map(role => {
      const checked = permissions[key]?.[role.key] ?? false
      const isLocked = locked[key]?.[role.key] !== undefined
      const canEdit = isSuper && !isLocked

      if (canEdit) {
        return `<td style="text-align:center;padding:8px 14px;border-bottom:.5px solid var(--gray2)">
          <label style="display:inline-flex;align-items:center;justify-content:center;cursor:pointer;width:28px;height:28px">
            <input type="checkbox" 
              data-perm="${key}" 
              data-role="${role.key}"
              ${checked ? 'checked' : ''}
              onchange="togglePermission('${key}','${role.key}',this)"
              style="width:16px;height:16px;cursor:pointer;accent-color:var(--nv)">
          </label>
        </td>`
      } else if (isLocked) {
        // Locked — always on, show lock icon
        return `<td style="text-align:center;padding:8px 14px;border-bottom:.5px solid var(--gray2)" title="This permission is locked">
          <span style="font-size:14px;opacity:.5">${checked ? '🔒' : '⬜'}</span>
        </td>`
      } else {
        // Read-only view for non-super-admins
        return `<td style="text-align:center;padding:8px 14px;border-bottom:.5px solid var(--gray2)">
          <span style="font-size:16px">${checked ? '✅' : '<span style=\'opacity:.2;font-size:14px\'>⬜</span>'}</span>
        </td>`
      }
    }).join('')

    return `<tr style="transition:background .1s" onmouseover="this.style.background='#fafafa'" onmouseout="this.style.background=''">
      <td style="padding:9px 12px;font-size:12px;font-weight:500;color:var(--text);border-bottom:.5px solid var(--gray2)">${label}</td>
      ${cells}
    </tr>`
  }).join('')

  wrap.innerHTML = `
    ${isSuper ? `<div class="alert alert-info" style="margin-bottom:12px;font-size:11px">
      ✏️ Click any checkbox to instantly update that role's access. 🔒 = locked (cannot be changed). Changes apply immediately to all active sessions.
    </div>` : ''}
    <table style="width:100%;border-collapse:collapse;min-width:750px">
      <thead>${headerRow}</thead>
      <tbody>${rows}</tbody>
    </table>
    ${isSuper ? `<div style="margin-top:10px;font-size:10px;color:var(--text3)">
      Changes are saved instantly and logged to the audit trail. Locked permissions (🔒) protect core security rules.
    </div>` : ''}
  `
}

async function togglePermission(permKey, role, checkbox) {
  const value = checkbox.checked
  const status = document.getElementById('perm-save-status')
  checkbox.disabled = true
  if (status) { status.textContent = 'Saving...'; status.style.color = 'var(--text3)' }

  try {
    const { permissions } = await api('/api/permissions', 'PUT', { permission: permKey, role, value })
    window._permissions = permissions
    if (status) { status.textContent = '✓ Saved'; status.style.color = 'var(--green-t)' }
    setTimeout(() => { if (status) status.textContent = '' }, 2000)
    showToast(`${PERM_LABELS[permKey] || permKey} → ${role.replace(/_/g,' ')}: ${value ? 'Enabled' : 'Disabled'}`, value ? 'success' : 'warn')
  } catch(e) {
    checkbox.checked = !value  // revert
    if (status) { status.textContent = '✗ Failed'; status.style.color = 'var(--red-t)' }
    setTimeout(() => { if (status) status.textContent = '' }, 3000)
    showToast('Permission update failed: ' + e.message, 'error')
  } finally {
    checkbox.disabled = false
  }
}

function renderAuditRow(a){
  // Handle both real DB format and demo format
  const action=a.action||a.type||'ACTION'
  const detail=a.details||a.detail||''
  const time=a.created_at?new Date(a.created_at).toLocaleString():a.time||''
  const user=a.user?.email||a.user?.full_name||''
  const icons={CREATE:'🟢',UPDATE:'🟡',DELETE:'🔴',LOGIN:'🔵',LOGOUT:'🔵',EXPORT:'⬜',NOTE:'📝',TASK:'✅',USER_LOGIN:'🔵',USER_LOGOUT:'🔵',CREATE_WIB:'🟢',UPDATE_WIB:'🟡',DELETE_WIB:'🔴',CREATE_COMPANY:'🟢',CREATE_APPLICATION:'🟢',UPDATE_APPLICATION:'🟡',CREATE_USER:'🟢',UPDATE_USER:'🟡',DELETE_USER:'🔴'}
  const bgMap={CREATE:'var(--green-bg)',UPDATE:'var(--amber-bg)',DELETE:'var(--red-bg)',LOGIN:'var(--blue-bg)',USER_LOGIN:'var(--blue-bg)',EXPORT:'var(--gray2)',NOTE:'var(--purple-bg)',TASK:'var(--teal-bg)'}
  const icon=icons[action]||'⚪'
  const bg=bgMap[action]||bgMap[action?.split('_')[0]]||'var(--gray2)'
  return`<div class="audit-row">
    <div class="audit-icon" style="background:${bg}">${icon}</div>
    <div class="audit-body">
      <div class="audit-action">${action.replace(/_/g,' ')}</div>
      <div class="audit-detail">${detail}${user?` · <span style="color:var(--text3)">${user}</span>`:''}</div>
    </div>
    <div class="audit-time">${time}</div>
  </div>`
}

function importCSV(type){
  closeIEMenu()
  const typeNotes={
    applications:'<div class="alert alert-warn" style="margin-top:8px">⚠️ Applications import requires Companies to already exist in the system. Rows where the company isn\'t found will be skipped.</div>',
    wibs:'<div class="alert alert-warn" style="margin-top:8px">📋 Required columns: <strong>WIB Name</strong>. Source URL will use WIB Name as fallback if missing.</div>',
    companies:'<div class="alert alert-info" style="margin-top:8px">📋 Accepts any column format — the system auto-detects company name, status, email, phone, and more.</div>',
    locations:'<div class="alert alert-warn" style="margin-top:8px">📋 Required columns: <strong>Location Name</strong>.</div>',
    funding:'<div class="alert alert-warn" style="margin-top:8px">📋 Required columns: <strong>Opportunity Name</strong>.</div>',
  }
  showModal(`📥 Import ${type.charAt(0).toUpperCase()+type.slice(1)}`,`
    <div class="alert alert-info">
      No row limit — import files of any size. Large files are automatically sent in batches.
      Download the template to see the required column format.
    </div>
    ${typeNotes[type]||''}
    <div style="margin:10px 0">
      <button class="btn btn-sm" onclick="downloadTemplate('${type}')">⬇️ Download CSV Template</button>
    </div>
    <div class="form-row form-full"><div class="form-group"><div class="form-label">Upload CSV or Excel File (.csv, .xlsx, .xls)</div>
      <input type="file" accept=".csv,.xlsx,.xls" id="import-file-input" onchange="processCSVImport(this,'${type}')"></div></div>
    <div id="import-preview" style="margin-top:10px"></div>
    <div style="margin-top:8px"><button class="btn btn-sm btn-ghost" onclick="runImportDiagnostic('${type}')">🔍 Test DB Connection</button></div>`,
  async()=>{
    if(!window._importRows||!window._importRows.length){
      showToast('Please select and preview a CSV file first','warn');return false
    }
    const btn=document.getElementById('modal-ok-btn')
    const preview=document.getElementById('import-preview')
    if(btn){btn.textContent='Importing...';btn.disabled=true}

    const allRows=window._importRows
    const type=window._importType
    // Chunk size: larger for simple types, smaller for complex ones
    const importChunks={'locations':200,'wibs':100,'companies':100,'applications':20}
    const CHUNK=importChunks[type]||50
    const totalBatches=Math.ceil(allRows.length/CHUNK)
    let totalCreated=0, totalErrors=[]

    // Wake up server first (Render free tier may be sleeping)
    if(preview)preview.innerHTML='<div style="padding:10px;color:var(--text3);font-size:12px">⏳ Connecting to server...</div>'
    try{
      await api('/api/health')
    }catch(e){
      // Server might be starting up — wait and retry once
      if(preview)preview.innerHTML='<div style="padding:10px;color:var(--amber-t);font-size:12px">⏳ Server is starting up, please wait 30 seconds...</div>'
      await new Promise(res=>setTimeout(res,30000))
      try{ await api('/api/health') }catch(e2){
        if(preview)preview.innerHTML=`<div class="alert alert-error">Cannot connect to server: ${e2.message}</div>`
        if(btn){btn.textContent='Retry';btn.disabled=false}
        return false
      }
    }

    // Show progress bar
    if(preview){
      preview.innerHTML=`
        <div style="margin-top:10px">
          <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px">
            <span id="import-prog-label">Starting import...</span>
            <span id="import-prog-pct">0%</span>
          </div>
          <div style="height:8px;background:var(--gray2);border-radius:4px;overflow:hidden">
            <div id="import-prog-bar" style="height:100%;width:0%;background:var(--nv);border-radius:4px;transition:width .3s"></div>
          </div>
          <div id="import-prog-detail" style="font-size:10px;color:var(--text3);margin-top:4px"></div>
        </div>`
    }

    try{
      for(let b=0;b<totalBatches;b++){
        const chunk=allRows.slice(b*CHUNK,(b+1)*CHUNK)
        const pct=Math.round(((b)/totalBatches)*100)

        // Update progress
        const label=document.getElementById('import-prog-label')
        const pctEl=document.getElementById('import-prog-pct')
        const bar=document.getElementById('import-prog-bar')
        const detail=document.getElementById('import-prog-detail')
        if(label)label.textContent=totalBatches>1?`Importing batch ${b+1} of ${totalBatches}...`:'Importing records...'
        if(pctEl)pctEl.textContent=pct+'%'
        if(bar)bar.style.width=pct+'%'
        if(detail)detail.textContent=`${totalCreated} imported so far${totalErrors.length?' · '+totalErrors.length+' skipped':''}`
        if(btn)btn.textContent=totalBatches>1?`Batch ${b+1}/${totalBatches}...`:'Importing...'

        // Retry up to 3 times on failure (handles transient network errors)
        let r, lastErr
        for(let attempt=0;attempt<3;attempt++){
          try{
            r=await api('/api/import/'+type,'POST',{rows:chunk,batch:b+1,totalBatches})
            break
          }catch(err){
            lastErr=err
            if(attempt<2){
              if(detail)detail.textContent=`Retrying batch ${b+1} (attempt ${attempt+2}/3)...`
              await new Promise(res=>setTimeout(res,1000*(attempt+1)))
            }
          }
        }
        if(!r)throw lastErr
        totalCreated+=r.created||0
        if(r.errors?.length)totalErrors.push(...r.errors)
        // Show column names and first error on batch 1
        if(b===0){
          const colInfo=document.getElementById('import-prog-detail')
          if(r.first_row_keys?.length&&colInfo)
            colInfo.textContent='Columns: '+r.first_row_keys.slice(0,6).join(', ')
          if(r.errors?.length>0&&preview){
            // Show first error live so user doesn't have to wait
            const errDiv=document.getElementById('import-live-error')||document.createElement('div')
            errDiv.id='import-live-error'
            errDiv.style.cssText='margin-top:6px;padding:8px;background:#fff0f0;border:.5px solid #fca5a5;border-radius:6px;font-size:11px;color:#991b1b'
            errDiv.innerHTML='⚠️ First error: '+r.errors[0]
            if(!document.getElementById('import-live-error'))preview.appendChild(errDiv)
          }
        }
      }

      // Final progress update
      const bar=document.getElementById('import-prog-bar')
      const label=document.getElementById('import-prog-label')
      const pctEl=document.getElementById('import-prog-pct')
      if(bar)bar.style.width='100%'
      if(label)label.textContent='Import complete!'
      if(pctEl)pctEl.textContent='100%'

      const msg=`✅ Imported ${totalCreated.toLocaleString()} records${totalErrors.length?' ('+totalErrors.length+' skipped)':''}`
      showToast(msg,totalErrors.length?'warn':'success')
      window._importRows=null

      // Show error summary if any
      if(totalErrors.length&&preview){
        const detail=document.getElementById('import-prog-detail')
        if(detail)detail.innerHTML=`<span style="color:var(--amber-t)">${totalErrors.length} rows skipped — ${totalErrors.slice(0,3).join('; ')}${totalErrors.length>3?' ...':''}</span>`
      }

      // If errors, stay open and show them — don't auto-close
      if(totalErrors.length>0 && totalCreated===0){
        // Nothing imported — show error details prominently
        if(preview){
          const sample=totalErrors.slice(0,5).join('<br>')
          preview.innerHTML=`
            <div class="alert alert-error" style="margin-top:8px">
              <strong>⚠️ Import failed — 0 records created, ${totalErrors.length} rows had errors</strong><br><br>
              <strong>First errors:</strong><br>${sample}${totalErrors.length>5?'<br>...and '+(totalErrors.length-5)+' more':''}<br><br>
              <strong>Common fixes:</strong><br>
              • Check that your column names match the template<br>
              • Make sure required fields (Company Name) are not empty<br>
              • Check for duplicate company names already in the system
            </div>`
        }
        if(btn){btn.textContent='Save';btn.disabled=false}
      } else {
        // Partial or full success — close and reload
        setTimeout(()=>{
          closeModal()
          if(currentPage===type||currentPage===type.replace('-',''))loadPage(currentPage)
        },totalErrors.length>0?3000:1500)
      }

    }catch(e){
      const errMsg=e.message||'Unknown error'
      // Show error clearly inside the modal (toast disappears too fast)
      const bar=document.getElementById('import-prog-bar')
      const label=document.getElementById('import-prog-label')
      const detail=document.getElementById('import-prog-detail')
      if(bar){bar.style.background='var(--red)';bar.style.width='100%'}
      if(label)label.textContent='Import failed'
      if(detail)detail.innerHTML=`<span style="color:var(--red-t);font-size:11px">⚠️ ${errMsg}</span>`
      showToast('Import failed: '+errMsg,'error')
      if(btn){btn.textContent='Retry';btn.disabled=false}
      return false
    }
  })
}

async function exportExcel(type){
  closeIEMenu()
  showToast('Preparing Excel export...','info')
  try{
    // Load SheetJS if not already loaded
    if(!window.XLSX){
      await new Promise((res,rej)=>{
        const s=document.createElement('script')
        s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js'
        s.onload=res;s.onerror=()=>rej(new Error('Failed to load Excel library'))
        document.head.appendChild(s)
      })
    }
    // Fetch CSV data from server
    const r=await fetch(`/api/export/${type}`,{headers:{'Authorization':`Bearer ${token}`}})
    if(!r.ok){const d=await r.json().catch(()=>({}));throw new Error(d.error||'Export failed')}
    const csvText=await r.text()
    // Parse CSV into array of arrays
    const lines=csvText.split(/\r?\n/).filter(l=>l.trim())
    const rows=lines.map(l=>{
      const vals=[];let cur='',inQ=false
      for(let i=0;i<l.length;i++){
        const c=l[i]
        if(c==='"'){if(inQ&&l[i+1]==='"'){cur+='"';i++}else inQ=!inQ}
        else if(c===','&&!inQ){vals.push(cur);cur=''}
        else cur+=c
      }
      vals.push(cur)
      return vals
    })
    // Build workbook
    const ws=XLSX.utils.aoa_to_sheet(rows)
    // Auto-width columns
    const colWidths=rows[0]?.map((_,ci)=>({wch:Math.min(40,Math.max(10,...rows.map(r=>String(r[ci]||'').length)))}))
    if(colWidths)ws['!cols']=colWidths
    // Bold header row
    const range=XLSX.utils.decode_range(ws['!ref']||'A1')
    for(let c=range.s.c;c<=range.e.c;c++){
      const cell=XLSX.utils.encode_cell({r:0,c})
      if(ws[cell])ws[cell].s={font:{bold:true},fill:{fgColor:{rgb:'0B1E3C'}}}
    }
    const wb=XLSX.utils.book_new()
    XLSX.utils.book_append_sheet(wb,ws,type.charAt(0).toUpperCase()+type.slice(1))
    const filename=`valor-${type}-${new Date().toISOString().split('T')[0]}.xlsx`
    XLSX.writeFile(wb,filename)
    showToast(`✅ Exported as ${filename}`,'success')
  }catch(e){showToast(`Export failed: ${e.message}`,'error')}
}

async function processCSVImport(input,type){
  const file=input.files[0]
  if(!file)return
  const preview=document.getElementById('import-preview')
  preview.innerHTML='<div style="padding:10px;color:var(--text3);font-size:12px">📂 Reading file...</div>'

  const isExcel=file.name.match(/\.xlsx?$/i)

  if(isExcel){
    // Excel: use SheetJS loaded from CDN
    preview.innerHTML='<div style="padding:10px;color:var(--text3);font-size:12px">📊 Loading Excel reader...</div>'
    try{
      // Dynamically load SheetJS if not already loaded
      if(!window.XLSX){
        await new Promise((res,rej)=>{
          const s=document.createElement('script')
          s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js'
          s.onload=res; s.onerror=rej
          document.head.appendChild(s)
        })
      }
      const buf=await file.arrayBuffer()
      const wb=XLSX.read(buf,{type:'array'})
      const ws=wb.Sheets[wb.SheetNames[0]]
      const dataRows=XLSX.utils.sheet_to_json(ws,{defval:''})
      if(!dataRows.length){preview.innerHTML='<div class="alert alert-error">No data found in Excel file</div>';return}
      renderImportPreview(dataRows,type,preview,file.name)
    }catch(err){
      preview.innerHTML=`<div class="alert alert-error">Failed to read Excel file: ${err.message}</div>`
    }
    return
  }

  // CSV: built-in parser
  const reader=new FileReader()
  reader.onload=async e=>{
    try{
      const text=e.target.result
      const lines=text.split(/\r?\n/).filter(l=>l.trim())
      if(lines.length<2){preview.innerHTML='<div class="alert alert-error">File is empty or has no data rows</div>';return}
      const headers=parseCSVLine(lines[0])
      const dataRows=lines.slice(1)
        .map(l=>{
          const vals=parseCSVLine(l)
          return Object.fromEntries(headers.map((h,i)=>[h,vals[i]||'']))
        })
        .filter(r=>Object.values(r).some(v=>String(v).trim()))
      renderImportPreview(dataRows,type,preview,file.name)
    }catch(err){
      preview.innerHTML=`<div class="alert alert-error">Failed to parse file: ${err.message}</div>`
    }
  }
  reader.readAsText(file)
}

function parseCSVLine(line){
  // RFC 4180 compliant CSV parser
  const vals=[]
  let cur='',inQ=false,i=0
  while(i<line.length){
    const c=line[i]
    if(c==='"'){
      if(inQ&&line[i+1]==='"'){cur+='"';i+=2}  // escaped quote
      else{inQ=!inQ;i++}
    }else if(c===','&&!inQ){
      vals.push(cur.trim());cur='';i++
    }else{cur+=c;i++}
  }
  vals.push(cur.trim())
  return vals
}

function renderImportPreview(dataRows,type,preview,filename){
  if(!dataRows.length){preview.innerHTML='<div class="alert alert-error">No data rows found</div>';return}
  const headers=Object.keys(dataRows[0])
  const previewRows=dataRows.slice(0,5)
  const CHUNK=50
  const batches=Math.ceil(dataRows.length/CHUNK)
  const batchNote=batches>1?` <span style="color:var(--text3)">(will send in ${batches} batches of up to ${CHUNK} rows each)</span>`:''
  preview.innerHTML=`
    <div class="alert alert-success" style="margin-bottom:8px">
      ✅ <strong>${dataRows.length.toLocaleString()} rows</strong> ready to import from <em>${filename}</em>${batchNote}
    </div>
    <div style="font-size:11px;font-weight:500;color:var(--text2);margin-bottom:5px">Preview — first ${previewRows.length} rows:</div>
    <div style="overflow-x:auto;margin-bottom:10px;max-height:180px;overflow-y:auto">
      <table style="font-size:10px;width:100%;border-collapse:collapse">
        <thead style="position:sticky;top:0"><tr>${headers.map(h=>`<th style="padding:4px 8px;border:.5px solid var(--border);background:var(--gray);text-align:left;white-space:nowrap;font-weight:600">${h}</th>`).join('')}</tr></thead>
        <tbody>${previewRows.map(r=>`<tr>${headers.map(h=>`<td style="padding:3px 8px;border:.5px solid var(--border);white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis">${r[h]||''}</td>`).join('')}</tr>`).join('')}</tbody>
      </table>
    </div>
    <div style="font-size:11px;color:var(--text2)">
      Click <strong>Save</strong> to import all <strong>${dataRows.length.toLocaleString()}</strong> rows into ${type}.
      ${dataRows.length>CHUNK?`Large file will import automatically in ${batches} batches with a progress bar.`:''}
    </div>`
  window._importRows=dataRows
  window._importType=type
}

function formatTimeAgo(date){
  const diff=Date.now()-date.getTime()
  const mins=Math.floor(diff/60000),hrs=Math.floor(diff/3600000),days=Math.floor(diff/86400000)
  if(mins<1)return'just now'
  if(mins<60)return mins+'m ago'
  if(hrs<24)return hrs+'h ago'
  return days+'d ago'
}

window._coFilters={search:'',status:''}
function filterCompanies(q){window._coFilters.search=q;applyCoFilters()}
function filterCompaniesByStatus(s){window._coFilters.status=s;applyCoFilters()}
function applyCoFilters(){
  let d=[...(window._companies||[])]
  if(window._coFilters.search)d=d.filter(c=>c.company_name.toLowerCase().includes(window._coFilters.search.toLowerCase()))
  if(window._coFilters.status)d=d.filter(c=>c.status===window._coFilters.status)
  document.getElementById('companies-table').innerHTML=renderCompaniesTable(d)
}

async function loadInvoices(){
  try{
    const r=await api('/api/invoices')
    window._invoices=r.data||[]
    renderInvoicesTable(window._invoices)
    updateInvoiceMetrics(window._invoices)
  }catch(e){
    document.getElementById('inv-tbody').innerHTML=`<tr><td colspan="7" style="padding:20px;text-align:center"><div class="alert alert-error">Failed to load: ${e.message}</div></td></tr>`
  }
}

function updateInvoiceMetrics(invoices){
  const fmt=n=>'$'+(Number(n)||0).toLocaleString()
  const now=new Date()
  const outstanding=invoices.filter(i=>!['paid'].includes(i.metadata?.status)).reduce((s,i)=>s+(+i.metadata?.amount||0),0)
  const paid=invoices.filter(i=>i.metadata?.status==='paid').reduce((s,i)=>s+(+i.metadata?.amount||0),0)
  const overdue=invoices.filter(i=>i.metadata?.status!=='paid'&&i.metadata?.due_date&&new Date(i.metadata.due_date)<now).reduce((s,i)=>s+(+i.metadata?.amount||0),0)
  const total=invoices.reduce((s,i)=>s+(+i.metadata?.amount||0),0)
  const m={'outstanding':fmt(outstanding),'paid-ytd':fmt(paid),'overdue':fmt(overdue),'total-invoiced':fmt(total)}
  Object.entries(m).forEach(([k,v])=>{const el=document.getElementById('inv-'+k);if(el)el.textContent=v})
}

function renderInvoicesTable(invoices){
  const tbody=document.getElementById('inv-tbody')
  const footer=document.getElementById('inv-footer')
  if(!tbody)return
  if(!invoices.length){
    tbody.innerHTML='<tr><td colspan="7" style="padding:30px;text-align:center;color:var(--text3)"><div style="font-size:24px;margin-bottom:8px">🧾</div>No invoices yet. Create one above.</td></tr>'
    if(footer)footer.textContent='0 invoices'
    return
  }
  const statusClass={draft:'p-gray',sent:'p-blue',paid:'p-green',overdue:'p-red',cancelled:'p-red'}
  tbody.innerHTML=invoices.map(inv=>{
    const m=inv.metadata||{}
    const dueStr=m.due_date?new Date(m.due_date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'—'
    const now=new Date()
    const isOverdue=m.status!=='paid'&&m.due_date&&new Date(m.due_date)<now
    return`<tr>
      <td style="font-weight:500;font-family:monospace;font-size:11px">${m.invoice_number||inv.details}</td>
      <td>${m.company_name||'—'}</td>
      <td style="font-weight:600">$${Number(m.amount||0).toLocaleString()}</td>
      <td style="font-size:11px;color:var(--text2)">${m.fee_model||'—'}</td>
      <td><span class="pill ${statusClass[isOverdue?'overdue':m.status]||'p-gray'}">${isOverdue?'Overdue':m.status||'draft'}</span></td>
      <td style="font-size:11px;color:${isOverdue?'var(--red)':'var(--text2)'}">${dueStr}</td>
      <td><div class="action-btns">
        <button class="action-btn" onclick="updateInvoiceStatus('${inv.id}','${m.status||'draft'}')">Update Status</button>
        <button class="action-btn" onclick="openEditInvoiceModal(${JSON.stringify(inv).replace(/"/g,"'")})">Edit</button>
      </div></td>
    </tr>`
  }).join('')
  if(footer)footer.textContent=`${invoices.length} invoices`
}

function filterInvoices(status){
  if(!window._invoices)return
  const now=new Date()
  let d=window._invoices
  if(status==='overdue')d=d.filter(i=>i.metadata?.status!=='paid'&&i.metadata?.due_date&&new Date(i.metadata.due_date)<now)
  else if(status)d=d.filter(i=>i.metadata?.status===status)
  renderInvoicesTable(d)
}

function renderPaymentsTable(records){
  const tbody=document.getElementById('pay-tbody')
  const footer=document.getElementById('pay-footer')
  if(!tbody)return
  if(!records.length){
    tbody.innerHTML='<tr><td colspan="9" style="padding:30px;text-align:center;color:var(--text3)"><div style="font-size:24px;margin-bottom:8px">💳</div>No payment records yet. They appear when applications are awarded.</td></tr>'
    if(footer)footer.textContent='0 records'
    return
  }
  const statusClass={pending:'p-amber',invoiced:'p-blue',paid:'p-green',overdue:'p-red'}
  tbody.innerHTML=records.map(r=>{
    return`<tr>
      <td style="font-size:11px;font-family:monospace">${r.application?.application_number||'—'}</td>
      <td style="font-weight:500">${r.company?.company_name||'—'}</td>
      <td style="font-size:11px;color:var(--text2)">${r.wib?.wib_name||'—'}</td>
      <td style="font-size:11px;color:var(--text2)">${r.fee_model||'—'}</td>
      <td style="font-weight:500">$${Number(r.grant_award_amount||0).toLocaleString()}</td>
      <td style="color:var(--green-t);font-weight:600">$${Number(r.calculated_success_fee||0).toLocaleString()}</td>
      <td><span class="pill ${statusClass[r.invoice_status]||'p-gray'}" style="cursor:pointer" onclick="cyclePaymentStatus('${r.id}','${r.invoice_status||'pending'}')">${r.invoice_status||'pending'}</span></td>
      <td style="font-size:11px;color:var(--text2)">${r.payment_received_date?new Date(r.payment_received_date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'—'}</td>
      <td><button class="action-btn" onclick="markPaymentReceived('${r.id}')">Mark Paid</button></td>
    </tr>`
  }).join('')
  const total=records.reduce((s,r)=>s+(+r.calculated_success_fee||0),0)
  const paid=records.filter(r=>r.invoice_status==='paid').reduce((s,r)=>s+(+r.calculated_success_fee||0),0)
  if(footer)footer.textContent=`${records.length} records · Total fees: $${total.toLocaleString()} · Collected: $${paid.toLocaleString()}`
}

function filterPayments(status){
  if(!window._payments)return
  const d=status?window._payments.filter(r=>r.invoice_status===status):window._payments
  renderPaymentsTable(d)
}

async function cyclePaymentStatus(id,current){
  const statuses=['pending','invoiced','paid']
  const next=statuses[(statuses.indexOf(current)+1)%statuses.length]
  try{
    await api('/api/revenue/'+id,'PUT',{invoice_status:next,payment_received_date:next==='paid'?new Date().toISOString().split('T')[0]:null})
    showToast(`Payment status → ${next}`,'success')
    loadPayments()
  }catch(e){showToast(e.message,'error')}
}

async function markPaymentReceived(id){
  try{
    await api('/api/revenue/'+id,'PUT',{invoice_status:'paid',payment_received_date:new Date().toISOString().split('T')[0]})
    showToast('Payment marked as received','success')
    loadPayments()
  }catch(e){showToast(e.message,'error')}
}

function showModal(title,body,onConfirm,showFooter=true){
  const overlay=document.createElement('div')
  overlay.className='modal-overlay'
  overlay.id='active-modal'
  overlay.innerHTML=`<div class="modal${title.includes('xl')?' modal-xl':title.length>50?' modal-lg':''}">
    <div class="modal-hd">
      <div class="modal-title">${title}</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">${body}</div>
    ${showFooter?`<div class="modal-foot">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="modal-ok-btn">Save</button>
    </div>`:''}
  </div>`
  overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal()})
  document.getElementById('modal-container').appendChild(overlay)
  if(onConfirm&&showFooter){
    document.getElementById('modal-ok-btn').addEventListener('click',async()=>{
      const btn=document.getElementById('modal-ok-btn')
      if(btn){btn.disabled=true;btn.textContent='Saving...'}
      const result=await onConfirm()
      if(result!==false)closeModal()
      else if(btn){btn.disabled=false;btn.textContent='Save'}
    })
  }
}

function closeModal(){
  const m=document.getElementById('active-modal')
  if(m)m.remove()
}

// ─── LOAD WIB NOTES FROM DB (notes + aircall combined, chronological) ───────
async function loadWibNotes(wibId) {
  const list = document.getElementById('notes-list')
  if (!list) return
  try {
    const r = await api(`/api/notes?record_type=wib_records&record_id=${wibId}&limit=100`)
    const notes = r.data || []
    if (notes.length === 0) {
      list.innerHTML = `<div style="padding:30px;text-align:center;color:var(--text3);font-size:12px">
        <div style="font-size:24px;margin-bottom:8px">📝</div>
        No notes yet — add the first note or log an Aircall call above.
      </div>`
      return
    }
    list.innerHTML = notes.map(n => renderDbNoteCard(n)).join('')
  } catch(e) {
    list.innerHTML = `<div class="alert alert-error">Failed to load notes: ${e.message}</div>`
  }
}

function getNoteContent(n){
  if(n.metadata&&typeof n.metadata==='object')return{content:n.metadata.content||n.details,isAircall:n.metadata.is_aircall||n.metadata.note_type==='Aircall',noteType:n.metadata.note_type||'Note'}
  try{const p=JSON.parse(n.details||'{}');if(p.content)return{content:p.content,isAircall:p.is_aircall,noteType:p.note_type||'Note'}}catch(e){}
  return{content:n.details||'',isAircall:false,noteType:'Note'}
}

function renderDbNoteCard(n) {
  const {content, isAircall, noteType} = getNoteContent(n)
  const author = n.user?.full_name || n.user?.email || 'Unknown'
  const ts = new Date(n.created_at)
  const dateStr = ts.toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'})
  const timeStr = ts.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit', timeZoneName:'short'})

  if (isAircall) {
    const lines = (content || '').split('\n')
    // Parse structured content if present
    let headerLine = lines[0] || `AIRCALL NOTE — ${dateStr} — ${timeStr}`
    let bodyLines = lines.slice(1).join('\n')
    return `<div class="aircall-note" style="margin-bottom:10px">
      <div class="aircall-header">${headerLine}</div>
      <div class="aircall-body" style="white-space:pre-wrap">${bodyLines || n.details}</div>
      <div style="margin-top:8px;font-size:10px;color:var(--text3)">Logged by: ${author} · ${dateStr} at ${timeStr}</div>
    </div>`
  }

  // Regular note card
  const initials = author.slice(0,2).toUpperCase()
  const typeColors = {Note:'p-blue','AI Summary':'p-purple','Follow Up':'p-amber','Status Update':'p-teal','Outreach Activity':'p-green','Aircall':'p-green'}
  return `<div class="note-card">
    <div class="note-meta">
      <div class="note-av" style="background:var(--blue-bg);color:var(--blue-t)">${initials}</div>
      <div class="note-author">${author}</div>
      <div class="note-time">${dateStr} at ${timeStr}</div>
      <span class="pill ${typeColors[noteType]||'p-gray'} note-type">${noteType}</span>
    </div>
    <div class="note-content">${content || ''}</div>
  </div>`
}

async function addNote(){
  const textarea=document.getElementById('new-note-text')
  const text=textarea?.value
  if(!text?.trim()){showToast('Please enter a note before saving','warn');return}
  const btn=document.querySelector('.note-compose-foot .btn-primary')||document.querySelector('[onclick="addNote()"]')
  if(btn){btn.disabled=true;btn.textContent='Saving...'}
  try{
    const noteType=document.getElementById('note-type-select')?.value||'Note'
    const payload={content:text.trim(),note_type:noteType,is_aircall:false}
    if(currentWib){payload.record_type='wib_records';payload.record_id=currentWib.id}
    const saved=await api('/api/notes','POST',payload)
    textarea.value=''
    showToast('Note saved','success')
    // Reload full notes list from DB to show all notes in order
    if(currentWib) await loadWibNotes(currentWib.id)
  }catch(e){
    showToast('Failed to save note: '+e.message,'error')
  }finally{
    if(btn){btn.disabled=false;btn.textContent='💾 Save Note'}
  }
}

    const dateStr=now.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})
    const timeStr=now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZoneName:'short'})
    const dir=document.getElementById('ac-dir').value
    const dur=document.getElementById('ac-dur').value||'Duration not recorded'
    const contact=document.getElementById('ac-contact').value||'Unknown contact'
    const summary=document.getElementById('ac-summary').value||'No summary provided'
    const tasks=document.getElementById('ac-tasks').value||'No follow-up tasks logged'
    const addlNotes=document.getElementById('ac-notes').value
    const header=`AIRCALL NOTE — ${dateStr} — ${timeStr} — ${dir} Call — Duration: ${dur}`
    const fullContent=`${header}\nContact: ${contact}\n\nSummary:\n${summary}\n\nFollow-up Tasks:\n${tasks}${addlNotes?'\n\nAdditional Notes:\n'+addlNotes:''}\n\nLogged by: ${currentUser?.full_name||currentUser?.email}`
    const noteHtml=`<div class="aircall-note">
      <div class="aircall-header">${header}</div>
      <div class="aircall-body">

        <div class="aircall-section"><div class="aircall-section-title">📊 Summary</div>${summary}</div>
        <div class="aircall-section"><div class="aircall-section-title">✅ Follow-Up Tasks</div>${tasks}</div>
        ${addlNotes?`<div class="aircall-section"><div class="aircall-section-title">📝 Additional Notes</div>${addlNotes}</div>`:''}
        <div style="margin-top:8px;font-size:10px;color:var(--text3)">Logged by: ${currentUser?.full_name||currentUser?.email} · Valor Workforce Funding CRM</div>
      </div>
    </div>`
    // Save to database
    try{
      const payload={content:fullContent,note_type:'Aircall',is_aircall:true}
      if(currentWib){payload.record_type='wib_records';payload.record_id=currentWib.id}
      await api('/api/notes','POST',payload)
      showToast('Aircall note saved','success')
      // Reload notes list from DB so Aircall note appears combined with other notes
      if(currentWib) await loadWibNotes(currentWib.id)
    }catch(e){
      showToast('Save failed: '+e.message,'error')
    }
  })
}

function chatSearch(){

    inp.addEventListener('input',()=>{

      msgs.forEach(m=>{if(m.textContent.toLowerCase().includes(q))results.push(m.textContent)})

  },100)

    <div id="rpw-err"></div>

      <div class="form-label">Confirm Password</div>
      <input id="rpw-confirm" type="password" placeholder="Repeat password...">

  async()=>{
    const newPw = document.getElementById('rpw-new')?.value
    const confirm = document.getElementById('rpw-confirm')?.value
    const err = document.getElementById('rpw-err')
    if(!newPw || newPw.length < 8){err.innerHTML='<div class="alert alert-error">Password must be at least 8 characters</div>';return false}

      if(e.message&&e.message.includes('details')){
        err.innerHTML='<div class="alert alert-warn">⚠️ Database schema needs refresh. Refreshing...</div>'

function draftApplication(){showModal('📋 AI Application Assistant',`<div class="form-row form-full"><div class="form-group"><div class="form-label">Provide employer and WIB context</div><textarea id="da-context" rows="4" placeholder="Employer: Heritage Senior Living, 45 employees, CNA training\nWIB: TX Workforce Commission, $40K max award..."></textarea></div></div><div id="da-result"></div>`,async()=>{const c=document.getElementById('da-context').value;document.getElementById('da-result').innerHTML='<div class="loading">⏳ Drafting...</div>';const r=await apiAI(`Help draft key sections of an IWT grant application narrative based on this context: ${c}. Include: employer need statement, training plan description, expected outcomes.`);document.getElementById('da-result').innerHTML=`<div class="alert alert-info" style="white-space:pre-wrap;margin-top:10px">${r}</div>`;return false})}
function checkCompliance(){showModal('🛡️ Compliance Check',`<div class="form-row form-full"><div class="form-group"><div class="form-label">Describe the active grant situation</div><textarea id="cc-context" rows="4" placeholder="Grant award: $45,000\nTraining completion date: April 30\nDocuments collected: attendance, payroll\nMissing: final report..."></textarea></div></div><div id="cc-result"></div>`,async()=>{const c=document.getElementById('cc-context').value;document.getElementById('cc-result').innerHTML='<div class="loading">⏳ Checking...</div>';const r=await apiAI(`Review this grant compliance situation and identify any risks, missing items, or urgent actions needed: ${c}`);document.getElementById('cc-result').innerHTML=`<div class="alert alert-info" style="white-space:pre-wrap;margin-top:10px">${r}</div>`;return false})}
function recommendNext(){showModal('🎯 Recommend Next Steps',`<div class="form-row form-full"><div class="form-group"><div class="form-label">Current situation</div><textarea id="rn-context" rows="4" placeholder="WIB or employer name, current status, last interaction, blockers..."></textarea></div></div><div id="rn-result"></div>`,async()=>{const c=document.getElementById('rn-context').value;document.getElementById('rn-result').innerHTML='<div class="loading">⏳ Analyzing...</div>';const r=await apiAI(`As a workforce grant consultant, recommend specific next actions to advance this relationship: ${c}`);document.getElementById('rn-result').innerHTML=`<div class="alert alert-info" style="white-space:pre-wrap;margin-top:10px">${r}</div>`;return false})}
function generateMeetingNotes(){showModal('📝 Meeting Notes Generator',`<div class="form-row form-full"><div class="form-group"><div class="form-label">Paste bullet points or rough notes</div><textarea id="mn-notes" rows="5" placeholder="• Met with WIB director\n• Discussed Q3 cycle\n• They want 10 employer referrals\n• Decision by June 1..."></textarea></div></div><div id="mn-result"></div>`,async()=>{const n=document.getElementById('mn-notes').value;document.getElementById('mn-result').innerHTML='<div class="loading">⏳ Generating...</div>';const r=await apiAI(`Convert these rough notes into professional meeting notes for a workforce grant consultant CRM: ${n}. Format with: Date, Attendees, Key Discussion Points, Decisions Made, Action Items.`);document.getElementById('mn-result').innerHTML=`<div class="alert alert-info" style="white-space:pre-wrap;margin-top:10px">${r}</div>`;return false})}

// Boot
render()
</script>
</body>
</html>
