<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valor Workforce Funding — Component 1: Nav + Session + Notifications</title>
<style>
/* ═══════════════════════════════════════════════════
   CSS CUSTOM PROPERTIES — ORIGINAL VALOR PALETTE
═══════════════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Dark navy sidebar palette */
  --nv:#0B1E3C;
  --nv2:#152d54;
  --nv3:#1e3d6e;
  /* Gold accent */
  --gd:#C9A84C;
  --gd2:#E8C96A;
  --cream:#E8D9A8;
  /* Neutral surface */
  --white:#ffffff;
  --gray:#f8f7f6;
  --gray2:#f3f2f1;
  --gray3:#e8e6e3;
  /* Borders */
  --border:#e5e7eb;
  --border2:#d1d5db;
  /* Text */
  --text:#111827;
  --text2:#6b7280;
  --text3:#9ca3af;
  --text4:#c4c4c4;
  /* Status colors */
  --green:#16a34a;   --green-bg:#dcfce7;  --green-t:#166534;
  --amber:#d97706;   --amber-bg:#fef3c7;  --amber-t:#92400e;
  --red:#dc2626;     --red-bg:#fee2e2;    --red-t:#991b1b;
  --blue:#2563eb;    --blue-bg:#dbeafe;   --blue-t:#1e40af;
  --purple:#7c3aed;  --purple-bg:#ede9fe; --purple-t:#5b21b6;
  --teal:#0d9488;    --teal-bg:#ccfbf1;   --teal-t:#134e4a;
  --orange:#ea580c;  --orange-bg:#fff7ed; --orange-t:#9a3412;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--gray);
  color:var(--text);
  height:100vh;
  overflow:hidden;
  font-size:13px;
}

/* ═══════════════════════════════════════════════════
   APP SHELL — FLEXBOX LAYOUT
═══════════════════════════════════════════════════ */
.app{display:flex;height:100vh;overflow:hidden}

/* ═══════════════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════════════ */
.sidebar{
  width:208px;
  background:var(--nv);
  display:flex;
  flex-direction:column;
  flex-shrink:0;
  overflow:hidden;
  position:relative;
  z-index:10;
}

/* Logo area */
.sb-logo{
  padding:13px 14px 10px;
  border-bottom:1px solid rgba(255,255,255,.07);
  flex-shrink:0;
}
.sb-logo-row{display:flex;align-items:center;gap:8px}
.sb-logo-icon{
  width:28px;height:28px;border-radius:7px;
  background:rgba(201,168,76,.25);
  border:.5px solid rgba(201,168,76,.4);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;
}
.sb-logo-text{font-size:11.5px;font-weight:600;color:var(--cream);line-height:1.25}
.sb-logo-sub{font-size:8.5px;color:rgba(255,255,255,.28);margin-top:1px;letter-spacing:.6px;text-transform:uppercase}

/* Quick search bar */
.sb-search{
  padding:6px 10px;
  border-bottom:1px solid rgba(255,255,255,.07);
  flex-shrink:0;
}
.sb-search-inner{
  display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.07);
  border:.5px solid rgba(255,255,255,.1);
  border-radius:6px;padding:5px 8px;cursor:pointer;
}
.sb-search-inner:hover{background:rgba(255,255,255,.11)}
.sb-search-icon{color:rgba(255,255,255,.3);font-size:11px}
.sb-search-text{font-size:11px;color:rgba(255,255,255,.3);flex:1}
.sb-search-kbd{
  font-size:9px;color:rgba(255,255,255,.2);
  background:rgba(255,255,255,.07);
  padding:1px 4px;border-radius:3px;font-family:monospace;
}

/* Scrollable nav */
.sb-nav{flex:1;overflow-y:auto;padding:4px 0}
.sb-nav::-webkit-scrollbar{width:2px}
.sb-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}

/* Nav section header */
.sb-section{
  padding:8px 12px 2px;
  font-size:9px;color:rgba(255,255,255,.22);
  letter-spacing:1.1px;text-transform:uppercase;font-weight:600;
}

/* Nav item */
.sb-item{
  display:flex;align-items:center;gap:7px;
  padding:6px 12px;
  font-size:11.5px;
  color:rgba(255,255,255,.5);
  cursor:pointer;
  border-left:2px solid transparent;
  transition:all .1s;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  user-select:none;
}
.sb-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85)}
.sb-item.active{
  background:rgba(201,168,76,.14);
  color:var(--gd2);
  border-left-color:var(--gd);
}
.sb-item-icon{font-size:13px;width:15px;text-align:center;flex-shrink:0;opacity:.75}
.sb-item.active .sb-item-icon{opacity:1}
.sb-item-label{flex:1;overflow:hidden;text-overflow:ellipsis}

/* Notification badge on nav item */
.sb-badge{
  margin-left:auto;
  background:rgba(220,60,60,.9);
  color:#fff;font-size:8px;font-weight:600;
  padding:1px 5px;border-radius:8px;flex-shrink:0;
}
.sb-badge.green{background:#16a34a}
.sb-badge.amber{background:#d97706}

/* Sub-nav indented */
.sb-sub{padding-left:8px}

/* Horizontal divider */
.sb-divider{height:.5px;background:rgba(255,255,255,.06);margin:5px 0}

/* Automations expandable */
.sb-group{cursor:pointer}
.sb-group-header{
  display:flex;align-items:center;gap:7px;
  padding:6px 12px;font-size:11.5px;
  color:rgba(255,255,255,.5);
  transition:all .1s;
}
.sb-group-header:hover{color:rgba(255,255,255,.85)}
.sb-group-chevron{
  margin-left:auto;font-size:9px;
  transition:transform .15s;
}
.sb-group.open .sb-group-chevron{transform:rotate(90deg)}

/* Footer user area */
.sb-footer{
  padding:9px 12px;
  border-top:1px solid rgba(255,255,255,.07);
  flex-shrink:0;
}
.sb-user{display:flex;align-items:center;gap:8px}
.sb-avatar{
  width:26px;height:26px;border-radius:50%;
  background:rgba(201,168,76,.22);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;color:var(--gd);flex-shrink:0;
}
.sb-user-info{flex:1;min-width:0}
.sb-user-name{font-size:10.5px;font-weight:500;color:rgba(255,255,255,.75);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-user-role{font-size:8.5px;color:rgba(255,255,255,.3)}
.sb-user-actions{display:flex;gap:2px;margin-left:4px}
.sb-user-btn{
  background:none;border:none;color:rgba(255,255,255,.25);
  cursor:pointer;font-size:13px;padding:2px 3px;border-radius:4px;
  transition:all .1s;
}
.sb-user-btn:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.6)}

/* ═══════════════════════════════════════════════════
   MAIN CONTENT AREA
═══════════════════════════════════════════════════ */
.main{
  flex:1;display:flex;flex-direction:column;
  overflow:hidden;min-width:0;
}

/* ═══════════════════════════════════════════════════
   TOPBAR
═══════════════════════════════════════════════════ */
.topbar{
  height:44px;
  background:var(--white);
  border-bottom:.5px solid var(--border);
  padding:0 16px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;gap:10px;
}
.topbar-left{display:flex;align-items:center;gap:8px;min-width:0}
.page-title{
  font-size:13px;font-weight:600;color:var(--text);
  white-space:nowrap;display:flex;align-items:center;gap:6px;
}
.topbar-crumb{color:var(--text3);font-weight:400;cursor:pointer}
.topbar-crumb:hover{color:var(--text2)}
.topbar-crumb-sep{color:var(--text3);margin:0 2px;font-size:11px}
.topbar-badge{
  font-size:10.5px;padding:2px 8px;border-radius:20px;
  font-weight:500;background:var(--gray2);color:var(--text2);
  white-space:nowrap;
}
.topbar-right{display:flex;align-items:center;gap:5px;flex-shrink:0}
.topbar-icon{
  width:28px;height:28px;border-radius:6px;
  border:.5px solid var(--border);background:var(--white);
  color:var(--text2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;transition:all .1s;
  white-space:nowrap;padding:0 6px;gap:4px;
}
.topbar-icon:hover{background:var(--gray2);color:var(--text)}
.topbar-icon.has-label{width:auto;font-size:11px;font-weight:500}

/* ═══════════════════════════════════════════════════
   VIEWBAR (filter chips row below topbar)
═══════════════════════════════════════════════════ */
.viewbar{
  background:var(--white);
  border-bottom:.5px solid var(--border);
  padding:0 14px;
  display:flex;align-items:center;gap:0;
  overflow-x:auto;flex-shrink:0;
}
.viewbar::-webkit-scrollbar{height:2px}
.viewbar::-webkit-scrollbar-thumb{background:var(--border2)}
.vb-view{
  padding:7px 12px;font-size:11.5px;
  color:var(--text2);cursor:pointer;
  border-bottom:2px solid transparent;
  white-space:nowrap;transition:all .1s;
  display:flex;align-items:center;gap:5px;
}
.vb-view:hover{color:var(--text)}
.vb-view.active{color:var(--nv);border-bottom-color:var(--nv);font-weight:500}
.vc{
  font-size:10px;background:var(--gray2);color:var(--text3);
  padding:1px 5px;border-radius:10px;margin-left:3px;
}
.vb-view.active .vc{background:var(--blue-bg);color:var(--blue-t)}
.vb-sep{width:.5px;background:var(--border);margin:8px 10px;height:20px;flex-shrink:0}
.vb-chip{
  display:flex;align-items:center;gap:0;
  background:var(--orange-bg);border:.5px solid var(--orange);
  border-radius:20px;overflow:hidden;font-size:11px;
  height:24px;flex-shrink:0;
}
.vb-chip-key{padding:0 6px 0 8px;font-weight:500;color:var(--orange-t)}
.vb-chip-val{padding:0 4px;color:var(--orange-t)}
.vb-chip-x{
  padding:0 7px;color:var(--orange-t);cursor:pointer;
  background:rgba(234,88,12,.12);height:100%;
  display:flex;align-items:center;transition:background .1s;
}
.vb-chip-x:hover{background:rgba(234,88,12,.25)}
.vb-sort{font-size:11.5px;color:var(--text2);padding:7px 0;white-space:nowrap}

/* ═══════════════════════════════════════════════════
   PAGE AREA
═══════════════════════════════════════════════════ */
#page-area{
  flex:1;overflow-y:auto;padding:14px 16px;
}
#page-area::-webkit-scrollbar{width:5px}
#page-area::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ═══════════════════════════════════════════════════
   RECORD TABS (sub-navigation inside a profile page)
═══════════════════════════════════════════════════ */
.record-tabs{
  display:flex;align-items:center;
  border-bottom:.5px solid var(--border);
  background:var(--white);
  padding:0 16px;flex-shrink:0;
  overflow-x:auto;
}
.record-tabs::-webkit-scrollbar{height:2px}
.rtab{
  padding:9px 14px;font-size:12px;
  color:var(--text2);cursor:pointer;
  border-bottom:2px solid transparent;
  white-space:nowrap;transition:all .1s;
  display:flex;align-items:center;gap:5px;
  background:none;border-top:none;border-left:none;border-right:none;
  font-family:inherit;
}
.rtab:hover{color:var(--text)}
.rtab.active{color:var(--nv);border-bottom-color:var(--nv);font-weight:500}
.tc{
  font-size:10px;background:var(--gray2);color:var(--text2);
  padding:1px 5px;border-radius:10px;
}
.rtab.active .tc{background:var(--blue-bg);color:var(--blue-t)}

/* ═══════════════════════════════════════════════════
   NOTIFICATION PANEL
═══════════════════════════════════════════════════ */
.notif-panel{
  position:fixed;right:12px;top:52px;
  width:360px;
  background:var(--white);
  border:.5px solid var(--border);
  border-radius:12px;
  box-shadow:0 12px 40px rgba(0,0,0,.14);
  z-index:300;
  overflow:hidden;
}
.notif-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;border-bottom:.5px solid var(--border);
}
.notif-title{font-size:14px;font-weight:700;color:var(--text)}
.notif-tab-bar{display:flex;border-bottom:.5px solid var(--border)}
.notif-tab{
  flex:1;padding:8px 12px;
  border:none;background:none;
  font-size:11.5px;cursor:pointer;color:var(--text2);
  border-bottom:2px solid transparent;
  font-family:inherit;transition:all .1s;
}
.notif-tab:hover{color:var(--text)}
.notif-tab.active{color:var(--blue-t);border-bottom-color:var(--blue);font-weight:600}
.notif-body{max-height:380px;overflow-y:auto}
.notif-body::-webkit-scrollbar{width:3px}
.notif-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.notif-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:12px 14px;border-bottom:.5px solid var(--gray2);
  transition:background .1s;
  position:relative;
}
.notif-item:hover{background:var(--gray)}
.notif-item.unread::before{
  content:'';position:absolute;left:6px;top:16px;
  width:6px;height:6px;border-radius:50%;
  background:var(--blue);
}
.notif-item.unread{padding-left:20px}
.notif-item.read{opacity:.7}
.notif-av{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;flex-shrink:0;
}
.notif-text{font-size:12px;color:var(--text);line-height:1.5;margin-bottom:3px}
.notif-time{font-size:10.5px;color:var(--text3)}
.notif-actions{display:flex;gap:6px;margin-top:7px}
.notif-footer{
  padding:9px 14px;border-top:.5px solid var(--border);
  display:flex;justify-content:center;
}

/* ═══════════════════════════════════════════════════
   IMPORT/EXPORT DROPDOWN MENU
═══════════════════════════════════════════════════ */
.ie-wrap{position:relative;display:inline-block}
.ie-menu{
  position:absolute;right:0;top:calc(100% + 4px);
  background:var(--white);border:.5px solid var(--border);
  border-radius:9px;min-width:220px;
  box-shadow:0 8px 24px rgba(0,0,0,.12);
  z-index:100;overflow:hidden;display:none;padding:4px 0;
}
.ie-menu.open{display:block}
.ie-menu-hd{padding:9px 14px 5px;font-size:9.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px}
.ie-group-label{padding:4px 14px 2px;font-size:9px;font-weight:600;color:var(--text3);letter-spacing:.3px;text-transform:uppercase}
.ie-item{
  display:flex;align-items:center;gap:9px;
  padding:7px 14px;font-size:12px;
  color:var(--text);cursor:pointer;transition:background .1s;
}
.ie-item:hover{background:var(--blue-bg);color:var(--blue-t)}
.ie-icon{font-size:14px;width:18px;text-align:center}
.ie-item-hint{font-size:9.5px;color:var(--text3);margin-left:auto}
.ie-sep{height:.5px;background:var(--border);margin:3px 0}
#ie-overlay{position:fixed;inset:0;z-index:40;display:none}

/* ═══════════════════════════════════════════════════
   PILLS & BADGES
═══════════════════════════════════════════════════ */
.pill{
  display:inline-flex;align-items:center;gap:4px;
  padding:2px 8px;border-radius:20px;
  font-size:10.5px;font-weight:500;white-space:nowrap;
}
.p-green{background:var(--green-bg);color:var(--green-t)}
.p-amber{background:var(--amber-bg);color:var(--amber-t)}
.p-red{background:var(--red-bg);color:var(--red-t)}
.p-blue{background:var(--blue-bg);color:var(--blue-t)}
.p-gray{background:var(--gray2);color:var(--text2)}
.p-teal{background:var(--teal-bg);color:var(--teal-t)}
.p-purple{background:var(--purple-bg);color:var(--purple-t)}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.d-green{background:var(--green)}
.d-amber{background:var(--amber)}
.d-red{background:var(--red)}
.d-blue{background:var(--blue)}
.d-gray{background:var(--text3)}
.d-teal{background:var(--teal)}

/* ═══════════════════════════════════════════════════
   MODAL SYSTEM
═══════════════════════════════════════════════════ */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.35);
  display:flex;align-items:center;justify-content:center;
  z-index:200;padding:20px;backdrop-filter:blur(2px);
}
.modal{
  background:var(--white);border-radius:14px;
  width:100%;max-width:560px;max-height:90vh;
  overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.18);
}
.modal-lg{max-width:720px}
.modal-xl{max-width:960px}
.modal-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;border-bottom:.5px solid var(--border);
  position:sticky;top:0;background:var(--white);z-index:1;
}
.modal-title{font-size:13px;font-weight:600;color:var(--text)}
.modal-close{
  background:none;border:none;cursor:pointer;
  color:var(--text2);font-size:18px;padding:2px 5px;
  line-height:1;border-radius:5px;
}
.modal-close:hover{background:var(--gray2)}
.modal-body{padding:18px 20px}
.modal-foot{
  padding:12px 20px;border-top:.5px solid var(--border);
  display:flex;justify-content:flex-end;gap:8px;
  position:sticky;bottom:0;background:var(--white);
}

/* ═══════════════════════════════════════════════════
   ALERTS
═══════════════════════════════════════════════════ */
.alert{
  padding:9px 12px;border-radius:8px;
  font-size:11.5px;line-height:1.5;margin-bottom:10px;
}
.alert-error{background:var(--red-bg);color:var(--red-t);border:.5px solid #fca5a5}
.alert-warn{background:var(--amber-bg);color:var(--amber-t);border:.5px solid #fde68a}
.alert-info{background:var(--blue-bg);color:var(--blue-t);border:.5px solid #93c5fd}
.alert-success{background:var(--green-bg);color:var(--green-t);border:.5px solid #86efac}

/* ═══════════════════════════════════════════════════
   BUTTONS
═══════════════════════════════════════════════════ */
.btn{
  padding:5px 11px;border-radius:7px;font-size:11.5px;
  cursor:pointer;border:.5px solid var(--border);
  background:var(--white);color:var(--text);
  font-family:inherit;transition:all .1s;
  display:inline-flex;align-items:center;gap:5px;
  white-space:nowrap;
}
.btn:hover{background:var(--gray2)}
.btn-primary{background:var(--nv);color:var(--cream);border-color:var(--nv);font-weight:600}
.btn-primary:hover{background:var(--nv2)}
.btn-success{background:var(--green-bg);color:var(--green-t);border-color:transparent;font-weight:500}
.btn-danger{background:var(--red-bg);color:var(--red-t);border-color:transparent}
.btn-ghost{background:transparent;border-color:transparent;color:var(--text2)}
.btn-ghost:hover{background:var(--gray2);color:var(--text)}
.btn-blue{background:var(--blue);color:#fff;border-color:transparent;font-weight:500}
.btn-sm{padding:4px 9px;font-size:11px}
.btn-xs{padding:2px 7px;font-size:10px;border-radius:5px}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* ═══════════════════════════════════════════════════
   FORM ELEMENTS
═══════════════════════════════════════════════════ */
input,select,textarea{
  border:.5px solid var(--border2);border-radius:7px;
  padding:7px 10px;font-size:11.5px;color:var(--text);
  font-family:inherit;outline:none;transition:border .1s;
  width:100%;background:var(--white);
}
input:focus,select:focus,textarea:focus{border-color:var(--nv)}
textarea{resize:vertical;min-height:70px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-full{grid-template-columns:1fr}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-label{font-size:11px;font-weight:500;color:var(--text2)}
.form-req{color:var(--red)}
.form-hint{font-size:10px;color:var(--text3);margin-top:2px}
.chk-row{display:flex;align-items:center;gap:8px;font-size:11.5px;cursor:pointer}
.chk-row input[type=checkbox]{width:14px;height:14px;accent-color:var(--nv)}

/* ═══════════════════════════════════════════════════
   LOADING STATE
═══════════════════════════════════════════════════ */
.loading{padding:20px;text-align:center;color:var(--text3);font-size:12px}

/* ═══════════════════════════════════════════════════
   SESSION TIMEOUT WARNING MODAL
   (overlays everything at z-index 9999)
═══════════════════════════════════════════════════ */
#session-warn-overlay{
  position:fixed;inset:0;
  background:rgba(11,30,60,.65);
  z-index:9999;
  display:none;
  align-items:center;
  justify-content:center;
  backdrop-filter:blur(3px);
}
#session-warn-overlay.visible{display:flex}
.session-warn-card{

/* ═══════════════════════════════════════════════════
   ─── SESSION TIMEOUT ENGINE ───
   58 min: show warning modal with live 2-min countdown
   60 min: auto-logout fires
═══════════════════════════════════════════════════ */
let _sessionWarnTimer = null
let _sessionLogoutTimer = null
let _sessionCountdownInterval = null
let _sessionWarned = false

function startSessionTimer() {
  // Clear any existing timers
  clearTimeout(_sessionWarnTimer)
  clearTimeout(_sessionLogoutTimer)
  clearInterval(_sessionCountdownInterval)
  _sessionWarned = false

  // 58 minutes → show blocking warning modal
  _sessionWarnTimer = setTimeout(() => {
    _sessionWarned = true
    showSessionWarning()
  }, 58 * 60 * 1000)

  // 60 minutes → force logout regardless of modal state
  _sessionLogoutTimer = setTimeout(() => {
    clearInterval(_sessionCountdownInterval)
    const overlay = document.getElementById('session-warn-overlay')
    if (overlay) overlay.classList.remove('visible')
    showToast('Session expired — you have been signed out automatically.', 'warn')
    setTimeout(() => logout(), 900)
  }, 60 * 60 * 1000)

  // Reset on any user activity (click or keydown)
  // Uses passive event listeners so they don't block UI thread
  const resetHandler = () => {
    if (!_sessionWarned) startSessionTimer()
  }
  document.addEventListener('click', resetHandler, { once: true, passive: true })
  document.addEventListener('keydown', resetHandler, { once: true, passive: true })
  document.addEventListener('mousemove', resetHandler, { once: true, passive: true })
}

function showSessionWarning() {
  const overlay = document.getElementById('session-warn-overlay')
  if (!overlay) return
  overlay.classList.add('visible')

  // Start 2-minute countdown
  let secondsLeft = 120
  updateCountdownDisplay(secondsLeft)

  clearInterval(_sessionCountdownInterval)
  _sessionCountdownInterval = setInterval(() => {
    secondsLeft--
    updateCountdownDisplay(secondsLeft)
    if (secondsLeft <= 0) {
      clearInterval(_sessionCountdownInterval)
      // Logout timer will fire at exactly 60min; countdown is cosmetic sync
    }
  }, 1000)
}

function updateCountdownDisplay(secs) {
  const el = document.getElementById('session-countdown')
  if (!el) return
  const m = Math.floor(secs / 60)
  const s = secs % 60
  el.textContent = `${m}:${s < 10 ? '0' : ''}${s}`
  // Turn red in final 30 seconds
  el.style.color = secs <= 30 ? '#dc2626' : '#991b1b'
}

function extendSession() {
  // Dismiss warning modal
  const overlay = document.getElementById('session-warn-overlay')
  if (overlay) overlay.classList.remove('visible')
  clearInterval(_sessionCountdownInterval)
  _sessionWarned = false
  // Restart the full 60-minute clock
  startSessionTimer()
  showToast('Session extended — you are still signed in.', 'success')
}

/* ═══════════════════════════════════════════════════
   ─── API LAYER ───
═══════════════════════════════════════════════════ */
async function api(url, method = 'GET', body = null) {
  const opts = {
    method,
    headers: {
      'Authorization': `Bearer ${token}`,
      'Content-Type': 'application/json'
    }
  }
  if (body) opts.body = JSON.stringify(body)
  const r = await fetch(url, opts)
  let d
  try { d = await r.json() } catch (e) { throw new Error(`Server error (${r.status})`) }
  if (r.status === 401) {
    token = null
    localStorage.removeItem('valor_token')
    render()
    throw new Error('Session expired')
  }
  if (r.status === 403) throw new Error(d.error || 'Permission denied')
  if (!r.ok) throw new Error(d.error || `Request failed (${r.status})`)
  return d
}

async function apiDownload(url) {
  const r = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } })
  if (!r.ok) { const d = await r.json().catch(() => ({})); throw new Error(d.error || 'Export failed') }
  const blob = await r.blob()
  const cd = r.headers.get('content-disposition') || ''
  const name = cd.match(/filename="([^"]+)"/)?.[1] || 'valor-export.csv'
  const a = document.createElement('a')
  a.href = URL.createObjectURL(blob)
  a.download = name
  a.click()
  URL.revokeObjectURL(a.href)
}

async function apiAI(prompt) {
  try {
    const d = await api('/api/ai', 'POST', { prompt, context: '' })
    if (d.error && !d.text) return 'AI Error: ' + (d.error || 'unknown')
    return d.text || 'No response generated.'
  } catch (e) { return '❌ AI failed: ' + e.message }
}

/* ═══════════════════════════════════════════════════
   ─── TOAST NOTIFICATIONS ───
═══════════════════════════════════════════════════ */
function showToast(msg, type = 'info') {
  const colors = { success: '#166534', error: '#991b1b', warn: '#92400e', info: '#1e40af' }
  const bgs = { success: '#dcfce7', error: '#fee2e2', warn: '#fef3c7', info: '#dbeafe' }
  const t = document.createElement('div')
  t.style.cssText = `position:fixed;bottom:18px;right:18px;padding:10px 16px;border-radius:9px;font-size:12px;font-weight:500;z-index:9998;max-width:340px;box-shadow:0 4px 16px rgba(0,0,0,.15);background:${bgs[type] || bgs.info};color:${colors[type] || colors.info};border:.5px solid currentColor;opacity:0;transition:opacity .2s`
  t.textContent = msg
  document.body.appendChild(t)
  requestAnimationFrame(() => { t.style.opacity = '1' })
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300) }, 3800)
}

/* ═══════════════════════════════════════════════════
   ─── MODAL SYSTEM ───
═══════════════════════════════════════════════════ */
function showModal(title, body, onSave = null, size = '') {
  document.getElementById('modal-container').innerHTML = `
  <div class="modal-overlay" onclick="handleOverlayClick(event)">
    <div class="modal ${size}" onclick="event.stopPropagation()">
      <div class="modal-hd">
        <div class="modal-title">${title}</div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body" id="modal-body">${body}</div>
      <div class="modal-foot" id="modal-foot">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        ${onSave ? '<button class="btn btn-primary" id="modal-ok-btn" onclick="modalSave()">Save</button>' : ''}
      </div>
    </div>
  </div>`
  window._modalSave = onSave
}

function handleOverlayClick(e) {
  if (e.target.classList.contains('modal-overlay')) closeModal()
}

function closeModal() {
  document.getElementById('modal-container').innerHTML = ''
  window._modalSave = null
}

async function modalSave() {
  const btn = document.getElementById('modal-ok-btn')
  if (!btn || !window._modalSave) return
  btn.disabled = true
  btn.textContent = 'Saving...'
  const result = await window._modalSave()
  if (result === false) { btn.disabled = false; btn.textContent = 'Save' }
  else closeModal()
}

/* ═══════════════════════════════════════════════════

═══════════════════════════════════════════════════ */
function toggleIEMenu(id) {
  closeAllIE()
  const m = document.getElementById(id)
  if (m) {
    m.classList.toggle('open')
    document.getElementById('ie-overlay').style.display = m.classList.contains('open') ? 'block' : 'none'
  }
}

function closeAllIE() {
  document.querySelectorAll('.ie-menu').forEach(m => m.classList.remove('open'))
  const ol = document.getElementById('ie-overlay')
  if (ol) ol.style.display = 'none'
}

/* ═══════════════════════════════════════════════════
   ─── UTILITY FORMATTERS ───
═══════════════════════════════════════════════════ */
function fmtDate(d) {
  if (!d) return '—'
  try { return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) } catch { return d }
}

function fmtMoney(n) { return n ? '$' + Number(n).toLocaleString() : '—' }

function fmtAgo(d) {
  const diff = Date.now() - new Date(d).getTime()
  const m = Math.floor(diff / 60000), h = Math.floor(diff / 3600000), dy = Math.floor(diff / 86400000)
  if (m < 1) return 'just now'
  if (m < 60) return m + 'm ago'
  if (h < 24) return h + 'h ago'
  if (dy < 7) return dy + 'd ago'
  return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
}

function getTaskMeta(t) {
  if (t.metadata && typeof t.metadata === 'object') return t.metadata
  try { const p = JSON.parse(t.details || '{}'); return typeof p === 'object' ? p : { title: t.details || '' } }
  catch { return { title: t.details || '' } }
}

function getNoteContent(n) {
  if (n.metadata && typeof n.metadata === 'object') return n.metadata.content || n.metadata.text || n.details || ''
  return n.details || ''
}

function getNoteType(n) {
  if (n.metadata && typeof n.metadata === 'object') return n.metadata.note_type || 'Note'
  try { const p = JSON.parse(n.details || '{}'); return p.note_type || 'Note' } catch { return 'Note' }
}

function isAircallNote(n) {
  if (n.metadata && typeof n.metadata === 'object') return !!(n.metadata.is_aircall || n.metadata.note_type === 'Aircall')
  try { const p = JSON.parse(n.details || '{}'); return !!(p.is_aircall || p.note_type === 'Aircall') } catch { return false }
}

/* ═══════════════════════════════════════════════════
   ─── CALL PRIORITY BARS ───
═══════════════════════════════════════════════════ */
function callPriority(n) {
  if (!n) return '<span style="color:var(--text3)">—</span>'
  const score = Number(n)
  const filled = score >= 3000 ? 5 : score >= 2000 ? 4 : score >= 1200 ? 3 : score >= 600 ? 2 : 1
  const level = score >= 2000 ? 'high' : score >= 800 ? 'med' : 'low'
  const colorMap = { high: '#ef4444', med: '#f59e0b', low: '#22c55e' }
  const bars = Array.from({ length: 5 }, (_, i) =>
    `<div style="width:5px;height:${8 + i * 3}px;border-radius:1.5px;background:${i < filled ? colorMap[level] : 'var(--gray3)'}"></div>`
  ).join('')
  return `<div style="display:inline-flex;align-items:center;gap:5px">
    <div style="display:flex;gap:2px;align-items:flex-end">${bars}</div>
    <span style="font-size:10.5px;font-weight:600;color:var(--text2)">${score.toLocaleString()}</span>
  </div>`
}

function starRating(r) {
  if (!r) return '<span style="color:var(--text3)">—</span>'
  const n = Math.min(Number(r), 5)
  return '<span style="color:#f59e0b;font-size:12px;letter-spacing:1px">' + '★'.repeat(n) +
    '<span style="color:var(--gray3)">' + '★'.repeat(5 - n) + '</span></span>'
}

  document.getElementById('lp').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin() })
}

async function doLogin() {
  const email = document.getElementById('le').value
  const password = document.getElementById('lp').value
  const btn = document.getElementById('lbtn')
  btn.disabled = true; btn.textContent = 'Signing in...'
  document.getElementById('login-err').innerHTML = ''
  try {
    const r = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    })
    const d = await r.json()
    if (!r.ok) throw new Error(d.error)
    token = d.token
    localStorage.setItem('valor_token', token)
    render()
  } catch (e) {
    document.getElementById('login-err').innerHTML = `<div class="alert alert-error">⚠️ ${e.message}</div>`
    btn.disabled = false; btn.textContent = 'Sign in'
  }
}

async function logout() {
  clearTimeout(_sessionWarnTimer)
  clearTimeout(_sessionLogoutTimer)
  clearInterval(_sessionCountdownInterval)
  const overlay = document.getElementById('session-warn-overlay')
  if (overlay) overlay.classList.remove('visible')
  try { await api('/api/logout', 'POST') } catch { }
  token = null; currentUser = null
  localStorage.removeItem('valor_token')
  render()
}

/* ═══════════════════════════════════════════════════
   ─── RENDER ENGINE ───
═══════════════════════════════════════════════════ */
async function render() {
  if (!token) { renderLogin(); return }
  try {
    const me = await api('/api/me')
    currentUser = me
    startSessionTimer()
    renderApp()
  } catch (e) {
    token = null
    localStorage.removeItem('valor_token')
    renderLogin()
  }
}

/* ═══════════════════════════════════════════════════
   ─── VIEW SWITCHING ───
═══════════════════════════════════════════════════ */
let _currentView = 'all'

function switchView(id) {
  _currentView = id
  document.querySelectorAll('.vb-view').forEach(el => {
    el.classList.toggle('active', el.getAttribute('onclick')?.includes(`'${id}'`))
  })
  if (currentPage === 'wibs') applyWibView(id)
  else if (currentPage === 'companies') applyCompanyView(id)
  else if (currentPage === 'locations') applyLocationView(id)
  else if (currentPage === 'funding') applyFundingView(id)
  else if (currentPage === 'applications') applyApplicationView(id)
  else showToast(`View: ${id}`, 'info')
}

function applyWibView(id) {
  if (!window._wibs) return
  let d = [...window._wibs]
  const vf = {
    all: () => true,
    ashby: w => (w.owner || '').toLowerCase().includes('ashby'),
    sam: w => (w.notes || '').toLowerCase().includes('sam'),
    carly: w => (w.owner || '').toLowerCase().includes('carly'),
    sarah_cannon: w => (w.owner || '').toLowerCase().includes('cannon'),
    sarah_gantt: w => (w.owner || '').toLowerCase().includes('gantt'),
    contacted: w => ['contacted', 'funding_available', 'follow_up_needed', 'network_member'].includes(w.status),
    by_location: () => true,
    by_state: () => true,
    no_reachout: w => ['no_reachout_complete', 'no_reachout_completed', 'follow_up_needed'].includes(w.status),
  }
  d = d.filter(vf[id] || (() => true))
  if (id === 'by_state') d.sort((a, b) => (a.state || '').localeCompare(b.state || ''))
  if (id === 'by_location') d.sort((a, b) => (b.call_priority_score || 0) - (a.call_priority_score || 0))
  renderWibTable(d)
}

function applyCompanyView(id) {
  if (!window._companies) return
  let d = [...window._companies]
  if (id === 'funding') d = d.filter(c => c.status === 'active_client' || c.status === 'qualified')
  if (id === 'by_status') d.sort((a, b) => (a.status || '').localeCompare(b.status || ''))
  if (id === 'priority') d.sort((a, b) => Number(b.rating || 0) - Number(a.rating || 0))
  renderCompaniesTable(d)
}

function applyLocationView(id) {
  if (!window._locations) return
  let d = [...window._locations]
  if (id === 'wib_network') d = d.filter(l => l.wib_id != null)
  if (id === 'oh_wibs') d = d.filter(l => (l.state || '') === 'OH')
  renderLocationsTable(d)
}

function applyFundingView(id) {
  if (!window._funding) return
  let d = [...window._funding]
  if (id === 'open') d = d.filter(f => f.status === 'open')
  if (id === 'pending') d = d.filter(f => f.status === 'pending' || f.status === 'pending_employer')
  if (id === 'blocked') d = d.filter(f => f.status === 'blocked')
  if (typeof renderFundingTableInner === 'function') {
    document.getElementById('page-area').innerHTML = renderFundingTableInner(d)
  }
}

function applyApplicationView(id) {
  if (!window._applications) return
  let d = [...window._applications]
  if (id === 'in_progress') d = d.filter(a => ['submitted', 'under_review', 'in_progress'].includes(a.status))
  if (id === 'awarded') d = d.filter(a => a.status === 'awarded')
  const tbody = document.getElementById('apps-tbody')
  if (tbody && typeof renderAppsRows === 'function') tbody.innerHTML = renderAppsRows(d)
}

/* ═══════════════════════════════════════════════════
   ─── PAGE ROUTER ───
═══════════════════════════════════════════════════ */
async function loadPage(page) {
  currentPage = page
  setNav(page)
  clearTabs()
  clearViewbar()
  notifOpen = false
  document.getElementById('notif-container').innerHTML = ''
  closeAllIE()
  const pa = document.getElementById('page-area')
  pa.style.padding = '14px 16px'
  pa.innerHTML = '<div class="loading">⏳ Loading...</div>'

  try {
    if (page === 'dashboard') await pageDashboard()
    else if (page === 'notifications') pageNotifications()
    else if (page === 'tasks') await pageTasks()
    else if (page === 'notes') await pageNotes()
    else if (page === 'emails') pageEmails()
    else if (page === 'calls') pageCalls()
    else if (page === 'reports') await pageReports()
    else if (page === 'automations') pageAutomations()
    else if (page === 'sequences') pageSequences()
    else if (page === 'workflows') pageWorkflows()
    else if (page === 'companies') await pageCompanies()
    else if (page === 'locations') await pageLocations()
    else if (page === 'wibs') await pageWibs()
    else if (page === 'funding') await pageFunding()
    else if (page === 'applications') await pageApplications()
    else if (page === 'users') await pageUsers()
    else if (page === 'auditlogs') await pageAuditLogs()
    else if (page === 'settings') pageSettings()
    else if (page === 'revenue') await pageRevenue()
    else if (page === 'compliance') await pageCompliance()
    else if (page === 'ai') pageAIAssistant()
    else pa.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">Page not found: ${page}</div></div>`
  } catch (e) {
    const msg = e.message || 'Unknown error'
    if (msg.includes('details') && msg.includes('not exist')) {
      pa.innerHTML = `
        <div class="alert alert-error">⚠️ Schema cache issue: ${msg}</div>
        <div style="text-align:center;padding:20px">
          <button class="btn btn-primary" onclick="refreshSchemaAndReload()">🔄 Refresh Schema & Reload</button>
          <div style="font-size:10.5px;color:var(--text3);margin-top:8px">
            Or run in Supabase SQL Editor: <code>SELECT pg_notify('pgrst', 'reload schema');</code>
          </div>
        </div>`
    } else {
      pa.innerHTML = `<div class="alert alert-error">⚠️ ${msg}</div>`
    }
  }
}

async function refreshSchemaAndReload() {
  try {
    showToast('Refreshing schema cache...', 'info')
    const r = await api('/api/refresh-schema', 'POST')
    showToast(r.message || 'Schema refreshed', 'success')
    setTimeout(() => loadPage(currentPage), 1200)
  } catch (e) { showToast('Refresh failed: ' + e.message, 'error') }
}

   ─── NOTIFICATION ENGINE ───
   Full read/unread state tracking with Accept/Deny
═══════════════════════════════════════════════════ */
function updateNotifBadge() {
  window._notifBadgeCount = window._notifications.filter(n => n.unread).length
  // Update sidebar badge
  const navNotif = document.getElementById('nav-notifications')
  if (navNotif) {
    const existing = navNotif.querySelector('.sb-badge')
    if (existing) existing.remove()
    if (window._notifBadgeCount > 0) {
      const badge = document.createElement('span')
      badge.className = 'sb-badge red'
      badge.textContent = window._notifBadgeCount
      navNotif.appendChild(badge)
    }
  }
}

function toggleNotif() {
  notifOpen = !notifOpen
  const container = document.getElementById('notif-container')
  if (notifOpen) {
    renderNotifPanel('requests', container)
  } else {
    container.innerHTML = ''
  }
}

function renderNotifPanel(activePane, container) {
  const allNotifs = window._notifications.filter(n => n.category === 'notifications' || !n.category)
  const requests = window._notifications.filter(n => n.category === 'requests')
  const unreadNotifs = allNotifs.filter(n => n.unread).length
  const unreadReq = requests.filter(n => n.unread).length

  container.innerHTML = `
  <div class="notif-panel">
    <div class="notif-hd">
      <div class="notif-title">Notifications</div>
      <div style="display:flex;gap:5px">
        <button class="btn btn-xs" onclick="markAllNotifsRead()">✓ Mark all read</button>
        <button class="btn btn-xs btn-ghost" onclick="toggleNotif()">✕</button>
      </div>
    </div>
    <div class="notif-tab-bar">
      <button class="notif-tab${activePane === 'notifications' ? ' active' : ''}" onclick="renderNotifPane('notifications')">
        Notifications (${unreadNotifs})
      </button>
      <button class="notif-tab${activePane === 'requests' ? ' active' : ''}" onclick="renderNotifPane('requests')" style="color:${unreadReq > 0 ? 'var(--blue-t)' : ''}">
        Requests (${unreadReq > 0 ? `<strong>${unreadReq}</strong>` : requests.length})
      </button>
    </div>
    <div class="notif-body" id="notif-body">
      ${renderNotifItems(activePane === 'requests' ? requests : allNotifs, activePane)}
    </div>
    <div class="notif-footer">
      <button class="btn btn-xs btn-ghost" onclick="loadPage('notifications');toggleNotif()">View all notifications →</button>
    </div>
  </div>`

  // Mark visible unread items as seen after 2 seconds
  setTimeout(() => {
    const items = activePane === 'requests' ? requests : allNotifs
    items.forEach(n => { if (n.unread) n.unread = false })
    updateNotifBadge()
  }, 2000)
}

function renderNotifPane(pane) {
  const container = document.getElementById('notif-container')
  renderNotifPanel(pane, container)
}

function renderNotifItems(items, pane) {
  if (!items.length) {
    return `<div style="padding:24px;text-align:center;color:var(--text3);font-size:12px">
      No ${pane === 'requests' ? 'pending requests' : 'notifications'} at this time.
    </div>`
  }
  return items.map(n => `
    <div class="notif-item${n.unread ? ' unread' : ' read'}" id="notif-${n.id}">
      <div class="notif-av" style="background:${n.color}22;color:${n.color}">${n.initials}</div>
      <div style="flex:1;min-width:0">
        <div class="notif-text">${n.text}</div>
        <div class="notif-time">${n.time}</div>
        ${pane === 'requests' ? `
        <div class="notif-actions">
          <button class="btn btn-xs btn-blue" onclick="acceptNotifRequest('${n.id}')">Accept</button>
          <button class="btn btn-xs" onclick="denyNotifRequest('${n.id}')">Deny</button>
        </div>` : ''}
      </div>
    </div>`).join('')
}

function acceptNotifRequest(id) {
  const notif = window._notifications.find(n => n.id === id)
  if (notif) {
    showToast('Access granted', 'success')
    window._notifications = window._notifications.filter(n => n.id !== id)
    updateNotifBadge()
    renderNotifPane('requests')
  }
}

function denyNotifRequest(id) {
  const notif = window._notifications.find(n => n.id === id)
  if (notif) {
    showToast('Request denied', 'info')
    window._notifications = window._notifications.filter(n => n.id !== id)
    updateNotifBadge()
    renderNotifPane('requests')
  }
}

function markAllNotifsRead() {
  window._notifications.forEach(n => { n.unread = false })
  updateNotifBadge()
  renderNotifPane('notifications')
  showToast('All notifications marked as read', 'success')
}

function switchNotifPagePane(pane) {
  document.querySelectorAll('[id^="notif-page-tab"]').forEach(el => el.classList.remove('active'))
  document.getElementById(`notif-page-tab-${pane}`)?.classList.add('active')
  const requests = window._notifications.filter(n => n.category === 'requests')
  const allNotifs = window._notifications.filter(n => n.category === 'notifications' || !n.category)
  const body = document.getElementById('notif-page-body')
  if (body) {
    body.innerHTML = renderFullPageNotifItems(
      pane === 'reqs' ? requests : allNotifs,
      pane === 'reqs' ? 'requests' : 'notifications'
    )
  }
}

function renderFullPageNotifItems(items, pane) {
  if (!items.length) return `<div style="padding:24px;text-align:center;color:var(--text3);font-size:12px">No ${pane} at this time.</div>`
  return items.map(n => `
    <div class="notif-item${n.unread ? ' unread' : ' read'}" id="full-notif-${n.id}">
      <div class="notif-av" style="background:${n.color}22;color:${n.color}">${n.initials}</div>
      <div style="flex:1">
        <div class="notif-text">${n.text}</div>
        <div class="notif-time">${n.time}</div>
        ${pane === 'requests' ? `
        <div class="notif-actions">
          <button class="btn btn-xs btn-blue" onclick="acceptNotifRequest('${n.id}');switchNotifPagePane('reqs')">Accept</button>
          <button class="btn btn-xs" onclick="denyNotifRequest('${n.id}');switchNotifPagePane('reqs')">Deny</button>
        </div>` : ''}
      </div>
    </div>`).join('')
}

function openChangePasswordModal() {
  showModal('🔐 Change Password', `
    <div id="pw-err"></div>
    <div class="form-row form-full">
      <div class="form-group">
        <div class="form-label">Current Password <span class="form-req">*</span></div>
        <input type="password" id="pw-current" placeholder="Current password">
      </div>
    </div>
    <div class="form-row form-full">
      <div class="form-group">
        <div class="form-label">New Password <span class="form-req">*</span></div>
        <input type="password" id="pw-new" placeholder="Min 8 characters">
      </div>
    </div>
    <div class="form-row form-full">
      <div class="form-group">
        <div class="form-label">Confirm New Password <span class="form-req">*</span></div>
        <input type="password" id="pw-confirm" placeholder="Repeat new password">
      </div>
    </div>`,
  async () => {
    const current = document.getElementById('pw-current').value
    const newPw = document.getElementById('pw-new').value
    const confirm = document.getElementById('pw-confirm').value
    const err = document.getElementById('pw-err')
    if (!current) { err.innerHTML = '<div class="alert alert-error">Current password required</div>'; return false }
    if (!newPw || newPw.length < 8) { err.innerHTML = '<div class="alert alert-error">New password must be at least 8 characters</div>'; return false }
    if (newPw !== confirm) { err.innerHTML = '<div class="alert alert-error">Passwords do not match</div>'; return false }
    try {
      await api('/api/change-password', 'POST', { current_password: current, new_password: newPw })
      showToast('Password changed successfully', 'success')
    } catch (e) { err.innerHTML = `<div class="alert alert-error">${e.message}</div>`; return false }
  })
}

        </div>

      }).join('') : '<div style="padding:8px 0;color:var(--text3);font-size:11.5px;text-align:center">All caught up! 🎉</div>'
    }
  } catch (e) { /* tasks optional on dashboard */ }
}
